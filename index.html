// 質問 → ボット返信メッセージを構築
function buildChatReply(question, sections) {
  const { kws, hits } = chatSearch(question, sections);
  if (!kws.length) {
    return {
      role: 'bot', kind: 'nokw',
      text: 'うまく読み取れませんでした…。「5-1 攻略」「フェイント 種類」のように、プレー用語を入れて聞いてみてください。',
      chips: CHAT_SUGGESTIONS, ts: Date.now(),
    };
  }
  if (!hits.length) {
    return {
      role: 'bot', kind: 'nohit',
      text: `「${kws.slice(0, 3).map(k => k.raw).join('・')}」に当てはまるセクションが見つかりませんでした。別の言い方で試すか、下の例から選んでみてください。`,
      chips: CHAT_SUGGESTIONS, ts: Date.now(),
    };
  }
  const best = hits[0];
  const excerpt = chatBestExcerpt(best, kws);
  return {
    role: 'bot', kind: 'answer',
    head: { id: best.id, icon: best.fileIcon, fileTitle: best.fileTitle, title: best.title },
    html: renderMarkdown(excerpt),
    srcs: hits.slice(1).map(s => ({ id: s.id, icon: s.fileIcon, fileTitle: s.fileTitle, title: s.title })),
    ts: Date.now(),
  };
}

  r_of_feint_rotate_partial: { good: '腕は外せた = フェイント前半は成功。', issue: '差し込みのスピードと角度', body: '腕を外しても、次の一歩が遅いとカバーDFに塞がれる。0.3秒以内に差し込みへ。', improve: '【練習】腕外し→1歩目までを0.3秒で。タイマー使用。', approaches: [{ tag: '即時差込', text: '0.3秒以内' }, { tag: '角度', text: 'DFの腕の外側を抜く' }, { tag: '辞書', text: '02_individual.md ①' }] },
  r_of_feint_rotate_fail: { good: 'DFが緩めない事実を認識。', issue: '廻旋は接触前提の技術。緩めるDFには別フェイントへ', body: '緩めない＝強いホールド。腕の力で対抗するのではなく、ターンや方向転換で別ルートへ。', improve: '【判断】1度試して効かなければ廻旋を捨てて②ターンや⑤ステップに切替。', approaches: [{ tag: '切替判断', text: '1回試して効かなければ捨てる' }, { tag: '組合せ', text: '廻旋→ターンの連続' }, { tag: '辞書', text: '02_individual.md ダブルフェイント' }] },
  r_of_feint_rotate_foul: { good: 'ファウルを取られたが、接触技術を試した姿勢は正しい。', issue: '「外す」と「払う」の境界', body: 'OFから積極的に腕を払う動作は反則。あくまでDFの腕を「外す」動作で。腕の振り方向で判定が変わる。', improve: '【意識】廻旋は外向きの円運動で。腕を上→下に叩く動作はNG。', approaches: [{ tag: 'ルール', text: 'IHFルール第8条' }, { tag: '審判判断', text: '試合中の基準を見極める' }, { tag: '辞書', text: '02_individual.md ①反則との境界' }] },
  // ②ターン
  r_of_feint_turn_good: { good: '②ターンでDFを置き去り = 体の回転技術が通った。', issue: 'ターン後の体勢維持', body: 'クロアチア語 オクレト／ロタツィヤ（ターン）。ターン直後の体勢が崩れているとシュートに移れない。回転中の軸足意識。', improve: '【練習】ターン→3歩→シュートまでをセットで反復。回転中も上体は立てる。', approaches: [{ tag: '軸足', text: '回転の軸を体幹で支える' }, { tag: 'セット練習', text: 'ターン→シュート連動' }, { tag: '辞書', text: '02_individual.md ②ターン' }] },
  r_of_feint_turn_partial: { good: 'ターン自体は成功 = 技術は通った。', issue: 'ターン後のスピード差', body: 'DFが追いつくのはターン後の加速不足。ターン後の1歩目を爆発的に。', improve: '【練習】ターン後の1歩目を片脚スクワット・プライオで強化。', approaches: [{ tag: '1歩目爆発', text: 'プライオメトリクス' }, { tag: '加速力', text: '21_physical_training.md' }, { tag: 'ターン軌道', text: '最短距離で回る' }] },
  r_of_feint_turn_read: { good: 'ターン方向の予測を認識 = 改善の出発点。', issue: 'ターン前の予備動作', body: '回転方向がバレる原因は①肩の傾き、②視線、③軸足の位置。3要素のどれかが予告している。', improve: '【練習】鏡前で「ターン直前の自分」を確認。3要素のどれが予告しているか特定。', approaches: [{ tag: '客観視', text: '鏡＋動画' }, { tag: 'パターンB活用', text: '逆ターンへ切替（02_individual.md）' }, { tag: '辞書', text: '02_individual.md ②パターンA/B/C' }] },
  r_of_feint_turn_self: { good: '自分のバランス崩れを自覚 = 体幹の課題発見。', issue: '回転中の体幹安定', body: 'ターンは遠心力との戦い。体幹が弱いと外側に流れる。プランク＋回転耐性トレ。', improve: '【練習】メディシンボール回転投げ＋プランク90秒×3。', approaches: [{ tag: '体幹', text: 'プランク系＋回転耐性' }, { tag: '低重心', text: '回転中も膝を曲げる' }, { tag: '辞書', text: '21_physical_training.md' }] },
  // ③シュートフェイント
  r_of_feint_shoot_gk_good: { good: '③シュートフェイクでGKを動かして逆コース = 心理戦の勝利。', issue: '使い時の判断（先読み型GK限定）', body: 'シュートフェイク有効なのは先読み型GK。コース絞り型には効かない。試合序盤で判定を。', improve: '【判断】試合序盤3-5本でGKタイプ特定→先読み型のときだけシュートフェイク使用。', approaches: [{ tag: 'GK観察', text: '3-5本でタイプ判定' }, { tag: 'バックハンド', text: '③-B 特殊形' }, { tag: '辞書', text: '05_gk_df.md GKタイプ' }] },
  r_of_feint_shoot_block: { good: 'ブロックDFを動かして空間を作った = 視線誘導が通った。', issue: 'DF腕の隙間を抜く精度', body: 'ブロックDFの腕が伸びた瞬間が窓。手首の角度で腕の脇を抜く軌道へ。', improve: '【練習】DF役の腕を実際に伸ばさせた状態で、腕の脇を抜くシュート反復。', approaches: [{ tag: '腕の脇抜き', text: '手首の角度調整' }, { tag: 'ループ併用', text: 'DF前進ならロブヴルフ（ループシュート）' }, { tag: '辞書', text: '02_individual.md ③' }] },
  r_of_feint_shoot_read: { good: '読まれた事実を認識 = 改善可能。', issue: 'フェイクと本気の差', body: 'フェイクを見破られる原因は本気シュートとの動作差が大きすぎる or 短すぎる。中間が正解（0.5-1秒のため）。', improve: '【練習】本気とフェイクの動作を限りなく近づける。鏡前で確認。', approaches: [{ tag: '本気との一体化', text: '差をなくす' }, { tag: 'ためる時間', text: '0.5-1秒' }, { tag: '視線分離', text: 'コースを見ない' }] },
  r_of_feint_shoot_self: { good: 'フェイクが大きすぎた自覚 = 技術修正点を発見。', issue: 'フェイク→本シュートのスムーズな移行', body: '大きすぎるフェイクは「シュート動作の取り直し」が必要になり、ブロックされる。フェイクは小さく、本気と同じフォームで。', improve: '【練習】フェイク→そのままシュートできる範囲の動作大きさを探る。鏡前確認。', approaches: [{ tag: 'コンパクト', text: 'フェイク=小動作' }, { tag: '本気フォーム', text: '本気の動作内でフェイク' }, { tag: '辞書', text: '02_individual.md ③' }] },
  // ④パス
  r_of_feint_pass_good: { good: '④パスフェイントで隣DFを動かしてパスコース確保 = 戦術連携の勝利。', issue: 'フェイント→本パスの即時性', body: 'クロアチア語 ラジニャク・ドダヴァニェム（パスフェイント）。隣DFが動いた瞬間がパス窓。0.3秒以内に本パスを。', improve: '【練習】パスフェイント→本パスを0.3秒以内で。3人ペアで反復。', approaches: [{ tag: '即時', text: '0.3秒以内' }, { tag: 'ノールック', text: '本来のパス先を見ない' }, { tag: '辞書', text: '02_individual.md ④' }] },
  r_of_feint_pass_static: { good: '動かないDFと認識できた = 観察力。', issue: '動かないDFには別アプローチ', body: 'インターセプト警戒で動かないDF = 賢いDF。フェイクに固執せず個人突破やスクリーンへ即切替。', improve: '【意識】フェイク1回で動かなければ即別手段。時間ロス回避。', approaches: [{ tag: '切替', text: '個人突破' }, { tag: 'スクリーン', text: '組織で動かす' }, { tag: '時間管理', text: '無駄なフェイク禁止' }] },
  r_of_feint_pass_big: { good: 'フェイントが大きすぎた自覚 = 修正点を発見。', issue: 'パスフェイントの「動作大きさ」', body: '大きい動作は本気との区別がついて読まれる。腕の振りは普段のパス動作と同じ大きさで。', improve: '【練習】鏡前でパスフェイント動作を最小化。本気パスと同じフォームで。', approaches: [{ tag: '最小動作', text: '本気パスと同形' }, { tag: '視線分離', text: '視線とパス先を分ける' }, { tag: '辞書', text: '02_individual.md ④' }] },
  // ⑤ステップ
  r_of_feint_step_good: { good: '⑤ステップでDFの重心を崩して抜けた = 足技の勝利。', issue: 'ステップフェイントの再現性', body: 'クロアチア語 ラジニャク・スミェロム（ステップフェイント）。重心崩れの瞬間は0.2秒程度。次の踏み込みを瞬時に。', improve: '【練習】ステップ→逆方向踏込みまでを0.5秒で。コーンを使って左右反復。', approaches: [{ tag: '瞬時切替', text: '0.5秒以内に逆方向' }, { tag: '低重心', text: 'ステップ時も膝を曲げる' }, { tag: '辞書', text: '02_individual.md ⑤' }] },
  r_of_feint_step_partial: { good: '重心は崩したが間に合わなかった = 半分は成功。', issue: 'ステップ後のスピード', body: 'DFの重心が崩れても、次の加速が遅いと再構築される。ステップ後の1歩目を爆発的に。', improve: '【練習】ステップ→1歩目をプライオで強化。サイドステップ→前方ダッシュ反復。', approaches: [{ tag: '1歩目爆発', text: 'プライオメトリクス' }, { tag: '辞書', text: '21_physical_training.md' }, { tag: '加速力', text: '10mスプリント' }] },
  r_of_feint_step_read: { good: '読まれたと認識できた。', issue: 'ステップの予備動作', body: '読まれる原因は①ステップ前の体重移動が見える、②同方向の連発、③肩の傾きで予告。', improve: '【鏡前】ステップ前の自分の体勢を確認。重心の見えない移動を練習。', approaches: [{ tag: '予備動作削減', text: '上体は動かさず足だけ' }, { tag: 'バリエ', text: '左右ランダム' }, { tag: '辞書', text: '02_individual.md ⑤' }] },
  r_of_feint_step_self: { good: '踏み込み甘さを自覚 = 改善の出発点。', issue: '踏み込みの深さと角度', body: '甘い踏み込みは①DFを動かせない、②自分も次へ移れないの二重ロス。膝下の角度を90度近くまで。', improve: '【練習】片脚スクワット→ステップフェイント反復。踏み込みの深さを意識。', approaches: [{ tag: '踏込深さ', text: '膝下90度' }, { tag: '下半身強化', text: 'スクワット系' }, { tag: '辞書', text: '02_individual.md ⑤' }] },
  // ⑥ボディ
  r_of_feint_body_good: { good: '⑥ボディフェイントでDFの視線・体が釣られた = 上半身技術の勝利。', issue: '小動作で効かせる技術の維持', body: 'クロアチア語 ラジニャク・ティイェロム（ボディフェイント）。ボディは「最小動作で最大効果」が原則。同じDFには2回まで。', improve: '【練習】肩の傾きだけでDF役を動かす反復。「最小で最大」の感覚を体に。', approaches: [{ tag: '最小動作', text: '肩のみで効く' }, { tag: '視線併用', text: '肩＋視線で二重に' }, { tag: '辞書', text: '02_individual.md ⑥' }] },
  r_of_feint_body_weak: { good: '反応が薄かった自覚 = フィードバックを受けられた。', issue: 'ボディフェイントの強度バランス', body: '小動作すぎると読まれない代わりに動かせない。肩の傾きを「DFが反応する閾値」まで増やす。', improve: '【練習】DF役の反応を見ながら動作大きさを段階的に増やす。閾値を体感。', approaches: [{ tag: '閾値探索', text: 'DFが反応する最小値' }, { tag: '視線併用', text: '視線で補強' }, { tag: '辞書', text: '02_individual.md ⑥' }] },
  r_of_feint_body_read: { good: '見破られた事実を認識。', issue: 'ボディフェイント単体の限界', body: 'ボディ単体で見破られる = DFが上半身フェイクに慣れている。⑤ステップや⑦スピードと組み合わせて。', improve: '【練習】ボディ→ステップのダブルフェイント反復。クロアチア式 コンビナツィヤ・ラジニャカ（ダブルフェイント組合せ）。', approaches: [{ tag: 'ダブル', text: 'ボディ→ステップ' }, { tag: '裏', text: '本気の入りと完全一致' }, { tag: '辞書', text: '02_individual.md ダブルフェイント' }] },
  // ⑦スピード
  r_of_feint_speed_good: { good: '⑦スピードフェイントの急停止でDFを置き去り = リズム崩しの勝利。', issue: '急停止からの再加速', body: 'クロアチア語 ラジニャク・プロムイェノム・テンパ（スピードフェイント）。急停止後の再加速で勝負。停止→0.5秒で再加速できるか。', improve: '【練習】20m全力→急停止→5m逆方向加速を反復。RSA（反復スプリント能力）強化。', approaches: [{ tag: '再加速', text: '0.5秒以内' }, { tag: 'RSA', text: '21_physical_training.md' }, { tag: '辞書', text: '02_individual.md ⑦' }] },
  r_of_feint_speed_accel: { good: '加速差で抜けた = 純粋なスピード勝利。', issue: 'スピード依存の限界（後半失速）', body: 'スピードはスタミナと連動。試合後半に落ちる。スプリント練習＋持久力で維持。', improve: '【練習】20m全力ダッシュ×8本（30秒レスト）週2。後半維持を狙う。', approaches: [{ tag: '加速力', text: '10m＋20mダッシュ' }, { tag: '持久', text: '試合後半維持' }, { tag: '辞書', text: '21_physical_training.md' }] },
  r_of_feint_speed_read: { good: 'DFがリズムを合わせてきた認識 = 観察力。', issue: 'リズム合わせDFへの対処', body: 'リズム合わせDFは⑤ステップや④パスフェイントを組み合わせて崩す。スピード単体に固執しない。', improve: '【練習】スピード→ステップのダブルフェイント反復。', approaches: [{ tag: 'ダブル', text: 'スピード→ステップ' }, { tag: 'チーム', text: 'スクリーンで物理的に遮断' }, { tag: '辞書', text: '02_individual.md ダブルフェイント' }] },
  r_of_feint_speed_self: { good: '体力切れを自覚 = 客観視できている。', issue: '持久力と無駄走り削減', body: '体力切れの原因は①持久力不足、②無駄走りが多い。両方を改善。', improve: '【練習】間欠走（200m×5×3セット）＋オフボール時の動き節約。', approaches: [{ tag: '間欠走', text: '200m×5' }, { tag: '無駄走り削減', text: 'オフボールの動き精査' }, { tag: '辞書', text: '21_physical_training.md' }] },
  // ⑧ダブルフェイント（コンビナツィヤ・ラジニャカ（ダブルフェイント組合せ））
  r_of_feint_double_good: { good: '⑧ダブルフェイントで耐えるDFを崩した = 上級技術の勝利。', issue: '2種目までの間合いと選択', body: '1種目で動かないDFは「対応中」。0.3-0.5秒の間に2種目を入れる。組合せは①→⑤、③→⑤、⑥→⑤などDFが想定しにくい順序で。', improve: '【練習】1種目→2種目の2連続を左右各10本。組合せ3パターン以上を体に。', approaches: [{ tag: '組合せ', text: '①→⑤ / ③→⑤ / ⑥→⑤' }, { tag: '間合い', text: '0.3-0.5秒の連続' }, { tag: '辞書', text: '02_individual.md ダブルフェイント' }] },
  r_of_feint_double_late: { good: '1種目で動かなかったDFを2種目で釣った = 観察と忍耐の勝利。', issue: '2種目発動の判断スピード', body: '1種目で動かない = 上級DF。即時に2種目へ移れる体勢を維持しておく必要がある。1種目の終わりが2種目の始まり。', improve: '【練習】1種目発動中も次の準備を続ける感覚を養う。鏡前で「常に次の構え」を確認。', approaches: [{ tag: '体勢維持', text: '1種目中も2種目の準備' }, { tag: '判断', text: 'DF不動なら即2種目' }, { tag: '辞書', text: '02_individual.md ダブルフェイント' }] },
  r_of_feint_double_read: { good: '両方読まれた事実を認識 = 上級DFと対峙したと客観視。', issue: '組合せパターンの予測可能性', body: '同じ組合せ（例：①→⑤）を連発するとDFが学習。組合せのレパートリーを増やす。最低3パターン使い分け。', improve: '【練習】3組合せ（①→⑤、③→⑤、⑥→⑤）をランダムに使う反復。同DFには同組合せ禁止。', approaches: [{ tag: 'バリエ', text: '3組合せ以上' }, { tag: '間合い変化', text: '速い・遅いを混ぜる' }, { tag: '辞書', text: '02_individual.md ダブルフェイント' }] },
  r_of_feint_double_slow: { good: '自分の遅さを自覚 = 改善の出発点。', issue: '2種目発動までの時間', body: '遅すぎる原因は①1種目の動作が大きすぎ、②体力切れ、③体幹不足で2種目に移れない。3要素のどれか。', improve: '【練習】1種目を最小動作で完結→即2種目。プランクで体幹強化。', approaches: [{ tag: '最小動作', text: '1種目をコンパクトに' }, { tag: '体幹', text: 'プランク系' }, { tag: '体力', text: '21_physical_training.md' }] },

  // パス
  r_of_pass_good: { good: 'パスがシュートにつながった = 完璧な連携。', issue: 'この再現性を高める', body: 'パス→シュートの成功は①視野②タイミング③精度の3つ揃った時。何が良かったか言語化。', improve: '【記録】成功時の3要素のどれが効いたか試合後にメモ。次回も同じ要素を意識。', approaches: [{ tag: '再現', text: '言語化＝再現性' }, { tag: 'チーム共有', text: '受け手と「これが良かった」を共有' }, { tag: '辞書', text: '04_cognition.md 5ポイント確認' }] },

}

  if (phase === 'result') return 100;
  return Math.min(20 + histLen * 20, 85);
}

// ─────────────────────────────────────────────
// localStorage helpers — version 管理＋安全な JSON 入出力
// 将来データ構造を変えた時は STORAGE_VERSION を上げると旧データを自動破棄
// ─────────────────────────────────────────────
const STORAGE_VERSION = 1;
const STORAGE_PREFIX = `hb_v${STORAGE_VERSION}_`;
const lsGet = (key) => {
  try {
    const raw = localStorage.getItem(STORAGE_PREFIX + key);
    if (raw !== null) return JSON.parse(raw);
    // 一度限りの旧キー移行（v1 PREFIX 未導入の旧データ）
    const legacy = localStorage.getItem(key);
    if (legacy !== null) {
      try {
        localStorage.setItem(STORAGE_PREFIX + key, legacy);
        localStorage.removeItem(key);
        return JSON.parse(legacy);
      } catch (e) { return null; }
    }
    return null;
  } catch (e) { return null; }
};
const lsSet = (key, value) => {
  try {
    localStorage.setItem(STORAGE_PREFIX + key,
      typeof value === 'string' ? value : JSON.stringify(value));
  } catch (e) {}
};
const lsRemove = (key) => {
  try {
    localStorage.removeItem(STORAGE_PREFIX + key);
    localStorage.removeItem(key); // 旧キーも削除
  } catch (e) {}
};

// ─────────────────────────────────────────────
// GText: プレーンテキストを HTML エスケープしたうえで GLOSSARY 用語自動装飾＋
// （オプション）検索ハイライトを適用。solve-rx / 振り返り結果 / プラン項目で使用。
// ─────────────────────────────────────────────
function GText({ text, query, className, as }) {
  if (text == null || text === '') return null;
  let html = escapeHtml(String(text));
  html = decorateGlossary(html);
  if (query) html = highlightInHtml(html, query);
  const Tag = as || 'span';
  return React.createElement(Tag, { className, dangerouslySetInnerHTML: { __html: html } });
}

function tbJudgeRow(rate, solutions) {
  if (rate < 0.5) return 'low';
  if (rate > 0.8) return solutions >= 2 ? 'hi-multi' : 'hi-one';
  return solutions >= 2 ? 'band-multi' : 'band-one';
}
function tbTaskToCardText(t) {
  const c = TB_CONSTRAINTS.find(x => x.id === t.constraintId);
  return [
    `【自作課題】${t.name}${(t.version || 1) > 1 ? `（v${t.version}）` : ''}`,
    `■ 起点（受け前に見えていなかったもの）`,
    `  ${[...(t.cognition || []), t.cognitionNote].filter(Boolean).join(' / ')}`,
    `■ 制約（1つ）：${c ? c.name : ''}`,
    `  ${t.constraintDetail}`,
    `■ 成功の定義（${t.attempts}本セット）`,
    `  結果：${t.successResult}`,
    `  プロセス：${t.successProcess}（ペアが観察）`,
    `■ この課題がDFに変えさせるもの：${(t.q0Targets || []).join('・')}`,
    `  ${t.q0Note}`,
    t.overrideReason ? `■ 検証を通過せず実施する理由：${t.overrideReason}` : null,
    `■ ペアへの依頼：解の数と成功数を数えてください`,
  ].filter(x => x !== null).join('\n');
}
function tbExportAllText(tasks) {
  const lines = ['# 自作課題 全履歴エクスポート', `# ${new Date().toLocaleString('ja-JP')}`, ''];
  tasks.forEach(t => {
    lines.push(tbTaskToCardText(t), '');
    (t.history || []).forEach(h => {
      lines.push(`  [旧版 v${h.v}] ${h.constraintDetail}` + (h.movedBy ? `　→ 一手：${h.movedBy.move}（${h.movedBy.reason}）` : ''));
    });
    if ((t.history || []).length) lines.push('');
    (t.sessions || []).forEach((s, i) => {
      lines.push(`  [実施${i + 1}${s.version ? ` v${s.version}` : ''}] ${s.date}　成功 ${s.success}/${s.attempts}（${Math.round(s.success / s.attempts * 100)}%）　解の数 ${s.solutions}（ペア観察）`);
      lines.push(`  → 次の一手：${s.move}`);
      lines.push(`  → 理由：${s.reason}`);
      if (s.insight) lines.push(`  → 見えるようになったもの：${s.insight}`);
      lines.push('');
    });
    lines.push('────────────────', '');
  });
  return lines.join('\n');
}
function tbCopy(text, setToast) {
  const done = () => { setToast('コピーした。LINEに貼り付けて共有'); setTimeout(() => setToast(null), 2200); };
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta); done();
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(fallback);
  } else fallback();
}

          onClick={saveSession}>記録する</button>

// GK予測モジュール（2026-07 GK先行サイクル）
// GKがシュート前にコースを予測→シュート後に的中/不的中を照合する。
// 入力はシューター側が行う（GK本人入力は自己奉仕バイアスのため不可）。
// 理論根拠：プレテスト効果（予測誤差学習）＋GK知覚トレーニング研究。
// ═══════════════════════════════════════════════════

const GK_SITUATIONS = [
  { id: 'backcourt', label: 'バックコート' },
  { id: 'side', label: 'サイド' },
  { id: '7m', label: '7m' },
];
// 6分割コース（シューターから見た向き）。的中率が安定したら9分割拡張を検討
const GK_COURSES = [
  { id: 'TL', label: '左上' }, { id: 'TR', label: '右上' },
  { id: 'ML', label: '左中' }, { id: 'MR', label: '右中' },
  { id: 'BL', label: '左下' }, { id: 'BR', label: '右下' },
];
const gkSituationLabel = (id) => (GK_SITUATIONS.find(s => s.id === id) || {}).label || id;
const gkCourseLabel = (id) => (GK_COURSES.find(c => c.id === id) || {}).label || id;

// ローカル日付 'YYYY-MM-DD'
function gkDateStr(d) {
  const dt = d || new Date();
  const p = (n) => String(n).padStart(2, '0');
  return `${dt.getFullYear()}-${p(dt.getMonth() + 1)}-${p(dt.getDate())}`;
}
// dateStr を含む週の月曜日 'YYYY-MM-DD'（週次集計の単位）
function gkWeekStart(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const day = (d.getDay() + 6) % 7; // 月=0 … 日=6
  d.setDate(d.getDate() - day);
  return gkDateStr(d);
}
// 'YYYY-MM-DD' → 'M/D'
function gkFmtDate(s) {
  const d = new Date(s + 'T00:00:00');
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

// シューター別コース分布（攻撃陣スカウティング兼用）。
// 実コースが確定するのは的中時のみなので、的中記録だけから算出する。
function gkCalcTendencies(preds) {
  const t = {};
  preds.forEach(p => {
    if (!p.hit) return;
    if (!t[p.shooter]) t[p.shooter] = {};
    t[p.shooter][p.course] = (t[p.shooter][p.course] || 0) + 1;
  });
  return t;
}

// 的中率 {total, hits, rate(0-100) | rate=null(記録なし)}
function gkStats(preds) {
  const total = preds.length;
  const hits = preds.filter(p => p.hit).length;
  return { total, hits, rate: total ? Math.round(hits / total * 100) : null };
}

// GK別・週別の的中率推移（週開始日昇順）— 第5週中間照合のベースライン比較に使う
function gkWeeklySeries(preds, gkName) {
  const byWeek = {};
  preds.filter(p => p.gk === gkName).forEach(p => {
    const w = gkWeekStart(p.date);
    if (!byWeek[w]) byWeek[w] = [];
    byWeek[w].push(p);
  });
  return Object.keys(byWeek).sort().map(w => Object.assign({ week: w }, gkStats(byWeek[w])));
}

// 週次テキストエクスポート（揮発対策：当該週の集計＋生記録をLINE共有できる形に）
function gkExportWeekText(preds, weekStartStr) {
  const ws = weekStartStr || gkWeekStart(gkDateStr());
  const weekPreds = preds.filter(p => gkWeekStart(p.date) === ws);
  const end = new Date(ws + 'T00:00:00');
  end.setDate(end.getDate() + 6);
  const lines = [];
  lines.push(`🧤 GK予測 週次レポート（${gkFmtDate(ws)}〜${gkFmtDate(gkDateStr(end))}）`);
  lines.push('━━━━━━━━━━━━━━');
  lines.push('■ GK別 的中率（今週）');
  const gks = [...new Set(weekPreds.map(p => p.gk))];
  if (!gks.length) lines.push('  記録なし');
  gks.forEach(g => {
    const mine = weekPreds.filter(p => p.gk === g);
    const s = gkStats(mine);
    const cum = gkStats(preds.filter(p => p.gk === g));
    lines.push(`・${g}：${s.hits}/${s.total}（${s.rate}%）｜累計 ${cum.hits}/${cum.total}（${cum.rate}%）`);
    GK_SITUATIONS.forEach(sit => {
      const ss = gkStats(mine.filter(p => p.situation === sit.id));
      if (ss.total) lines.push(`    ${sit.label} ${ss.hits}/${ss.total}（${ss.rate}%）`);
    });
  });
  lines.push('');
  lines.push('■ シューター傾向（累計・的中ベース）');
  const tend = gkCalcTendencies(preds);
  const shooters = Object.keys(tend);
  if (!shooters.length) lines.push('  的中記録なし');
  shooters.forEach(sh => {
    const dist = tend[sh];
    const parts = GK_COURSES.filter(c => dist[c.id]).map(c => `${c.label}${dist[c.id]}`);
    const totalPred = preds.filter(p => p.shooter === sh).length;
    const hitCount = GK_COURSES.reduce((a, c) => a + (dist[c.id] || 0), 0);
    lines.push(`・${sh}：${parts.join('・')}（的中${hitCount}／予測${totalPred}）`);
  });
  lines.push('');
  lines.push(`■ 今週の全記録（${weekPreds.length}件）※バックアップ`);
  weekPreds.slice().sort((a, b) => a.ts - b.ts).forEach(p => {
    lines.push(`${gkFmtDate(p.date)} ${p.gk}×${p.shooter}｜${gkSituationLabel(p.situation)}｜予測${gkCourseLabel(p.course)}｜${p.hit ? '○的中' : '×不的中'}${p.cue ? '｜' + p.cue : ''}`);
  });
  return lines.join('\n');
}

// GK予測：記録ウィザード（①状況・メンバー → ②予測コース＋根拠 → シュート → ③結果）
function GKRecordWizard({ players, initial, onSave, onExit }) {
  const [gk, setGk] = useState(initial.gk || null);
  const [situation, setSituation] = useState(initial.situation || null);
  const [shooter, setShooter] = useState(initial.shooter || null);
  const [course, setCourse] = useState(null);
  const [cue, setCue] = useState('');
  const [stage, setStage] = useState('setup'); // setup | predict | result

  const handleResult = (hit) => {
    onSave({
      id: 'p' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      date: gkDateStr(), ts: Date.now(),
      gk, situation, shooter, course, cue: cue.trim(), hit,
    });
    // 連続入力：GK・状況・シューターは維持し、コース・根拠だけリセット
    setCourse(null); setCue('');
    setStage('predict');
  };

  const chips = (list, cur, set) => (
    <div className="plan-themes">
      {list.map(name => (
        <button key={name} className={`plan-theme-chip ${cur === name ? 'active' : ''}`} onClick={() => set(name)}>{name}</button>
      ))}
    </div>
  );

  if (stage === 'setup') return (
    <React.Fragment>
      <button className="dict-back" onClick={onExit}>← GK予測ホームへ</button>
      <div className="tb-q-label">STEP 1 / 3 ─ 状況とメンバー</div>
      <div className="tb-q-text">誰が・どこから打つ？</div>
      <div className="tb-q-hint">入力はシューター側が行う（GK本人は入力しない）。</div>
      <div className="tb-field-label" style={{marginTop: 14}}>GK（予測する人）</div>
      {players.keepers.length ? chips(players.keepers, gk, setGk)
        : <div className="tb-q-hint">GKが未登録です。ホームの「選手リスト」で登録してください。</div>}
      <div className="tb-field-label" style={{marginTop: 14}}>状況</div>
      <div className="plan-themes">
        {GK_SITUATIONS.map(s => (
          <button key={s.id} className={`plan-theme-chip ${situation === s.id ? 'active' : ''}`} onClick={() => setSituation(s.id)}>{s.label}</button>
        ))}
      </div>
      <div className="tb-field-label" style={{marginTop: 14}}>シューター</div>
      {players.shooters.length ? chips(players.shooters, shooter, setShooter)
        : <div className="tb-q-hint">シューターが未登録です。ホームの「選手リスト」で登録してください。</div>}
      <button className="tb-next-btn" style={{marginTop: 16}} disabled={!gk || !situation || !shooter} onClick={() => setStage('predict')}>
        次へ：コースを予測する →
      </button>
    </React.Fragment>
  );

  if (stage === 'predict') return (
    <React.Fragment>
      <button className="dict-back" onClick={() => setStage('setup')}>← 状況・メンバーを変える</button>
      <div className="tb-q-label">STEP 2 / 3 ─ シュートの前に記入</div>
      <div className="tb-q-text">{gk} の予測：{shooter}（{gkSituationLabel(situation)}）はどこに打つ？</div>
      <div className="tb-q-hint">GKに口頭で予測を聞いて、シュートの<b>前</b>にタップ。左右はシューターから見た向き。</div>
      <div className="gk-grid">
        {GK_COURSES.map(c => (
          <button key={c.id} className={`gk-cell ${course === c.id ? 'selected' : ''}`} onClick={() => setCourse(c.id)}>{c.label}</button>
        ))}
      </div>
      <div className="tb-field" style={{marginTop: 14}}>
        <div className="tb-field-label">根拠の手がかり（任意・短文）</div>
        <input type="text" value={cue} onChange={e => setCue(e.target.value)} placeholder="例：助走角度が外向き／肩が早く開く" />
      </div>
      <button className="tb-next-btn" style={{marginTop: 16}} disabled={!course} onClick={() => setStage('result')}>
        予測を確定 → シュートへ
      </button>
    </React.Fragment>
  );

  // stage === 'result'
  return (
    <React.Fragment>
      <div className="tb-q-label">STEP 3 / 3 ─ シュートの後に記入</div>
      <div className="tb-q-text">結果は？（事実のみ・良し悪しの判定はしない）</div>
      <div className="tb-q-hint">予測：{gk} → <b>{gkCourseLabel(course)}</b>（{shooter}・{gkSituationLabel(situation)}）</div>
      <div className="gk-result-row">
        <button className="gk-result-btn hit" onClick={() => handleResult(true)}>○ 的中</button>
        <button className="gk-result-btn miss" onClick={() => handleResult(false)}>× 不的中</button>
      </div>
      <button className="tb-ghost-btn" style={{marginTop: 12}} onClick={() => setStage('predict')}>← 予測をやり直す</button>
    </React.Fragment>
  );
}

// GK予測：ホーム（集計・週別推移・シューター傾向・選手リスト管理・週次エクスポート）
function GKHome({ preds, players, onStart, onDelete, onAddPlayer, onRemovePlayer, onExport, onBackHub }) {
  const [newKeeper, setNewKeeper] = useState('');
  const [newShooter, setNewShooter] = useState('');
  const thisWeek = gkWeekStart(gkDateStr());
  const weekPreds = preds.filter(p => gkWeekStart(p.date) === thisWeek);
  const tend = gkCalcTendencies(preds);
  const ready = players.keepers.length > 0 && players.shooters.length > 0;

  const addPlayer = (role, name, clear) => {
    const n = name.trim();
    if (!n) return;
    onAddPlayer(role, n);
    clear('');
  };

  return (
    <React.Fragment>
      <button className="dict-back" onClick={onBackHub}>← 戻る（ホーム）</button>
      <div>
        <div className="tb-q-label">GK予測 ─ 予測して、照合する</div>
        <div className="tb-q-text">シュート前に予測、シュート後に照合</div>
        <div className="tb-q-hint">流れ：①状況・シューターを選ぶ → ②GKの予測コースをタップ → シュート → ③的中/不的中。
          入力はシューター側。結果は事実のみ（うまい下手の話ではない）。</div>
      </div>
      <button className="tb-next-btn" style={{marginTop: 12}} onClick={onStart} disabled={!ready}>▶ 予測をはじめる</button>
      {!ready && <div className="tb-yn-warn">先に下の「選手リスト」でGKとシューターを登録してください。</div>}

      {players.keepers.length > 0 && (
        <div className="tb-card" style={{marginTop: 16}}>
          <div className="tb-card-k">GK別 的中率（今週 / 累計）</div>
          {players.keepers.map(g => {
            const week = gkStats(weekPreds.filter(p => p.gk === g));
            const cum = gkStats(preds.filter(p => p.gk === g));
            const series = gkWeeklySeries(preds, g).slice(-6);
            return (
              <div key={g} className="tb-card-row">
                <div className="tb-card-v">
                  <b style={{color: 'var(--tx-primary)'}}>{g}</b>
                  　今週 {week.total ? `${week.hits}/${week.total}（${week.rate}%）` : '記録なし'}
                  　累計 {cum.total ? `${cum.hits}/${cum.total}（${cum.rate}%）` : '—'}
                </div>
                {series.length > 1 && (
                  <div className="tb-card-v" style={{fontSize: 'var(--fs-xs)'}}>
                    推移：{series.map(w => `${gkFmtDate(w.week)}週 ${w.rate}%`).join(' → ')}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {Object.keys(tend).length > 0 && (
        <div className="tb-card" style={{marginTop: 12}}>
          <div className="tb-card-k">シューター傾向（攻撃陣スカウティング兼用）</div>
          <div className="tb-card-v" style={{fontSize: 'var(--fs-xs)'}}>※実コースが確定する「的中」記録のみから算出</div>
          {Object.keys(tend).map(sh => {
            const dist = tend[sh];
            const parts = GK_COURSES.filter(c => dist[c.id]).map(c => `${c.label}${dist[c.id]}`);
            const totalPred = preds.filter(p => p.shooter === sh).length;
            return (
              <div key={sh} className="tb-card-row">
                <div className="tb-card-v"><b style={{color: 'var(--tx-primary)'}}>{sh}</b>　{parts.join('・')}（予測{totalPred}本）</div>
              </div>
            );
          })}
        </div>
      )}

      {preds.length > 0 && (
        <div className="tb-card" style={{marginTop: 12}}>
          <div className="tb-card-k">最近の記録（最新10件・誤入力は削除可）</div>
          {preds.slice(0, 10).map(p => (
            <div key={p.id} className="tb-card-row gk-list-row">
              <div className="tb-card-v">
                {gkFmtDate(p.date)} {p.gk}×{p.shooter}｜{gkSituationLabel(p.situation)}｜予測{gkCourseLabel(p.course)}｜{p.hit ? '○的中' : '×不的中'}
                {p.cue ? <span style={{color: 'var(--tx-muted)'}}>｜{p.cue}</span> : null}
              </div>
              <button className="gk-del-btn" onClick={() => onDelete(p.id)}>削除</button>
            </div>
          ))}
        </div>
      )}

      <div className="tb-card" style={{marginTop: 12}}>
        <div className="tb-card-k">選手リスト（この端末に保存）</div>
        <div className="tb-card-row">
          <div className="tb-field-label">GK</div>
          {players.keepers.map(n => (
            <div key={n} className="gk-list-row tb-card-row">
              <div className="tb-card-v">{n}</div>
              <button className="gk-del-btn" onClick={() => onRemovePlayer('keepers', n)}>削除</button>
            </div>
          ))}
          <div className="gk-add-row">
            <input type="text" value={newKeeper} onChange={e => setNewKeeper(e.target.value)} placeholder="GK名を追加" />
            <button className="gk-add-btn" onClick={() => addPlayer('keepers', newKeeper, setNewKeeper)}>＋追加</button>
          </div>
        </div>
        <div className="tb-card-row">
          <div className="tb-field-label">シューター</div>
          {players.shooters.map(n => (
            <div key={n} className="gk-list-row tb-card-row">
              <div className="tb-card-v">{n}</div>
              <button className="gk-del-btn" onClick={() => onRemovePlayer('shooters', n)}>削除</button>
            </div>
          ))}
          <div className="gk-add-row">
            <input type="text" value={newShooter} onChange={e => setNewShooter(e.target.value)} placeholder="シューター名を追加" />
            <button className="gk-add-btn" onClick={() => addPlayer('shooters', newShooter, setNewShooter)}>＋追加</button>
          </div>
        </div>
      </div>

      <button className="tb-ghost-btn" style={{marginTop: 12}} onClick={onExport} disabled={!preds.length}>
        📋 週次テキストをコピー（LINE共有・バックアップ）
      </button>
    </React.Fragment>
  );
}

// ピヴォット認知モジュール（GKサイクル後続）
// 2軸認知→類型選択→予測→プレー→事実チェック→結果照合。
// 記録はユニット内バック陣が兼任する（ピヴォット本人は入力しない）。

const PV_TYPES = [
  { id: '1a', label: '①a ブロック・表', desc: 'DFとボールの間に背中で壁を作る（触覚主導：接触圧とDF重心）' },

  { id: '2b', label: '②b スライド・拡張', desc: '2:2仕掛けの前にDFを引き連れて空間を広げる（保持者の状態認知が主導）' },

];
const PV_AXIS1 = [
  { id: 'ball', label: 'ボール側' },
  { id: 'self', label: '自分側' },
];
const PV_AXIS2 = [
  { id: 'man', label: '人に反応' },
  { id: 'space', label: '空間に反応' },
];
const PV_CUES = [
  { id: 'df-weight', label: 'DF重心の足' },
  { id: 'passer', label: 'パサーの目と腕' },
  { id: 'holder', label: '保持者の進行方向と声' },
];
const PV_RESULTS = [
  { id: 'break', label: '突破', cls: 'break' },
  { id: 'stopped', label: '被停止', cls: 'stopped' },
  { id: 'rereceive', label: '受け直し', cls: 'rereceive' },
];
const pvTypeLabel = (id) => (PV_TYPES.find(t => t.id === id) || {}).label || id;
const pvResultLabel = (id) => (PV_RESULTS.find(r => r.id === id) || {}).label || id;
const pvAxisLabel = (rec) => {
  const a1 = (PV_AXIS1.find(a => a.id === rec.axis1) || {}).label || rec.axis1;
  const a2 = (PV_AXIS2.find(a => a.id === rec.axis2) || {}).label || rec.axis2;
  return `${a1}・${a2}`;
};

// 選手別の類型選択分布 {pivot: {typeId: count}}（①偏重の可視化。週次エクスポートにも含める）
function pvCalcTypeDist(records) {
  const d = {};
  records.forEach(r => {
    if (!d[r.pivot]) d[r.pivot] = {};
    d[r.pivot][r.type] = (d[r.pivot][r.type] || 0) + 1;
  });
  return d;
}

// ②③（スライド・はなれる）選択率 0-100 | null（①安住の逆指標）
function pvNonBlockRate(records) {
  if (!records.length) return null;
  const n = records.filter(r => r.type !== '1a' && r.type !== '1b').length;
  return Math.round(n / records.length * 100);
}

// 類型×結果クロス集計 {typeId: {resultId: count, total}}
function pvCrossTypeResult(records) {
  const c = {};
  records.forEach(r => {
    if (!c[r.type]) c[r.type] = { total: 0 };
    c[r.type][r.result] = (c[r.type][r.result] || 0) + 1;
    c[r.type].total += 1;
  });
  return c;
}

// 週次テキストエクスポート（揮発対策：当該週の集計＋生記録。gkExportWeekText と同形式）
function pvExportWeekText(records, weekStartStr) {
  const ws = weekStartStr || gkWeekStart(gkDateStr());
  const weekRecs = records.filter(r => gkWeekStart(r.date) === ws);
  const end = new Date(ws + 'T00:00:00');
  end.setDate(end.getDate() + 6);
  const lines = [];
  lines.push(`🧲 ピヴォット認知 週次レポート（${gkFmtDate(ws)}〜${gkFmtDate(gkDateStr(end))}）`);
  lines.push('━━━━━━━━━━━━━━');
  lines.push('■ 類型選択分布（今週）※①偏重チェック');
  const pivots = [...new Set(weekRecs.map(r => r.pivot))];
  if (!pivots.length) lines.push('  記録なし');
  pivots.forEach(pv => {
    const mine = weekRecs.filter(r => r.pivot === pv);
    const dist = pvCalcTypeDist(mine)[pv] || {};
    const parts = PV_TYPES.filter(t => dist[t.id]).map(t => `${t.label.slice(0, 2)}${dist[t.id]}`);
    lines.push(`・${pv}：${parts.join('・')}（${mine.length}本・②③率${pvNonBlockRate(mine)}%）`);
    const cross = pvCrossTypeResult(mine);
    PV_TYPES.forEach(t => {
      const c = cross[t.id];
      if (c) lines.push(`    ${t.label.slice(0, 2)}：突破${c.break || 0}／被停止${c.stopped || 0}／受け直し${c.rereceive || 0}`);
    });
  });
  lines.push('');
  lines.push(`■ 今週の全記録（${weekRecs.length}件）※バックアップ`);
  weekRecs.slice().sort((a, b) => a.ts - b.ts).forEach(r => {
    const cues = (r.cues || []).map(c => (PV_CUES.find(x => x.id === c) || {}).label).filter(Boolean).join('・');
    lines.push(`${gkFmtDate(r.date)} ${r.pivot}｜${pvAxisLabel(r)}｜${pvTypeLabel(r.type)}｜${pvResultLabel(r.result)}${r.predict ? '｜予測:' + r.predict : ''}${cues ? '｜確認:' + cues : ''}`);
  });
  return lines.join('\n');
}

// ─── データバックアップ（GK予測・ピヴォット認知・自作課題の全記録） ───
// 端末故障・機種変・複数端末の記録合流に対応する。取り込みはID単位マージ（重複スキップ）。

function buildBackupText(data) {
  return JSON.stringify({
    app: 'handball-lab-backup',
    v: 1,
    exportedAt: new Date().toLocaleString('ja-JP'),
    data,
  });
}

// ID付きレコード配列のマージ。既存IDはスキップし、追加件数を返す
function mergeById(curArr, impArr) {
  const ids = new Set(curArr.map(x => x && x.id));
  const added = (Array.isArray(impArr) ? impArr : []).filter(x => x && x.id && !ids.has(x.id));
  return { merged: [...curArr, ...added], added: added.length };
}

// バックアップテキストを現在データにマージ。形式不正は Error を投げる
function mergeBackup(current, text) {
  let obj;
  try { obj = JSON.parse(text); } catch (e) { throw new Error('JSONとして読めませんでした'); }
  if (!obj || obj.app !== 'handball-lab-backup' || !obj.data) throw new Error('このアプリのバックアップ形式ではありません');
  const d = obj.data;
  const gk = mergeById(current.gkPreds, d.gk_predictions);
  const pv = mergeById(current.pvRecords, d.pv_records);
  const tb = mergeById(current.tbTasks, d['tb-tasks']);
  // 記録系は新しい順の不変条件を維持（ts降順）。自作課題はtsを持たないため順序維持のみ
  gk.merged = gk.merged.slice().sort((a, b) => (b.ts || 0) - (a.ts || 0));
  pv.merged = pv.merged.slice().sort((a, b) => (b.ts || 0) - (a.ts || 0));
  const unionArr = (a, b) => [...new Set([...(a || []), ...(Array.isArray(b) ? b : [])])];
  const gkPlayers = {
    keepers: unionArr(current.gkPlayers.keepers, d.gk_players && d.gk_players.keepers),
    shooters: unionArr(current.gkPlayers.shooters, d.gk_players && d.gk_players.shooters),
  };
  const pvPlayers = { pivots: unionArr(current.pvPlayers.pivots, d.pv_players && d.pv_players.pivots) };
  const playersAdded =
    (gkPlayers.keepers.length - current.gkPlayers.keepers.length) +
    (gkPlayers.shooters.length - current.gkPlayers.shooters.length) +
    (pvPlayers.pivots.length - current.pvPlayers.pivots.length);
  return {
    gkPreds: gk.merged, pvRecords: pv.merged, tbTasks: tb.merged, gkPlayers, pvPlayers,
    added: { gk: gk.added, pv: pv.added, tb: tb.added, players: playersAdded },
  };
}

// ─── GK中間照合（第5週運用の材料）：基準期（最初の1〜2週）と直近週の比較 ───
function gkBaselineCompare(preds, gkName) {
  const series = gkWeeklySeries(preds, gkName);
  if (series.length < 2) return null;
  // 基準期は最大2週。`- 1` は直近週を基準期に含めない（比較対象を必ず残す）ための予約
  const nBase = Math.min(2, series.length - 1);
  const baseWeeks = series.slice(0, nBase);
  const hits = baseWeeks.reduce((a, w) => a + w.hits, 0);
  const total = baseWeeks.reduce((a, w) => a + w.total, 0);
  const baseRate = Math.round(hits / total * 100);
  const recent = series[series.length - 1];
  return { baseRate, recentRate: recent.rate, recentWeek: recent.week, delta: recent.rate - baseRate };
}

// ピヴォット認知：記録ウィザード（①第0問2軸＋類型＋予測 → プレー → ②事実チェック＋結果）

  const [axis2, setAxis2] = useState(null);

    onSave({
      id: 'v' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),

    setAxis1(null); setAxis2(null); setType(null); setPredict(''); setCues([]);
    setStage('setup');
  };

  const chips = (list, cur, set) => (
    <div className="plan-themes">

      ))}

  if (stage === 'setup') return (
    <React.Fragment>
      <button className="dict-back" onClick={onExit}>← ピヴォット認知ホームへ</button>
      <div className="tb-q-label">STEP 1 / 3 ─ プレーの前に記入</div>
      <div className="tb-q-text">第0問：いまのDFはどう見えている？</div>
      <div className="tb-q-hint">入力はユニット内のバック陣が行う（ピヴォット本人に口頭で確認）。</div>
      <div className="tb-field-label" style={{marginTop: 14}}>ピヴォット</div>

      <div className="tb-field-label" style={{marginTop: 14}}>DFはどちら側？</div>
      {chips(PV_AXIS1, axis1, setAxis1)}
      <div className="tb-field-label" style={{marginTop: 14}}>DFは何に反応している？</div>
      {chips(PV_AXIS2, axis2, setAxis2)}
      <button className="tb-next-btn" style={{marginTop: 16}} disabled={!pivot || !axis1 || !axis2} onClick={() => setStage('predict')}>
        次へ：類型を選ぶ →
      </button>
    </React.Fragment>
  );

  if (stage === 'predict') return (
    <React.Fragment>
      <button className="dict-back" onClick={() => setStage('setup')}>← 第0問に戻る</button>
      <div className="tb-q-label">STEP 2 / 3 ─ プレーの前に記入</div>
      <div className="tb-q-text">{pivot} の選択：どの類型でいく？</div>
      <div className="tb-q-hint">どれを選ぶかは自由（正解チェックはしない）。選んだら「この選択でDFはどうなる？」を短く。</div>
      <div className="tb-choices" style={{marginTop: 12}}>
        {PV_TYPES.map(t => (
          <button key={t.id} className={`tb-choice ${type === t.id ? 'selected' : ''}`} onClick={() => setType(t.id)}>
            <div className="tb-choice-title">{t.label}</div>
            <div className="tb-choice-desc">{t.desc}</div>
          </button>
        ))}
      </div>
      <div className="tb-field" style={{marginTop: 14}}>
        <div className="tb-field-label">予測：この選択でDFはどうなる？（任意・短文）</div>
        <input type="text" value={predict} onChange={e => setPredict(e.target.value)} placeholder="例：重心が自分に残って隣が空く" />
      </div>
      <button className="tb-next-btn" style={{marginTop: 16}} disabled={!type} onClick={() => setStage('result')}>
        記入を確定 → プレーへ
      </button>
    </React.Fragment>

  // stage === 'result'
  return (
    <React.Fragment>
      <div className="tb-q-label">STEP 3 / 3 ─ プレーの後に記入</div>

      <div className="tb-q-hint">選択：{pivot} → {pvTypeLabel(type)}（{pvAxisLabel({ axis1, axis2 })}）{predict ? `｜予測:${predict}` : ''}</div>

      <div className="plan-themes">
        {PV_CUES.map(c => (
          <button key={c.id} className={`plan-theme-chip ${cues.includes(c.id) ? 'active' : ''}`}

      </div>
      <div className="tb-field-label" style={{marginTop: 14}}>結果</div>
      <div className="pv-result-row">

      <button className="tb-ghost-btn" style={{marginTop: 12}} onClick={() => setStage('predict')}>← 類型・予測をやり直す</button>
    </React.Fragment>
  );
}

          入力はユニット内のバック陣が兼任。結果は事実のみ（うまい下手の話ではない）。どの類型を選ぶかは自由＝正解チェックはしない。</div>

        <div className="tb-card" style={{marginTop: 16}}>

          {players.pivots.map(pv => {
            const mineW = weekRecs.filter(r => r.pivot === pv);

    </React.Fragment>
  );
}

        // 取得できる→壊れたSWを迂回してセクションを再構築する。リロードしないので競合・ちらつき・ループが起きない。
        if (allSections.length < 50 && navigator.serviceWorker && navigator.serviceWorker.controller) {

            const retry = [];

              retry.sort((a, b) => (a.fileId !== b.fileId ? a.fileId.localeCompare(b.fileId) : 0));

             s.fileTitle.toLowerCase().includes(q);
    });
    if (!q) return filtered;
    // スコア付け：title完全一致=4 / title前方一致=3 / title部分一致=2 / body一致=1
    const score = (s) => {

    const inFile = dictSections.filter(s => s.fileId === related.fileId);
    // 1. 完全一致
    let hit = inFile.find(s => s.title === related.match);
    if (hit) return hit;
    // 2. 先頭一致
    hit = inFile.find(s => s.title.startsWith(related.match));
    if (hit) return hit;
    // 3. 部分一致
    hit = inFile.find(s => s.title.includes(related.match));
    if (hit) return hit;
    // 4. 「A】DF個人...」形式のmatch → 【A】が「A. 」に変換されているため前置詞を除去して再探索
    const stripped = related.match.replace(/^[A-Za-z0-9\-]+】\s*/, '');
    if (stripped !== related.match && stripped.length > 0) {
      hit = inFile.find(s => s.title.includes(stripped));
      if (hit) return hit;
    }
    // 5. body内テキスト部分一致（最終fallback）
    return inFile.find(s => s.body && s.body.includes(related.match)) || null;
  };

            <div className="dict-detail-file">{dictDetail.fileIcon} {dictDetail.fileTitle}（{dictDetail.fileId}）</div>
            <div className="dict-detail-title">{dictDetail.title}</div>
            <div className="dict-detail-tags" style={{justifyContent: 'space-between', alignItems: 'center'}}>
              <div style={{display: 'flex', gap: 4, flexWrap: 'wrap', flex: 1}}>
                {dictDetail.fileTags.map(t => (
                  <span key={t} className="dict-detail-tag">{t}</span>
                ))}
              </div>
              <button
                className={`fav-btn ${dictFavs.includes(dictDetail.id) ? 'active' : ''}`}
                onClick={() => toggleFav(dictDetail.id)}
              >
                {dictFavs.includes(dictDetail.id) ? '★ お気に入り済み' : '☆ お気に入り'}
              </button>
            </div>
          </div>
          {dictQuery && (() => {
            // 詳細本文中のマッチ数 / 次のマッチへジャンプ
            const re = new RegExp(dictQuery.trim().replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
            const matchCount = (dictDetail.body.match(re) || []).length;
            if (matchCount === 0) return null;
            const jumpNext = () => {
              const marks = [...document.querySelectorAll('.dict-detail-body mark.search-hit')];
              if (!marks.length) return;
              const curIdx = marks.findIndex(m => m.classList.contains('current'));
              const nextIdx = (curIdx + 1) % marks.length;
              marks.forEach(m => m.classList.remove('current'));
              marks[nextIdx].classList.add('current');
              marks[nextIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
            };
            return (
              <div className="search-jump-bar" role="status">
                <span>🔍 「{dictQuery}」が {matchCount} 件</span>
                <button className="search-jump-btn" onClick={jumpNext}>↓ 次へ</button>
              </div>
            );
          })()}
          <div className="dict-detail-body" dangerouslySetInnerHTML={{__html: renderMarkdown(dictDetail.body, dictQuery)}} />
          {/* 同じファイルの他セクション */}
          {(() => {
            const related = dictSections.filter(s => s.fileId === dictDetail.fileId && s.id !== dictDetail.id).slice(0, 8);
            if (!related.length) return null;
            return (
              <div className="dict-detail-related" style={{padding: '0 18px 24px'}}>
                <div className="dict-detail-related-label">▶ 同じファイルの他セクション</div>
                {related.map(s => (
                  <div key={s.id} className="dict-related-item" onClick={() => handleDictSectionOpen(s)}>
                    {s.title}
                  </div>
                ))}
              </div>
            );
          })()}
        </div>
      )}

      {/* 質問チャット（辞書ボット） */}
      {phase === 'chat' && (
        <div className="chat-screen animate-in">
          <div className="chat-topbar">
            <button className="dict-back" onClick={handleBackToHub}>← 戻る（ホーム）</button>
            {chatMessages.length > 0 && (
              <button className="chat-clear" onClick={handleChatClear}>🗑 履歴クリア</button>
            )}
          </div>
          <div className="chat-note">📖 辞書{DICT_FILES.length}ファイル・{dictLoaded ? dictSections.length : DICT_SECTION_COUNT}セクションから探して回答します（通信なし・オフラインOK）</div>
          {!dictLoaded && !dictError && (
            <div className="dict-loading">📖 辞書を読み込み中… ({dictLoadedCount} / {DICT_FILES.length})</div>
          )}
          {dictError && (
            <div className="dict-empty">読み込みエラー：{dictError}</div>
          )}
          <div className="chat-messages">
            {chatMessages.length === 0 && (
              <div className="chat-msg bot">
                <div className="chat-avatar" aria-hidden="true">📖</div>
                <div className="chat-bubble bot">
                  <div className="chat-text">{'こんにちは！辞書チャットです。\n質問を入力すると、戦術辞書から該当する内容を探して答えます。たとえば👇'}</div>
                  <div className="chat-chips">
                    {CHAT_SUGGESTIONS.map(c => (
                      <button key={c} className="chat-chip" onClick={() => handleChatSend(c)} disabled={!dictLoaded}>{c}</button>
                    ))}
                  </div>
                </div>
              </div>
            )}
            {chatMessages.map((m, i) => m.role === 'user' ? (
              <div key={i} className="chat-msg user">
                <div className="chat-bubble user"><div className="chat-text">{m.text}</div></div>
              </div>
            ) : (
              <div key={i} className="chat-msg bot">
                <div className="chat-avatar" aria-hidden="true">📖</div>
                <div className="chat-bubble bot">
                  {m.kind === 'answer' ? (
                    <React.Fragment>
                      <button className="chat-src-head" onClick={() => handleChatOpenSection(m.head.id)}>
                        <span className="chat-src-head-file">{m.head.icon} {m.head.fileTitle}（{m.head.id.split('-')[0]}）</span>
                        <span className="chat-src-head-title">{m.head.title}</span>
                      </button>
                      <div className="chat-md" dangerouslySetInnerHTML={{ __html: m.html }} />
                      <button className="chat-readmore" onClick={() => handleChatOpenSection(m.head.id)}>📖 全文を読む</button>
                      {m.srcs && m.srcs.length > 0 && (
                        <div className="chat-srcs">
                          <div className="chat-srcs-label">関連セクション</div>
                          {m.srcs.map(s => (
                            <button key={s.id} className="chat-src-card" onClick={() => handleChatOpenSection(s.id)}>
                              <span aria-hidden="true">{s.icon}</span>
                              <span className="chat-src-card-text">
                                <span className="chat-src-card-file">{s.fileTitle}</span>
                                <span className="chat-src-card-title">{s.title}</span>
                              </span>
                              <span className="chat-src-card-arrow" aria-hidden="true">›</span>
                            </button>
                          ))}
                        </div>
                      )}
                    </React.Fragment>
                  ) : (
                    <React.Fragment>
                      <div className="chat-text">{m.text}</div>
                      {m.chips && (
                        <div className="chat-chips">
                          {m.chips.map(c => (
                            <button key={c} className="chat-chip" onClick={() => handleChatSend(c)}>{c}</button>
                          ))}
                        </div>
                      )}
                    </React.Fragment>
                  )}
                </div>
              </div>
            ))}
            {chatTyping && (
              <div className="chat-msg bot">
                <div className="chat-avatar" aria-hidden="true">📖</div>
                <div className="chat-bubble bot chat-typing">
                  <span className="chat-dot"/><span className="chat-dot"/><span className="chat-dot"/>
                </div>
              </div>
            )}
            <div ref={chatEndRef} />
          </div>
          <div className="chat-input-bar">
            <input
              type="text"
              className="chat-input"
              enterKeyHint="send"
              placeholder={dictLoaded ? '質問を入力（例：5-1の攻略は？）' : '辞書を読み込み中…'}
              value={chatInput}
              disabled={!dictLoaded}
              onChange={e => setChatInput(e.target.value)}
              onKeyDown={e => {
                if (e.key === 'Enter' && !e.nativeEvent.isComposing) { e.preventDefault(); handleChatSend(); }
              }}
            />
            <button
              className="chat-send"
              onClick={() => handleChatSend()}
              disabled={!dictLoaded || !chatInput.trim() || chatTyping}
              aria-label="送信"
            >➤</button>
          </div>
        </div>
      )}

      {/* 課題を解決する（Phase 2A） */}
      {phase === 'solve' && (() => {
        const roleData = solveRole ? SOLVE_DATA[solveRole] : null;
        const catData = roleData && solveCategory
          ? roleData.categories.find(c => c.id === solveCategory) : null;
        // solveSymptom は通常 string id だが、稀に object/古い ID が来ることへの防御
        let symData = null;
        if (catData && solveSymptom) {
          const symId = typeof solveSymptom === 'string' ? solveSymptom : (solveSymptom?.id || null);
          symData = symId ? catData.symptoms.find(s => s.id === symId) : null;
        }
        // 整合性破れ：solveSymptom があるのに symData が無い→state リセット
        if (solveSymptom && catData && !symData) {
          // 次の再描画で症状リストに戻す
          setTimeout(() => setSolveSymptom(null), 0);
          return <div className="solve-screen"><div className="solve-loading">読み込み中…</div></div>;
        }
        // 整合性破れ：solveCategory があるのに catData が無い（旧データ等）→state リセット
        if (solveCategory && roleData && !catData) {
          setTimeout(() => { setSolveCategory(null); setSolveSymptom(null); }, 0);
          return <div className="solve-screen"><div className="solve-loading">読み込み中…</div></div>;
        }
        // 整合性破れ：solveRole があるのに roleData が無い→state リセット
        if (solveRole && !roleData) {
          setTimeout(() => { setSolveRole(null); setSolveCategory(null); setSolveSymptom(null); }, 0);
          return <div className="solve-screen"><div className="solve-loading">読み込み中…</div></div>;
        }

        // ステップ1：役割選択
        if (!solveRole) {
          // 履歴のフォーマット
          const fmtTime = (ts) => {
            const d = new Date(ts); const now = new Date();
            const diff = (now - d) / 1000;
            if (diff < 60) return 'いま';
            if (diff < 3600) return Math.floor(diff/60) + '分前';
            if (diff < 86400) return Math.floor(diff/3600) + '時間前';
            return Math.floor(diff/86400) + '日前';
          };
          return (
            <div className="solve-screen">
              <button className="dict-back" onClick={handleBackToHub}>← 戻る（ホーム）</button>
              <div className="solve-bar">
                <span className="solve-step-pill">STEP 1 / 3</span>
                <span className="solve-step-label">どの立場で相談</span>
              </div>
              <div className="step-dots">
                <span className="step-dot current"></span>
                <span className="step-bar"></span>
                <span className="step-dot"></span>
                <span className="step-bar"></span>
                <span className="step-dot"></span>
              </div>
              <div className="solve-title">あなたは？</div>
              <div className="solve-sub">立場に合わせて症状リストが変わります。</div>
              <div className="solve-role-grid">
                {Object.entries(SOLVE_DATA).map(([role, data]) => (
                  <button key={role} className="solve-role-btn" onClick={() => setSolveRole(role)}>
                    <span className="solve-role-icon">{data.icon}</span>
                    <span className="solve-role-label">{data.label}</span>
                  </button>
                ))}
              </div>

              {/* 最近の診断履歴 */}
              {solveHistory.length > 0 && (
                <div className="solve-history">
                  <div className="solve-history-label">▶ 最近の診断</div>
                  {solveHistory.slice(0, 3).map((h, i) => {
                    const roleData = SOLVE_DATA[h.role];
                    const catData = roleData?.categories.find(c => c.id === h.category);
                    const symData = catData?.symptoms.find(s => s.id === h.symptom);
                    if (!symData) return null;
                    return (
                      <div key={i} className="solve-history-item" onClick={() => handleSolveFromHistory(h)}>
                        <span style={{fontSize: 16}}>{catData.icon}</span>
                        <div className="solve-history-meta">
                          <div>{symData.title}</div>
                          <div className="solve-history-time">{roleData.icon} {fmtTime(h.ts)}</div>
                        </div>
                        <span style={{color: '#475569'}}>›</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        }

        // ステップ2：カテゴリ選択
        if (!solveCategory) {
          return (
            <div className="solve-screen">
              <button className="dict-back" onClick={() => setSolveRole(null)}>← 戻る（立場の選び直し）</button>
              <div className="solve-bar">
                <span className="solve-step-pill">STEP 2 / 3</span>
                <span className="solve-step-label">どんな種類の困りごと</span>
              </div>
              <div className="step-dots">
                <span className="step-dot done"></span>
                <span className="step-bar done"></span>
                <span className="step-dot current"></span>
                <span className="step-bar"></span>
                <span className="step-dot"></span>
              </div>
              <div className="solve-title">どこで困っている？</div>
              <div className="solve-sub">{roleData.label}</div>
              <div className="solve-cat-list">
                {roleData.categories.map(c => (
                  <button key={c.id} className="solve-cat-btn" onClick={() => setSolveCategory(c.id)}>
                    <span className="solve-cat-icon">{c.icon}</span>
                    <span className="solve-cat-title">{c.title}</span>
                  </button>
                ))}
              </div>

              {/* 該当なしフォールバック */}
              <div className="solve-fallback">
                <div className="solve-fallback-label">▶ ここにない／わからない場合</div>
                <button className="solve-fallback-btn" onClick={() => handleSolveToDict('')}>
                  📖 辞書を自由に検索する（キーワード／タグ）
                </button>
              </div>
            </div>
          );
        }

        // ステップ3：症状選択
        if (!solveSymptom) {
          return (
            <div className="solve-screen">
              <button className="dict-back" onClick={() => { setSolveCategory(null); setCriticalPosFilter(null); }}>← 戻る（カテゴリの選び直し）</button>
              <div className="solve-bar">
                <span className="solve-step-pill">STEP 3 / 3</span>
                <span className="solve-step-label">具体的な症状</span>
              </div>
              <div className="step-dots">
                <span className="step-dot done"></span>
                <span className="step-bar done"></span>
                <span className="step-dot done"></span>
                <span className="step-bar done"></span>
                <span className="step-dot current"></span>
              </div>
              <div className="solve-title">どれが一番近い？</div>
              <div className="solve-sub">{catData.icon} {catData.title}</div>
              {catData.id === 'critical' && (
                <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', margin: '8px 0 4px' }}>
                  {['すべて', 'SB', 'WB', 'CB', 'PV', 'GK', 'DF'].map(lbl => {
                    const val = lbl === 'すべて' ? null : lbl;
                    const active = criticalPosFilter === val;
                    return (
                      <button key={lbl} onClick={() => setCriticalPosFilter(val)}
                        style={{
                          padding: '4px 12px', borderRadius: 20, fontSize: 12, fontWeight: 800, cursor: 'pointer',
                          border: active ? '1.5px solid #818cf8' : '1px solid var(--border)',
                          background: active ? 'rgba(99,102,241,0.18)' : 'var(--surface-1)',
                          color: active ? '#c7d2fe' : 'var(--tx-muted)',
                          transition: 'all 0.15s',
                        }}>
                        {lbl}
                      </button>
                    );
                  })}
                </div>
              )}
              <div className="solve-sym-list">
                {catData.symptoms
                  .filter(s => catData.id !== 'critical' || !criticalPosFilter || s.title.startsWith('[' + criticalPosFilter + ']'))
                  .map(s => (
                    <button key={s.id} className="solve-sym-btn" onClick={() => {
                      setSolveSymptom(s.id);
                      addSolveHistory(solveRole, solveCategory, s.id);
                      saveResume('solve', { role: solveRole, category: solveCategory, symptom: s.id, symptomTitle: s.title });
                    }}>
                      <div className="solve-sym-title">{s.title}</div>
                      <div className="solve-sym-desc">{s.desc}</div>
                    </button>
                  ))
                }
              </div>

              {/* 該当なしフォールバック */}
              <div className="solve-fallback">
                <div className="solve-fallback-label">▶ どれもピンとこない場合</div>
                <button className="solve-fallback-btn" onClick={() => handleSolveToDict(catData.title.replace(/で困っている$/, ''))}>
                  📖 「{catData.title.replace(/で困っている$/, '')}」で辞書を検索する
                </button>
              </div>
            </div>
          );
        }

        // 処方箋（=結果）表示
        return (
          <div className="solve-screen">
            <button className="dict-back" onClick={() => setSolveSymptom(null)}>← 戻る（症状を選び直す）</button>
            <div className="solve-bar">
              <span className="solve-step-pill">✓ 完了（アドバイス）</span>
              <span className="solve-step-label">辞書からのヒント</span>
            </div>
            <div className="step-dots">
              <span className="step-dot done"></span>
              <span className="step-bar done"></span>
              <span className="step-dot done"></span>
              <span className="step-bar done"></span>
              <span className="step-dot done"></span>
            </div>
            <div className="solve-rx">
              {/* 症状サマリー */}
              <div className="solve-rx-card">
                <div className="solve-rx-label">⚠ 困っていること</div>
                <GText as="div" className="solve-rx-title" text={symData.title} />
                <GText as="div" className="solve-rx-desc" text={symData.desc} />
              </div>
              {/* 具体的アクション */}
              <div className="solve-rx-card">
                <div className="solve-rx-label">✓ 試してみよう（具体的アクション）</div>
                <div className="solve-rx-actions">
                  {symData.actions.map((a, i) => (
                    <div key={i} className="solve-rx-action">
                      <span className="solve-rx-action-num">{i + 1}</span>
                      <GText text={a} />
                    </div>
                  ))}
                </div>
                {/* アクションに①〜⑦が含まれていたらフェイント凡例を出す */}
                {symData.actions.some(a => /[①②③④⑤⑥⑦]/.test(a)) && (
                  <div className="feint-legend">
                    <div className="feint-legend-label">🔖 フェイント番号の意味（①〜⑦）</div>
                    <div className="feint-legend-grid">
                      {FEINT_LEGEND.map(f => (
                        <div key={f.n} className="feint-legend-row">
                          <span className="feint-legend-num">{f.n}</span>
                          <span className="feint-legend-name">{f.name}</span>
                          <span className="feint-legend-desc">{f.desc}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
              {/* 関連辞書 */}
              <div className="solve-rx-card">
                <div className="solve-rx-label">📖 関連する辞書セクション</div>
                {dictLoaded ? (
                  <div className="solve-rx-related-list">
                    {symData.related.map((r, i) => {
                      const fileMeta = DICT_FILES.find(f => f.id === r.fileId);
                      const section = findRelatedSection(r);
                      return (
                        <div
                          key={i}
                          className="solve-rx-related-item"
                          onClick={() => handleOpenRelated(r)}
                        >
                          <span className="solve-rx-related-icon">{fileMeta?.icon}</span>
                          <div className="solve-rx-related-meta">
                            <div className="solve-rx-related-file">{r.fileId} / {fileMeta?.title}</div>
                            <div className="solve-rx-related-title">{section ? section.title : `「${r.match}」で検索 →`}</div>
                          </div>
                          <span className="solve-rx-arrow">›</span>
                        </div>
                      );
                    })}
                  </div>
                ) : (
                  <div className="solve-rx-missing">辞書を読み込み中…</div>
                )}
              </div>
            </div>
            {/* 操作ボタン */}
            <button className="reset-btn" style={{borderColor: '#6b21a8', color: '#c084fc', marginTop: 8}} onClick={handleSolveReset}>
              ← もう一度診断する
            </button>
            <button className="reset-btn" style={{marginTop: 6}} onClick={handleBackToHub}>
              ホームに戻る
            </button>
          </div>
        );
      })()}

      {/* 練習を組む（Phase 2B） */}
      {phase === 'plan' && !planResult && (
        <div className="plan-screen">
          <button className="dict-back" onClick={handleBackToHub}>← 戻る（ホーム）</button>

          {/* STEPインジケーター：1=ポジション(done固定), 2=テーマ, 3=レベル, 4=時間 */}
          <div className="step-dots plan">
            <span className="step-dot done"></span>
            <span className="step-bar done"></span>
            <span className={`step-dot ${planThemes.length > 0 ? 'done' : 'current'}`}></span>
            <span className={`step-bar ${planThemes.length > 0 ? 'done' : ''}`}></span>
            <span className={`step-dot ${planThemes.length > 0 ? 'done' : ''}`}></span>
            <span className={`step-bar ${planThemes.length > 0 ? 'done' : ''}`}></span>
            <span className={`step-dot ${planThemes.length > 0 ? 'current' : ''}`}></span>
          </div>

          {/* STEP 1：ポジション選択 */}
          <div className="solve-bar"><span className="plan-step-pill">STEP 1 / 4</span><span className="plan-step-label">ポジション（任意）</span></div>
          <div className="plan-title">誰の練習？</div>
          <div className="plan-sub">選ぶと推奨テーマに★が付きます。チーム全体の場合はそのまま。</div>
          <div className="plan-pos-chips">
            {POSITIONS.map(p => (
              <button key={p.id} className={`plan-pos-chip ${planPosition === p.id ? 'active' : ''}`}
                onClick={() => setPlanPosition(prev => prev === p.id && p.id !== 'all' ? 'all' : p.id)}>
                <span className="plan-pos-chip-icon">{p.icon}</span>{p.label}
              </button>
            ))}
          </div>

          {/* STEP 2：テーマ複数選択 */}
          <div className="solve-bar" style={{marginTop: 4}}><span className="plan-step-pill">STEP 2 / 4</span><span className="plan-step-label">テーマ（複数可）</span></div>
          <div className="plan-title">何を強化する？</div>
          <div className="plan-sub">複数選んでOK。★はポジション推奨テーマ。練習時間は自動配分されます。</div>
          {/* 一括選択ボタン（ポジション選択時のみ表示） */}
          {planPosition !== 'all' && (() => {
            const recs = POSITION_RECOMMENDED[planPosition] || [];
            const posLabel = POSITIONS.find(p => p.id === planPosition)?.label || '';
            const allSelected = recs.length > 0 && recs.every(id => planThemes.includes(id));
            return (
              <button className="plan-rec-select-btn" onClick={() => {
                if (allSelected) {
                  setPlanThemes(prev => prev.filter(id => !recs.includes(id)));
                } else {
                  setPlanThemes(prev => [...new Set([...prev, ...recs])]);
                }
              }}>
                {allSelected ? '✓ ' : '⚡ '}{posLabel} 推奨テーマを{allSelected ? '解除' : '一括選択'}（{recs.length}件）
              </button>
            );
          })()}
          <div className="plan-themes">
            {DRILL_THEMES.map(t => {
              const recs = POSITION_RECOMMENDED[planPosition] || [];
              const isRec = recs.includes(t.id);
              // ポジション専用テーマには所属ポジションのバッジを表示
              const posOwner = t.forPositions

              ))}
            </div>

          </button>

          {/* STEP 3：レベル選択 */}
          <div className="solve-bar" style={{marginTop: 8}}><span className="plan-step-pill">STEP 3 / 4</span><span className="plan-step-label">レベル</span></div>
          <div className="plan-levels">
            {LEVELS.map(l => (
              <button key={l.id} className={`plan-level-btn ${planLevel === l.id ? 'active' : ''}`} onClick={() => setPlanLevel(l.id)}>

                <span className="plan-level-desc">{l.desc}</span>
              </button>

          <button className="plan-gen-btn" disabled={planThemes.length === 0} onClick={handleGeneratePlan}>

                    </div>
                    <div className="plan-saved-detail">
                      {sv.position && sv.position !== 'all' && <>{POSITIONS.find(p => p.id === sv.position)?.icon}{' '}</>}
                      {sv.duration}分 / {LEVELS.find(l => l.id === sv.level)?.label} /
                      {' '}{sv.themes.map(tid => DRILL_THEMES.find(t => t.id === tid)?.icon).filter(Boolean).join(' ')}

                  </div>
                  <span style={{color: '#475569'}}>›</span>
                </div>
              ))}
            </div>
          )}

      {/* 練習プラン表示 */}

          <button className="dict-back" onClick={handlePlanReset}>← 戻る（条件を変更）</button>

                {LEVELS.find(l => l.id === planLevel)?.label} ／
                {' '}テーマ: {planThemes.map(tid => DRILL_THEMES.find(t => t.id === tid)?.label).filter(Boolean).join('・')}
              </div>
            </div>

            <div className="plan-aim">🎯 狙い：{generatePlanAim(planThemes, planLevel, planPosition)}</div>

                  <strong>{POSITIONS.find(p => p.id === planPosition)?.label} 特化ドリル</strong>を適用中 — このポジションに最適化された練習内容が表示されています
                </span>
              </div>
            )}

            {/* スキル練習 vs エコロジカルの凡例 */}
            <details className="plan-eco-banner" style={{padding: 0}}>
              <summary style={{cursor: 'pointer', padding: '8px 12px', listStyle: 'none', color: 'var(--c-dict)', fontSize: 11, fontWeight: 800}}>
                📌 練習タイプの読み方（スキル／エコロジカル）— 詳しく見る
              </summary>
              <div style={{padding: '0 12px 12px', borderTop: '1px solid rgba(34,211,238,0.2)', marginTop: 4, paddingTop: 8}}>
                <div style={{marginBottom: 8, fontSize: 11, color: '#94a3b8', lineHeight: 1.6}}>
                  どちらも<strong style={{color:'#67e8f9'}}>相手と勝負する</strong>練習です。勝負がないと表裏一体にはなりません。

                </div>

                </div>
                <div style={{marginTop: 2, display: 'flex', gap: 6, flexWrap: 'wrap'}}>
                  <span style={{background: '#155e75', color: '#67e8f9', fontSize: 10, padding: '2px 6px', borderRadius: 4, fontWeight: 700}}>環境</span>
                  <span style={{fontSize: 11}}>=道具・配置（コーン・スペース・対戦相手の動き）</span>

                <div style={{marginTop: 2, display: 'flex', gap: 6, flexWrap: 'wrap'}}>

                </div>
                <div
                  style={{marginTop: 8, color: '#67e8f9', fontSize: 11, fontWeight: 700, cursor: 'pointer', textDecoration: 'underline'}}

                </div>
              </div>

              </div>

                  <span>{b.theme.icon}</span>

                  <div key={j} className="plan-item" onClick={() => handlePlanItemOpen(it)}>
                    <div className="plan-item-row">
                      <span className="plan-item-time">{it.minutes}分</span>
                      <span className="plan-item-title">{it.title}</span>

                      <div className="plan-training-note">

                          <div key={ci} className="plan-constraint-item">
                            <span className="plan-constraint-tag">{c.type}</span>
                            <span>{c.text}</span>
                          </div>

                      </div>

                  </div>

              return (
                <div className="plan-block">
                  <div className="plan-block-title">
                    <span>🛠</span><span>自作課題</span>
                    <span className="plan-block-time">＋約{myTasks.length * 15}分</span>
                  </div>
                  {myTasks.map(t => (
                    <div key={t.id} className="plan-item" onClick={() => { setTbView({ name: 'detail', id: t.id }); setPhase('build'); setTimeout(() => window.scrollTo(0, 0), 0); }}>
                      <div className="plan-item-row">
                        <span className="plan-item-time">15分</span>
                        <span className="plan-item-title">{t.name}{(t.version || 1) > 1 ? ` v${t.version}` : ''}</span>
                        <span className="plan-item-arrow">›</span>
                      </div>
                      <div style={{marginTop: 4}}>
                        <span className="plan-drill-type eco">🌿 エコロジカル（自作）</span>
                      </div>
                      <div className="plan-item-desc">{TB_CONSTRAINTS.find(c => c.id === t.constraintId)?.name}：{t.constraintDetail}</div>
                      <div className="plan-constraints">
                        <div className="plan-constraints-label">📌 成功の定義（{t.attempts}本・ペアが観察）</div>
                        <div className="plan-constraint-item"><span className="plan-constraint-tag">結果</span><span>{t.successResult}</span></div>
                        <div className="plan-constraint-item"><span className="plan-constraint-tag">過程</span><span>{t.successProcess}</span></div>
                      </div>
                    </div>
                  ))}
                </div>
              );
            })()}

              <div className="plan-wc">
                <div><span className="plan-wc-label">▶ クールダウン</span><span className="plan-wc-time">{planResult.cooldown.minutes}分</span></div>
                <div className="plan-wc-desc">{planResult.cooldown.desc}</div>
              </div>

            {planResult.mismatch > 0 && (
              <div className="plan-extra">
                ＋ 余裕 {planResult.mismatch} 分：休憩・追加練習・質疑応答・ストレッチ等で活用
              </div>

              <div className="plan-extra" style={{borderColor: '#7f1d1d', color: '#fca5a5'}}>
                ⚠ {Math.abs(planResult.mismatch)} 分オーバー：時間調整が必要です（メニュー削減 or 時間延長）
              </div>
            )}
          </div>

          {/* 操作ボタン：印刷を主役に */}
          <div className="plan-actions">
            <button className="plan-action-btn primary" onClick={() => window.print()}>🖨 印刷</button>
            <button className="plan-action-btn" onClick={handlePlanCopy}>📋 コピー</button>
            <button className="plan-action-btn" onClick={() => handlePlanSave(null)}>★ 保存</button>
          </div>
          {/* タグ付き保存（時系列ラベル） */}
          <div className="plan-actions" style={{marginTop: 4}}>
            <button className="plan-action-btn" style={{fontSize: 11}} onClick={() => handlePlanSave('今日')}>📅 今日として保存</button>
            <button className="plan-action-btn" style={{fontSize: 11}} onClick={() => handlePlanSave('明日')}>📅 明日として保存</button>
            <button className="plan-action-btn" style={{fontSize: 11}} onClick={() => handlePlanSave('来週')}>📅 来週として保存</button>
          </div>
          <button className="reset-btn" style={{marginTop: 6}} onClick={handlePlanReset}>条件を変更</button>
          <button className="reset-btn" style={{marginTop: 4}} onClick={handleBackToHub}>← ホームに戻る</button>

          {/* トースト */}
          {planCopyMsg && <div className="plan-toast">{planCopyMsg}</div>}
        </div>
      )}

      {/* 用語集FAB（全画面で表示：オンボーディング案内と整合） */}
      <button
        className="help-fab"
        style={phase === 'chat' ? { bottom: 'calc(var(--nav-h) + 80px + env(safe-area-inset-bottom, 0px))' } : undefined}
        onClick={() => setGlossaryOpen(true)} title="用語集" aria-label="用語集を開く"
      >📘 用語</button>

      {/* 用語集モーダル */}
      {glossaryOpen && (
        <div className="glossary-overlay" onClick={() => { setGlossaryOpen(false); setGlossaryHighlight(null); setGlossaryQuery(''); }}>
          <div className="glossary-modal" onClick={e => e.stopPropagation()}>
            <div className="glossary-head">
              <span className="glossary-title">📘 用語集</span>
              <button className="glossary-close" onClick={() => { setGlossaryOpen(false); setGlossaryHighlight(null); setGlossaryQuery(''); }} aria-label="閉じる">×</button>
            </div>
            <div className="glossary-search">
              <input
                type="text"
                value={glossaryQuery}
                placeholder="🔍 用語をさがす（例: フェイント、6-0）"
                onChange={e => setGlossaryQuery(e.target.value)}
                aria-label="用語集内を検索"
              />
            </div>
            <div className="glossary-body">
              {(() => {
                const q = glossaryQuery.trim().toLowerCase();
                const shown = GLOSSARY
                  .map(g => ({ ...g, items: q ? g.items.filter(it => (it.term + it.desc).toLowerCase().includes(q)) : g.items }))
                  .filter(g => g.items.length > 0);
                if (!shown.length) return <div className="glossary-empty">「{glossaryQuery}」に一致する用語はありません</div>;
                return shown.map((g, gi) => (
                <div key={gi}>
                  <div className="glossary-group">{g.group}</div>
                  {g.items.map((it, ii) => {
                    const key = it.term.replace(/[（(].*$/, '').trim();
                    const isHi = glossaryHighlight === key;
                    return (
                      <div key={ii} className="glossary-item" data-glossary-key={key}
                        style={isHi ? {background: 'rgba(34,211,238,0.15)', borderRadius: 6, padding: 4, margin: '-4px 0', transition: 'background .3s'} : {}}>
                        <div className="glossary-term">{it.term}</div>
                        <div className="glossary-desc">{it.desc}</div>
                      </div>
                    );
                  })}
                </div>
                ));
              })()}
            </div>
          </div>
        </div>
      )}

      {/* スタート画面（振り返るモード入口・グループ表示） */}
      {phase === 'start' && (() => {
        const MODE_GROUPS = [
          { label: '🟦 自分のプレー', ids: ['of', 'df', 'gk_self', 'skill'] },
          { label: '🟢 特殊場面',     ids: ['physical', 'shot_7m', 'sign'] },
          { label: '🟠 対戦・分析',   ids: ['context', 'janken', 'gk'] },
        ];
        return (
          <div className="start-screen">
            <button className="dict-back" style={{alignSelf: 'flex-start', padding: '4px 0'}} onClick={handleBackToHub}>← 戻る（ホーム）</button>

            <div className="start-title">今日の自分と<br />向き合う</div>
            <div className="start-sub">どのモードで振り返る？</div>

              {MODE_GROUPS.map(g => (
                <div key={g.label} style={{display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 4}}>

                    {g.label}
                  </div>
                  {g.ids.map(key => {
                    const m = MODES[key];
                    if (!m) return null;
                    return (
                      <button key={key} className="mode-btn" onClick={() => handleModeSelect(key)}>
                        <div className="mode-btn-icon">{m.icon}</div>
                        <div className="mode-btn-text">
                          <div className="mode-btn-label" style={{ color: m.color }}>{m.label}</div>
                          <div className="mode-btn-desc">{m.desc}</div>
                        </div>
                      </button>
                    );
                  })}
                </div>
              ))}
            </div>
          </div>
        );
      })()}


      {/* 問い */}
      {phase === 'question' && q && (
        <div className="content">
          {history.length > 0 && (
            <div className="breadcrumb">
              {history.map((h, i) => <span key={i} className="crumb">{h.text}</span>)}
            </div>
          )}
          <div>
            {AXIS_MAP[currentQ] && (() => {
              const s = axisStyle(AXIS_MAP[currentQ]);
              return (
                <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: '0.1em', color: s.color, border: s.border, borderRadius: 6, padding: '2px 8px', display: 'inline-block', marginBottom: 6, background: '#0f172a' }}>
                  {AXIS_MAP[currentQ]}
                </div>

            <div className="q-label">{q.label}</div>
            <div className="q-text">{q.text}</div>
            {q.hint && <div className="q-hint">{q.hint}</div>}
          </div>
          <div className="choices">
            {q.choices.map((c, i) => (
              <button key={i}
                className={`choice-btn ${selected === i ? 'selected' : ''}`}
                onClick={() => handleChoice(i)}>
                {c.label}
              </button>
            ))}
          </div>
          <button className="next-btn" disabled={selected === null} onClick={handleNext}>
            次へ →
          </button>
        </div>
      )}

      {/* 結果（3部構成） */}
      {phase === 'result' && result && (
        <div className="content">
          {history.length > 0 && (
            <div className="breadcrumb">
              {history.map((h, i) => <span key={i} className="crumb">{h.text}</span>)}
            </div>
          )}

          <div className="result-sections">
            {/* 良かった */}
            <div className="rs good">
              <div className="rs-label">✓ 良かった点</div>
              <GText as="div" className="rs-body" text={result.good} />
            </div>

            {/* 課題 */}
            <div className="rs issue">
              <div className="rs-label">△ 課題</div>
              <GText as="div" className="rs-title" text={result.issue} />

            </div>

            <div className="rs improve">
              <div className="rs-label">▶ 改善案</div>
              <GText as="div" className="rs-body" text={result.improve} />
              {result.approaches && result.approaches.length > 0 && (
                <div className="approach-section">

                    <div key={i} className="approach-item">
                      <div className="approach-tag">{a.tag}</div>
                      <GText as="div" className="approach-text" text={a.text} />
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>

          {mode !== 'context' && mode !== 'janken' && mode !== 'gk' && (
            <div className="next-step-section">
              <div className="next-step-label">次のプレーで一つだけ試すことを書く</div>
