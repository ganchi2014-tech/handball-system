<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ハンドボール 自己問答</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    #root { min-height: 100vh; }
    .app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .header {
      background: #1e293b;
      padding: 14px 20px 10px;
      border-bottom: 1px solid #334155;
      position: sticky; top: 0; z-index: 10;
    }
    .header-row { display: flex; align-items: center; justify-content: space-between; }
    .header-title { font-size: 12px; font-weight: 700; color: #64748b; letter-spacing: 0.1em; text-transform: uppercase; }
    .header-mode { font-size: 11px; color: #3b82f6; font-weight: 700; background: #1e3a5f; padding: 2px 8px; border-radius: 6px; }
    .progress-bar { margin-top: 8px; height: 2px; background: #334155; border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #06b6d4); border-radius: 2px; transition: width 0.4s ease; }

    /* Start screen */
    .start-screen {
      flex: 1; display: flex; flex-direction: column; justify-content: center;
      align-items: center; text-align: center; gap: 28px; padding: 40px 24px;
    }
    .start-icon { font-size: 52px; }
    .start-title { font-size: 22px; font-weight: 800; color: #f1f5f9; line-height: 1.4; }
    .start-sub { font-size: 14px; color: #64748b; line-height: 1.8; }
    .mode-select { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 320px; }
    .mode-btn {
      background: #1e293b; border: 1.5px solid #334155; border-radius: 14px;
      padding: 16px 20px; text-align: left; color: #e2e8f0;
      cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 14px;
    }
    .mode-btn:active { background: #1e3a5f; border-color: #3b82f6; transform: scale(0.98); }
    .mode-btn-icon { font-size: 24px; flex-shrink: 0; }
    .mode-btn-text { display: flex; flex-direction: column; gap: 2px; }
    .mode-btn-label { font-size: 15px; font-weight: 700; }
    .mode-btn-desc { font-size: 12px; color: #64748b; }

    /* Content */
    .content { flex: 1; padding: 20px 20px 36px; display: flex; flex-direction: column; gap: 20px; }

    /* Q0 感情トリガー */
    .emotion-screen {
      flex: 1; display: flex; flex-direction: column; justify-content: center;
      gap: 24px; padding: 24px 20px;
    }
    .emotion-title { font-size: 20px; font-weight: 800; color: #f1f5f9; line-height: 1.5; text-align: center; }
    .emotion-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .emotion-btn {
      background: #1e293b; border: 1.5px solid #334155; border-radius: 14px;
      padding: 18px 12px; text-align: center; cursor: pointer;
      transition: all 0.15s; display: flex; flex-direction: column; gap: 6px; align-items: center;
    }
    .emotion-btn:active { transform: scale(0.96); }
    .emotion-btn.bad { border-color: #ef4444; background: #1f1315; }
    .emotion-btn.good { border-color: #22c55e; background: #0f1f15; }
    .emotion-btn.confused { border-color: #f59e0b; background: #1f1a0f; }
    .emotion-btn.blank { border-color: #64748b; background: #1a1f2e; }
    .emotion-emoji { font-size: 28px; }
    .emotion-label { font-size: 13px; font-weight: 700; }
    .emotion-btn.bad .emotion-label { color: #fca5a5; }
    .emotion-btn.good .emotion-label { color: #86efac; }
    .emotion-btn.confused .emotion-label { color: #fcd34d; }
    .emotion-btn.blank .emotion-label { color: #94a3b8; }
    .skip-btn {
      background: transparent; border: none; color: #475569; font-size: 13px;
      cursor: pointer; padding: 8px; text-align: center;
    }

    /* Question */
    .q-label { font-size: 11px; font-weight: 800; color: #3b82f6; letter-spacing: 0.1em; text-transform: uppercase; }
    .q-text { font-size: 18px; font-weight: 700; color: #f1f5f9; line-height: 1.6; margin-top: 6px; }
    .q-hint { font-size: 12px; color: #475569; line-height: 1.6; margin-top: 8px; background: #1e293b; border-radius: 8px; padding: 10px 12px; }

    .choices { display: flex; flex-direction: column; gap: 10px; }
    .choice-btn {
      background: #1e293b; border: 1.5px solid #334155; border-radius: 12px;
      padding: 14px 16px; text-align: left; color: #e2e8f0;
      font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; line-height: 1.5;
    }
    .choice-btn:active { background: #1e3a5f; border-color: #3b82f6; transform: scale(0.98); }
    .choice-btn.selected { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }

    .free-input {
      width: 100%; background: #1e293b; border: 1.5px solid #334155;
      border-radius: 12px; padding: 12px 14px; color: #e2e8f0;
      font-size: 14px; font-family: inherit; resize: none; min-height: 72px;
      outline: none; transition: border-color 0.15s;
    }
    .free-input:focus { border-color: #3b82f6; }
    .free-input::placeholder { color: #475569; }
    .free-label { font-size: 12px; color: #475569; margin-bottom: 6px; }

    .next-btn {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white;
      border: none; border-radius: 12px; padding: 15px; font-size: 15px;
      font-weight: 700; cursor: pointer; width: 100%; transition: all 0.15s;
    }
    .next-btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .next-btn:not(:disabled):active { transform: scale(0.97); opacity: 0.9; }

    /* Insight / Result screen */
    .insight-card {
      background: linear-gradient(135deg, #1e3a5f, #1e293b);
      border: 1.5px solid #3b82f6; border-radius: 16px; padding: 20px;
    }
    .insight-label { font-size: 11px; font-weight: 800; color: #3b82f6; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
    .insight-title { font-size: 17px; font-weight: 800; color: #f1f5f9; line-height: 1.4; margin-bottom: 10px; }
    .insight-body { font-size: 14px; color: #94a3b8; line-height: 1.8; }

    /* Ecological situation */
    .eco-section { display: flex; flex-direction: column; gap: 10px; }
    .eco-header { font-size: 12px; font-weight: 700; color: #06b6d4; letter-spacing: 0.08em; text-transform: uppercase; }
    .eco-card {
      background: #0d2436; border: 1.5px solid #164e63; border-radius: 12px; padding: 14px 16px;
    }
    .eco-situation { font-size: 14px; color: #a5f3fc; line-height: 1.7; font-weight: 600; margin-bottom: 10px; }
    .eco-divider { font-size: 11px; color: #475569; margin: 8px 0 10px; text-transform: uppercase; letter-spacing: 0.08em; }
    .approach-list { display: flex; flex-direction: column; gap: 8px; }
    .approach-item {
      background: #1e293b; border-radius: 10px; padding: 12px 14px;
      border-left: 3px solid #334155; cursor: pointer; transition: all 0.15s;
    }
    .approach-item:active { border-left-color: #3b82f6; background: #1e3a5f; }
    .approach-tag { font-size: 11px; font-weight: 700; color: #64748b; margin-bottom: 4px; }
    .approach-text { font-size: 13px; color: #cbd5e1; line-height: 1.6; }

    /* Next step write */
    .next-step-section { display: flex; flex-direction: column; gap: 10px; }
    .next-step-label { font-size: 13px; font-weight: 700; color: #f1f5f9; }
    .next-step-hint { font-size: 12px; color: #64748b; }
    .next-step-input {
      width: 100%; background: #1e293b; border: 1.5px solid #3b82f6;
      border-radius: 12px; padding: 14px; color: #e2e8f0;
      font-size: 14px; font-family: inherit; resize: none; min-height: 88px;
      outline: none;
    }
    .next-step-input::placeholder { color: #475569; }

    .reset-btn {
      background: transparent; border: 1.5px solid #334155; border-radius: 12px;
      padding: 14px; font-size: 14px; font-weight: 600; color: #64748b;
      cursor: pointer; width: 100%; transition: all 0.15s;
    }
    .reset-btn:active { background: #1e293b; color: #94a3b8; }

    /* Breadcrumb */
    .breadcrumb { display: flex; gap: 4px; flex-wrap: wrap; }
    .crumb { font-size: 11px; color: #475569; background: #1e293b; border-radius: 6px; padding: 2px 8px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

  qd1: {

};

// ─────────────────────────────────────────────
// 結果・気づき・エコロジカル練習の定義
// ─────────────────────────────────────────────

// ─────────────────────────────────────────────
// モード設定
// ─────────────────────────────────────────────
const MODES = {
  of: { label: 'OF', color: '#3b82f6', firstQ: 'q1' },
  df: { label: 'DF', color: '#ef4444', firstQ: 'qd1' },
  skill: { label: 'スキル', color: '#a78bfa', firstQ: 'qs1' },
};

const EMOTIONS = [
  { id: 'bad', emoji: '😤', label: '悔しい', cls: 'bad' },
  { id: 'good', emoji: '😊', label: 'よかった', cls: 'good' },
  { id: 'confused', emoji: '😕', label: '迷った', cls: 'confused' },
  { id: 'blank', emoji: '😶', label: 'わからん', cls: 'blank' },
];

function getProgress(phase, histLen) {
  if (phase === 'start') return 0;
  if (phase === 'result') return 100;
  if (phase === 'emotion') return 10;
  return Math.min(20 + histLen * 20, 85);
}

// ─────────────────────────────────────────────
// App
// ─────────────────────────────────────────────
function App() {
  const [phase, setPhase] = useState('start'); // start|emotion|question|result
  const [mode, setMode] = useState(null);
  const [emotion, setEmotion] = useState(null);
  const [currentQ, setCurrentQ] = useState(null);
  const [selected, setSelected] = useState(null);
  const [history, setHistory] = useState([]);
  const [resultId, setResultId] = useState(null);
  const [nextStep, setNextStep] = useState('');

  const progress = getProgress(phase, history.length);
  const modeInfo = mode ? MODES[mode] : null;

  const handleModeSelect = (m) => {
    setMode(m);
    setPhase('emotion');
  };

  const handleEmotion = (e) => {
    setEmotion(e);
    setCurrentQ(MODES[mode].firstQ);
    setPhase('question');
  };

  const handleChoice = (i) => setSelected(i);

  const handleNext = () => {
    const q = QUESTIONS[currentQ];
    const choice = q.choices[selected];
    const newHist = [...history, { label: q.label, text: choice.label.split('　')[0] }];
    setHistory(newHist);
    setSelected(null);
    if (RESULTS[choice.next]) {
      setResultId(choice.next);
      setPhase('result');
    } else if (QUESTIONS[choice.next]) {
      setCurrentQ(choice.next);
    }
  };

  const handleReset = () => {
    setPhase('start'); setMode(null); setEmotion(null);
    setCurrentQ(null); setSelected(null); setHistory([]);
    setResultId(null); setNextStep('');
  };

  const result = resultId ? RESULTS[resultId] : null;
  const q = currentQ ? QUESTIONS[currentQ] : null;

  return (
    <div className="app">
      <div className="header">
        <div className="header-row">
          <div className="header-title">ハンドボール 自己問答</div>
          {modeInfo && <div className="header-mode" style={{ color: modeInfo.color }}>{modeInfo.label}</div>}
        </div>
        <div className="progress-bar">
          <div className="progress-fill" style={{ width: `${progress}%` }} />
        </div>
      </div>

      {/* スタート画面 */}
      {phase === 'start' && (
        <div className="start-screen">
          <div className="start-icon">🤾</div>
          <div className="start-title">今日の自分と<br />向き合う</div>
          <div className="start-sub">どの場面を振り返る？</div>
          <div className="mode-select">
            {Object.entries(MODES).map(([key, m]) => (
              <button key={key} className="mode-btn" onClick={() => handleModeSelect(key)}>
                <div className="mode-btn-icon">
                  {key === 'of' ? '⚡' : key === 'df' ? '🛡️' : '🎯'}
                </div>
                <div className="mode-btn-text">
                  <div className="mode-btn-label" style={{ color: m.color }}>{m.label}</div>
                  <div className="mode-btn-desc">
                    {key === 'of' ? 'もらい出し・判断・アクション' : key === 'df' ? '守備・連動・読み' : 'パス・シュート・1対1'}
                  </div>
                </div>
              </button>
            ))}
          </div>
        </div>
      )}

      {/* 感情トリガー */}
      {phase === 'emotion' && (
        <div className="emotion-screen">
          <div className="emotion-title">そのプレーで<br />何を感じた？</div>
          <div className="emotion-grid">
            {EMOTIONS.map(e => (
              <button key={e.id} className={`emotion-btn ${e.cls}`} onClick={() => handleEmotion(e.id)}>
                <div className="emotion-emoji">{e.emoji}</div>
                <div className="emotion-label">{e.label}</div>
              </button>
            ))}
          </div>
          <button className="skip-btn" onClick={() => handleEmotion('none')}>
            感情は関係なく振り返る →
          </button>
        </div>
      )}

      {/* 問い */}
      {phase === 'question' && q && (
        <div className="content">
          {history.length > 0 && (
            <div className="breadcrumb">
              {history.map((h, i) => <span key={i} className="crumb">{h.text}</span>)}
            </div>
          )}
          <div>
            <div className="q-label">{q.label}</div>
            <div className="q-text">{q.text}</div>
            {q.hint && <div className="q-hint">{q.hint}</div>}
          </div>
          <div className="choices">
            {q.choices.map((c, i) => (
              <button key={i}
                className={`choice-btn ${selected === i ? 'selected' : ''}`}
                onClick={() => handleChoice(i)}>
                {c.label}
              </button>
            ))}
          </div>
          <button className="next-btn" disabled={selected === null} onClick={handleNext}>
            次へ →
          </button>
        </div>
      )}

      {/* 結果・気づき */}
      {phase === 'result' && result && (
        <div className="content">
          {history.length > 0 && (
            <div className="breadcrumb">
              {history.map((h, i) => <span key={i} className="crumb">{h.text}</span>)}
            </div>
          )}

          <div className="insight-card">
            <div className="insight-label">今日の気づき</div>
            <div className="insight-title">{result.insight}</div>
            <div className="insight-body">{result.body}</div>
          </div>

          <div className="eco-section">
            <div className="eco-header">課題解決の練習環境</div>
            <div className="eco-card">
              <div className="eco-situation">{result.situation}</div>
              <div className="eco-divider">自分の長所で解決する</div>
              <div className="approach-list">
                {result.approaches.map((a, i) => (
                  <div key={i} className="approach-item">
                    <div className="approach-tag">{a.tag}</div>
                    <div className="approach-text">{a.text}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div className="next-step-section">
            <div className="next-step-label">次のプレーで一つだけ試すことを書く</div>
            <div className="next-step-hint">正解はない。自分が「これを試したい」と思うこと。</div>
            <textarea
              className="next-step-input"
              placeholder="例：もらう前に隣のDFを一回見てから動き出す"
              value={nextStep}
              onChange={e => setNextStep(e.target.value)}
            />
          </div>

          <button className="reset-btn" onClick={handleReset}>
            もう一度振り返る
          </button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
