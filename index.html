<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ハンドボール 自己問答</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ─── デザインシステム ─── */
    :root {
      /* Typography scale (5段階) */
      --fs-xs: 11px;
      --fs-sm: 13px;
      --fs-md: 15px;
      --fs-lg: 18px;
      --fs-xl: 22px;

      /* Module accent colors */
      --c-reflect: #3b82f6;
      --c-dict:    #22d3ee;
      --c-solve:   #c084fc;
      --c-plan:    #f59e0b;

      /* Text */
      --tx-primary:   #f1f5f9;
      --tx-secondary: #cbd5e1;
      --tx-muted:     #94a3b8;
      --tx-dim:       #64748b;

      /* Surfaces */
      --bg:        #0f172a;
      --surface-1: #1e293b;
      --surface-2: #131f33;
      --border:    #334155;

      /* Touch target (Apple HIG 44px) */
      --tap: 44px;

      /* Radius */
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;

      /* Transition */
      --t-fast: 0.18s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: var(--bg);
      color: var(--tx-secondary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; }
    .app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

    /* 共通：戻るボタン */
    .nav-back {
      background: none; border: none; color: var(--tx-muted);
      font-size: var(--fs-sm); cursor: pointer; padding: 8px 0;
      display: inline-flex; align-items: center; gap: 6px;
      min-height: var(--tap); font-family: inherit;
    }
    .nav-back:active { color: var(--tx-primary); }

    /* Header — 二段ロゴ + 動的バッジ */
    .header {
      background: var(--surface-1);
      padding: 12px 20px 10px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .header-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .header-brand { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
    .header-brand-main {
      font-size: var(--fs-md); font-weight: 800; color: var(--tx-primary);
      letter-spacing: 0.01em; line-height: 1.2;
    }
    .header-brand-sub {
      font-size: 10px; font-weight: 700; color: var(--tx-dim);
      letter-spacing: 0.18em; text-transform: uppercase;
    }
    .header-mode {
      font-size: var(--fs-xs); font-weight: 700; padding: 4px 10px;
      border-radius: 999px; border: 1px solid;
    }
    .progress-bar { margin-top: 8px; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--c-reflect), var(--c-dict)); border-radius: 2px; transition: width 0.4s ease; }
    .progress-bar.hidden { display: none; }

    /* Start screen — 振り返るモジュールのトップ */
    .start-screen {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; text-align: center; gap: 24px; padding: 20px 24px 36px;
    }
    .start-icon { font-size: 52px; }
    .start-title { font-size: var(--fs-xl); font-weight: 800; color: var(--tx-primary); line-height: 1.4; }
    .start-sub { font-size: var(--fs-sm); color: var(--tx-muted); line-height: 1.8; }
    .mode-select { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 360px; }
    .mode-btn {
      background: var(--surface-1); border: 1.5px solid var(--border); border-radius: var(--r-md);
      padding: 16px 20px; text-align: left; color: var(--tx-secondary);
      cursor: pointer; transition: all var(--t-fast); display: flex; align-items: center; gap: 14px;
      min-height: var(--tap);
    }
    .mode-btn:active { background: #1e3a5f; border-color: var(--c-reflect); transform: scale(0.98); }
    .mode-btn-icon { font-size: 24px; flex-shrink: 0; }
    .mode-btn-text { display: flex; flex-direction: column; gap: 2px; }
    .mode-btn-label { font-size: var(--fs-md); font-weight: 700; }
    .mode-btn-desc { font-size: var(--fs-xs); color: var(--tx-muted); }

    /* Content */
    .content { flex: 1; padding: 20px 20px 36px; display: flex; flex-direction: column; gap: 20px; }

    /* Q0 感情トリガー */
    .emotion-screen {
      flex: 1; display: flex; flex-direction: column; justify-content: center;
      gap: 24px; padding: 24px 20px;
    }
    .emotion-title { font-size: 20px; font-weight: 800; color: #f1f5f9; line-height: 1.5; text-align: center; }
    .emotion-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .emotion-btn {
      background: #1e293b; border: 1.5px solid #334155; border-radius: 14px;
      padding: 18px 12px; text-align: center; cursor: pointer;
      transition: all 0.15s; display: flex; flex-direction: column; gap: 6px; align-items: center;
    }
    .emotion-btn:active { transform: scale(0.96); }
    .emotion-btn.bad { border-color: #ef4444; background: #1f1315; }
    .emotion-btn.good { border-color: #22c55e; background: #0f1f15; }
    .emotion-btn.confused { border-color: #f59e0b; background: #1f1a0f; }
    .emotion-btn.blank { border-color: #64748b; background: #1a1f2e; }
    .emotion-emoji { font-size: 28px; }
    .emotion-label { font-size: 13px; font-weight: 700; }
    .emotion-btn.bad .emotion-label { color: #fca5a5; }
    .emotion-btn.good .emotion-label { color: #86efac; }
    .emotion-btn.confused .emotion-label { color: #fcd34d; }
    .emotion-btn.blank .emotion-label { color: #94a3b8; }
    .skip-btn {
      background: transparent; border: none; color: #475569; font-size: 13px;
      cursor: pointer; padding: 8px; text-align: center;
    }

    /* Question */
    .q-label { font-size: 11px; font-weight: 800; color: #3b82f6; letter-spacing: 0.1em; text-transform: uppercase; }
    .q-text { font-size: 18px; font-weight: 700; color: #f1f5f9; line-height: 1.6; margin-top: 6px; }
    .q-hint { font-size: 12px; color: #475569; line-height: 1.6; margin-top: 8px; background: #1e293b; border-radius: 8px; padding: 10px 12px; }

    .choices { display: flex; flex-direction: column; gap: 10px; }
    .choice-btn {
      background: #1e293b; border: 1.5px solid #334155; border-radius: 12px;
      padding: 14px 16px; text-align: left; color: #e2e8f0;
      font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; line-height: 1.5;
    }
    .choice-btn:active { background: #1e3a5f; border-color: #3b82f6; transform: scale(0.98); }
    .choice-btn.selected { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }

    .next-btn {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white;
      border: none; border-radius: 12px; padding: 15px; font-size: 15px;
      font-weight: 700; cursor: pointer; width: 100%; transition: all 0.15s;
    }
    .next-btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .next-btn:not(:disabled):active { transform: scale(0.97); opacity: 0.9; }

    /* ─── 3部構成リザルト ─── */
    .result-sections { display: flex; flex-direction: column; gap: 12px; }
    .rs {
      border-radius: 14px; padding: 16px 18px;
    }
    .rs.good  { background: #0a1f12; border: 1.5px solid #22c55e; }
    .rs.issue { background: #1f1013; border: 1.5px solid #ef4444; }
    .rs.improve { background: #0e1e38; border: 1.5px solid #3b82f6; }
    .rs-label {
      font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px;
    }
    .rs.good .rs-label    { color: #4ade80; }
    .rs.issue .rs-label   { color: #f87171; }
    .rs.improve .rs-label { color: #60a5fa; }
    .rs-title { font-size: 15px; font-weight: 800; color: #f1f5f9; margin-bottom: 6px; line-height: 1.4; }
    .rs-body  { font-size: 13px; color: #94a3b8; line-height: 1.75; }

    /* タイプ別アプローチ */
    .approach-section { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .approach-item {
      background: #131f33; border-radius: 10px; padding: 11px 14px;
      border-left: 3px solid #1d4ed8;
    }
    .approach-tag { font-size: 10px; font-weight: 700; color: #60a5fa; margin-bottom: 3px; }
    .approach-text { font-size: 13px; color: #cbd5e1; line-height: 1.6; }

    /* 次のステップ */
    .next-step-section { display: flex; flex-direction: column; gap: 8px; }
    .next-step-label { font-size: 13px; font-weight: 700; color: #f1f5f9; }
    .next-step-hint { font-size: 12px; color: #64748b; }
    .next-step-input {
      width: 100%; background: #1e293b; border: 1.5px solid #3b82f6;
      border-radius: 12px; padding: 14px; color: #e2e8f0;
      font-size: 14px; font-family: inherit; resize: none; min-height: 88px; outline: none;
    }
    .next-step-input::placeholder { color: #475569; }

    .reset-btn {
      background: transparent; border: 1.5px solid #334155; border-radius: 12px;
      padding: 14px; font-size: 14px; font-weight: 600; color: #64748b;
      cursor: pointer; width: 100%; transition: all 0.15s;
    }
    .reset-btn:active { background: #1e293b; color: #94a3b8; }

    /* Breadcrumb */
    .breadcrumb { display: flex; gap: 4px; flex-wrap: wrap; }
    .crumb { font-size: 11px; color: #475569; background: #1e293b; border-radius: 6px; padding: 2px 8px; }

    /* 試合状況モード用 */
    .ctx-intro { font-size: 13px; color: #94a3b8; line-height: 1.8; background: #1e293b; border-radius: 10px; padding: 12px 14px; }

    /* ──────────────── ハブ画面 ──────────────── */
    .hub-screen {
      flex: 1; display: flex; flex-direction: column;
      gap: 20px; padding: 28px 20px 36px; align-items: center;
    }
    .hub-title { font-size: var(--fs-xl); font-weight: 800; color: var(--tx-primary); text-align: center; line-height: 1.4; }
    .hub-sub { font-size: var(--fs-sm); color: var(--tx-muted); text-align: center; line-height: 1.7; margin-top: -8px; max-width: 320px; }
    .hub-cards { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 360px; margin-top: 8px; }
    .hub-card {
      background: var(--surface-1); border: 1.5px solid var(--border); border-radius: var(--r-lg);
      padding: 18px 18px; text-align: left; color: var(--tx-secondary); cursor: pointer;
      transition: all var(--t-fast); display: flex; align-items: flex-start; gap: 14px;
      position: relative; min-height: 76px;
    }
    .hub-card:active { transform: scale(0.98); }
    .hub-card.disabled { opacity: 0.45; cursor: not-allowed; }
    .hub-card.disabled:active { transform: none; }
    .hub-card-icon { font-size: 32px; flex-shrink: 0; line-height: 1; }
    .hub-card-body { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .hub-card-title { font-size: var(--fs-lg); font-weight: 800; }
    .hub-card-desc { font-size: var(--fs-xs); color: var(--tx-muted); line-height: 1.6; }
    .hub-card-target { font-size: 10px; font-weight: 700; color: var(--tx-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 2px; }
    .hub-card-soon {
      position: absolute; top: 10px; right: 10px;
      background: var(--border); color: var(--tx-secondary); font-size: 9px; font-weight: 800;
      padding: 3px 8px; border-radius: 999px; letter-spacing: 0.06em; text-transform: uppercase;
    }
    .hub-card.reflect { border-color: color-mix(in oklab, var(--c-reflect) 50%, transparent); }
    .hub-card.reflect .hub-card-title { color: #93c5fd; }
    .hub-card.reflect:active { background: #14233f; border-color: var(--c-reflect); }
    .hub-card.dict { border-color: color-mix(in oklab, var(--c-dict) 50%, transparent); }
    .hub-card.dict .hub-card-title { color: #67e8f9; }
    .hub-card.dict:active { background: #0f2837; border-color: var(--c-dict); }
    .hub-card.solve { border-color: color-mix(in oklab, var(--c-solve) 50%, transparent); }
    .hub-card.solve .hub-card-title { color: #d8b4fe; }
    .hub-card.solve:active { background: #1f1530; border-color: var(--c-solve); }
    .hub-card.plan { border-color: color-mix(in oklab, var(--c-plan) 50%, transparent); }
    .hub-card.plan .hub-card-title { color: #fcd34d; }
    .hub-card.plan:active { background: #261906; border-color: var(--c-plan); }
    .hub-footer { font-size: var(--fs-xs); color: var(--tx-dim); text-align: center; margin-top: 12px; padding: 0 16px; line-height: 1.7; }

    /* ──────────────── 辞書ブラウザ ──────────────── */
    .dict-screen { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .dict-bar {
      padding: 10px 16px 8px; background: var(--bg); border-bottom: 1px solid var(--surface-1);
      position: sticky; top: 0; z-index: 5;
    }
    .dict-back {
      background: none; border: none; color: var(--tx-muted); font-size: var(--fs-sm);
      cursor: pointer; padding: 6px 0; display: flex; align-items: center; gap: 6px;
      min-height: var(--tap); font-family: inherit;
    }
    /* 検索ボックス：左に🔍アイコン */
    .dict-search-wrap { position: relative; }
    .dict-search-wrap::before {
      content: '🔍'; position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); font-size: 14px; opacity: 0.6; pointer-events: none;
    }
    .dict-search-input {
      width: 100%; background: var(--surface-1); border: 1.5px solid var(--border); border-radius: 10px;
      padding: 12px 14px 12px 40px; color: var(--tx-primary); font-size: var(--fs-md);
      font-family: inherit; outline: none; min-height: var(--tap);
      transition: border-color var(--t-fast);
    }
    .dict-search-input:focus { border-color: var(--c-dict); }
    .dict-search-input::placeholder { color: var(--tx-dim); }

    .dict-tags-wrap { background: var(--bg); padding: 8px 16px 10px; position: relative; }
    .dict-tags {
      display: flex; gap: 6px; overflow-x: auto;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .dict-tags::-webkit-scrollbar { display: none; }
    .dict-tags.expanded { flex-wrap: wrap; overflow: visible; }
    .dict-tag {
      flex-shrink: 0; background: var(--surface-1); border: 1px solid var(--border); border-radius: 999px;
      padding: 8px 14px; font-size: var(--fs-xs); font-weight: 700; color: var(--tx-muted);
      cursor: pointer; transition: all var(--t-fast); white-space: nowrap;
      min-height: 36px; display: inline-flex; align-items: center;
    }
    .dict-tag.active {
      background: color-mix(in oklab, var(--c-dict) 20%, var(--surface-1));
      border-color: var(--c-dict); color: #67e8f9;
    }
    .dict-tag:active { transform: scale(0.96); }
    .dict-tags-toggle {
      flex-shrink: 0; background: transparent; border: 1px dashed var(--border);
      border-radius: 999px; padding: 8px 14px; font-size: var(--fs-xs); color: var(--tx-muted);
      cursor: pointer; font-weight: 700; min-height: 36px; font-family: inherit;
    }
    .dict-tags-toggle:active { color: var(--tx-secondary); }

    .dict-results { flex: 1; overflow-y: auto; padding: 4px 16px 36px; -webkit-overflow-scrolling: touch; }
    .dict-meta-line { font-size: var(--fs-xs); color: var(--tx-muted); padding: 8px 0 6px; }
    .dict-result-card {
      background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--r-md);
      padding: 14px 16px; margin-bottom: 8px; cursor: pointer; transition: all var(--t-fast);
    }
    .dict-result-card:active { background: #0f2837; border-color: var(--c-dict); transform: scale(0.99); }
    .dict-result-filename {
      font-size: 10px; color: var(--c-dict); font-weight: 700; letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .dict-result-section {
      font-size: var(--fs-md); font-weight: 700; color: var(--tx-primary); line-height: 1.4; margin-bottom: 4px;
    }
    .dict-result-excerpt {
      font-size: var(--fs-xs); color: var(--tx-muted); line-height: 1.65;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .dict-result-excerpt mark {
      background: rgba(251, 191, 36, 0.18); color: #fbbf24; padding: 0 2px; border-radius: 2px;
    }
    .dict-empty { text-align: center; color: var(--tx-muted); font-size: var(--fs-sm); padding: 40px 20px; line-height: 1.7; }
    .dict-loading { text-align: center; color: var(--tx-muted); font-size: var(--fs-sm); padding: 60px 20px; }

    /* 辞書詳細ビュー */
    .dict-detail-header {
      padding: 12px 16px 8px; background: #0f172a; border-bottom: 1px solid #1e293b;
      position: sticky; top: 0; z-index: 5;
    }
    .dict-detail-file { font-size: 10px; font-weight: 700; color: #67e8f9; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 4px; }
    .dict-detail-title { font-size: 18px; font-weight: 800; color: #f1f5f9; line-height: 1.4; margin-bottom: 8px; }
    .dict-detail-tags { display: flex; gap: 4px; flex-wrap: wrap; padding-bottom: 8px; }
    .dict-detail-tag { font-size: 10px; color: #94a3b8; background: #1e293b; border: 1px solid #334155; border-radius: 999px; padding: 2px 8px; }
    .dict-detail-body {
      flex: 1; overflow-y: auto; padding: 16px 18px 40px;
      font-size: 14px; color: #cbd5e1; line-height: 1.8;
      -webkit-overflow-scrolling: touch;
    }
    .dict-detail-body h1, .dict-detail-body h2, .dict-detail-body h3, .dict-detail-body h4 {
      color: #f1f5f9; font-weight: 800; margin: 18px 0 10px; line-height: 1.4;
    }
    .dict-detail-body h1 { font-size: 18px; border-bottom: 1px solid #334155; padding-bottom: 6px; }
    .dict-detail-body h2 { font-size: 16px; color: #67e8f9; }
    .dict-detail-body h3 { font-size: 14px; color: #93c5fd; }
    .dict-detail-body h4 { font-size: 13px; color: #cbd5e1; }
    .dict-detail-body p { margin: 8px 0; }
    .dict-detail-body ul, .dict-detail-body ol { margin: 8px 0 8px 20px; }
    .dict-detail-body li { margin: 3px 0; }
    .dict-detail-body strong { color: #f1f5f9; font-weight: 700; }
    .dict-detail-body em { color: #fbbf24; font-style: normal; }
    .dict-detail-body code {
      background: #0f172a; color: #67e8f9; padding: 1px 6px; border-radius: 4px;
      font-family: 'SF Mono', Consolas, monospace; font-size: 12px;
    }
    .dict-detail-body pre {
      background: #020617; border: 1px solid #1e293b; border-radius: 8px;
      padding: 12px 14px; overflow-x: auto; margin: 10px 0;
      font-family: 'SF Mono', Consolas, monospace; font-size: 12px;
      color: #cbd5e1; line-height: 1.6;
    }
    .dict-detail-body pre code { background: none; padding: 0; color: inherit; }
    .dict-detail-body blockquote {
      border-left: 3px solid #22d3ee; padding: 6px 14px; margin: 10px 0;
      background: #0f1f2a; color: #94a3b8; font-size: 13px; border-radius: 0 6px 6px 0;
    }
    .dict-detail-body table {
      width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 12px;
      border: 1px solid #334155;
    }
    .dict-detail-body th, .dict-detail-body td {
      border: 1px solid #334155; padding: 6px 10px; text-align: left;
    }
    .dict-detail-body th { background: #1e293b; color: #f1f5f9; font-weight: 700; }
    .dict-detail-body td { color: #cbd5e1; }
    .dict-detail-body hr { border: none; border-top: 1px solid #1e293b; margin: 18px 0; }
    .dict-detail-related {
      margin: 24px 0 8px; padding-top: 16px; border-top: 1px solid #1e293b;
    }
    .dict-detail-related-label { font-size: 11px; color: #67e8f9; font-weight: 700; letter-spacing: 0.05em; margin-bottom: 8px; text-transform: uppercase; }
    .dict-related-item {
      background: #1e293b; border: 1px solid #334155; border-radius: 8px;
      padding: 8px 12px; font-size: 13px; color: #cbd5e1; cursor: pointer; margin-bottom: 4px;
    }
    .dict-related-item:active { background: #1e3a5f; border-color: #22d3ee; }

    /* ──────────────── 課題を解決する（Phase 2A） ──────────────── */
    .solve-screen { flex: 1; display: flex; flex-direction: column; padding: 14px 16px 40px; gap: 12px; }
    .solve-bar { display: flex; align-items: center; gap: 10px; padding-bottom: 2px; }
    .solve-step-label { font-size: var(--fs-xs); font-weight: 800; color: var(--c-solve); letter-spacing: 0.08em; }
    .solve-step-pill {
      background: #1e1530; border: 1px solid #6b21a8; color: #d8b4fe;
      font-size: var(--fs-xs); padding: 4px 12px; border-radius: 999px; font-weight: 800;
    }

    /* STEPインジケーター（ドット＋線） */

const DRILL_WARMUP = { title: 'ウォームアップ（ダイナミックストレッチ＋パス）', minutes: 0, desc: '関節可動域→軽いランニング→ペアパスでテンポを上げる。' };

// 練習計画ビルダー：選択された テーマ × レベル × 時間 から計画を作る
function buildPlan(themeIds, levelId, totalMinutes) {
  // ウォームアップとクールダウンの時間を確保
  const warmupTime = Math.max(8, Math.round(totalMinutes * 0.12));
  const cooldownTime = Math.max(5, Math.round(totalMinutes * 0.08));
  const remaining = totalMinutes - warmupTime - cooldownTime;

  // 選択されたテーマからレベルに合う drills を集める
  const themeDrills = themeIds.map(tid => {
    const theme = DRILL_THEMES.find(t => t.id === tid);
    if (!theme) return null;
    return { theme, drills: theme.drills[levelId] || [] };
  }).filter(Boolean);

  if (!themeDrills.length) {
    return { warmup: null, blocks: [], cooldown: null, totalAllocated: 0, mismatch: 0 };
  }

  // 各テーマの合計時間を計算 → 比率で残時間を分配 → 各テーマ内で順に詰める
  const perThemeBaseSum = themeDrills.reduce((sum, td) =>
    sum + td.drills.reduce((s, d) => s + d.minutes, 0), 0);

  let totalAllocated = warmupTime + cooldownTime;
  const blocks = [];

  themeDrills.forEach((td, idx) => {
    const baseSum = td.drills.reduce((s, d) => s + d.minutes, 0);
    const share = perThemeBaseSum > 0 ? Math.round(remaining * (baseSum / perThemeBaseSum)) : 0;
    let used = 0;
    const items = [];
    for (const d of td.drills) {
      if (used >= share) break;
      const allotted = Math.min(d.minutes, share - used);
      if (allotted >= 5) {
        items.push({ ...d, minutes: allotted });
        used += allotted;
      }
    }
    if (items.length) {
      blocks.push({ theme: td.theme, items, blockMinutes: used });
      totalAllocated += used;
    }
  });

  return {
    warmup: { ...DRILL_WARMUP, minutes: warmupTime },
    blocks,
    cooldown: { ...DRILL_COOLDOWN, minutes: cooldownTime },
    totalAllocated,
    mismatch: totalMinutes - totalAllocated,
  };
}

// ─────────────────────────────────────────────
// 簡易Markdownレンダラ（必要最小限）
// ─────────────────────────────────────────────
function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderMarkdown(md) {
  if (!md) return '';
  // CRLF / CR を正規化（Windows改行対応）
  md = md.replace(/\r\n?/g, '\n');
  const lines = md.split('\n');
  let html = '';
  let i = 0;
  let inCode = false, inTable = false, tableHeader = false;
  let codeLang = '';

  const flushPara = (buf) => {
    if (!buf.length) return '';
    const text = buf.join(' ').trim();
    if (!text) return '';
    return '<p>' + inlineMd(text) + '</p>';
  };

  function inlineMd(t) {
    t = escapeHtml(t);
    // コードインライン
    t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
    // 太字
    t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    // 斜体
    t = t.replace(/(^|[^*])\*([^*]+)\*/g, '$1<em>$2</em>');
    // [text](url) → そのまま装飾だけ
    t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<span style="color:#67e8f9">$1</span>');
    // [[ref]] 内部参照
    t = t.replace(/\[\[([^\]]+)\]\]/g, '<span style="color:#fbbf24">[[$1]]</span>');
    return t;
  }

  let paraBuf = [];
  while (i < lines.length) {
    const line = lines[i];

    // コードブロック
    if (line.startsWith('```')) {
      html += flushPara(paraBuf); paraBuf = [];
      if (!inCode) {
        inCode = true; codeLang = line.slice(3).trim();
        html += '<pre><code>';
      } else {
        inCode = false; codeLang = '';
        html += '</code></pre>';
      }
      i++; continue;
    }
    if (inCode) {
      html += escapeHtml(line) + '\n';
      i++; continue;
    }

    // テーブル
    if (line.includes('|') && line.trim().startsWith('|')) {
      html += flushPara(paraBuf); paraBuf = [];
      if (!inTable) {
        inTable = true; tableHeader = true;
        html += '<table>';
      }
      // ヘッダ区切り行（---）をスキップ
      if (/^\|\s*[-:|\s]+\|/.test(line)) {
        tableHeader = false; i++; continue;
      }
      const cells = line.split('|').slice(1, -1).map(c => inlineMd(c.trim()));
      if (tableHeader) {
        html += '<tr>' + cells.map(c => `<th>${c}</th>`).join('') + '</tr>';
      } else {
        html += '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
      }
      i++; continue;
    }
    if (inTable && !line.includes('|')) {
      inTable = false;
      html += '</table>';
    }

    // 見出し
    const h = line.match(/^(#{1,6})\s+(.*)$/);
    if (h) {
      html += flushPara(paraBuf); paraBuf = [];
      const level = h[1].length;
      html += `<h${level}>${inlineMd(h[2])}</h${level}>`;
      i++; continue;
    }

    // 区切り
    if (/^---+\s*$/.test(line)) {
      html += flushPara(paraBuf); paraBuf = [];
      html += '<hr/>';
      i++; continue;
    }

    // 引用
    if (line.startsWith('> ')) {
      html += flushPara(paraBuf); paraBuf = [];
      html += '<blockquote>' + inlineMd(line.slice(2)) + '</blockquote>';
      i++; continue;
    }

    // リスト
    if (/^[-*]\s+/.test(line)) {
      html += flushPara(paraBuf); paraBuf = [];
      let listHtml = '<ul>';
      while (i < lines.length && /^[-*]\s+/.test(lines[i])) {
        listHtml += '<li>' + inlineMd(lines[i].replace(/^[-*]\s+/, '')) + '</li>';
        i++;
      }
      listHtml += '</ul>';
      html += listHtml; continue;
    }
    if (/^\d+\.\s+/.test(line)) {
      html += flushPara(paraBuf); paraBuf = [];
      let listHtml = '<ol>';
      while (i < lines.length && /^\d+\.\s+/.test(lines[i])) {
        listHtml += '<li>' + inlineMd(lines[i].replace(/^\d+\.\s+/, '')) + '</li>';
        i++;
      }
      listHtml += '</ol>';
      html += listHtml; continue;
    }

    // 空行
    if (!line.trim()) {
      html += flushPara(paraBuf); paraBuf = [];
      i++; continue;
    }

    paraBuf.push(line);
    i++;
  }
  if (inTable) html += '</table>';
  html += flushPara(paraBuf);
  return html;
}

// ─────────────────────────────────────────────
// 辞書テキストをセクションに分割（## 見出しで区切る）
// ─────────────────────────────────────────────
function splitSections(md, fileMeta) {
  // CRLF / CR を正規化（Windows改行対応）
  md = md.replace(/\r\n?/g, '\n');
  const lines = md.split('\n');
  const sections = [];
  let current = null;
  let preamble = [];

  for (const line of lines) {
    const m = line.match(/^(#{1,3})\s+(.*)$/);
    if (m && m[1].length <= 2) {
      if (current) sections.push(current);
      else if (preamble.length) {
        sections.push({
          id: fileMeta.id + '-pre',
          fileId: fileMeta.id,
          fileName: fileMeta.name,
          fileTitle: fileMeta.title,
          fileIcon: fileMeta.icon,
          fileTags: fileMeta.tags,
          title: '冒頭',
          level: m[1].length,
          body: preamble.join('\n').trim(),
        });
      }
      current = {
        id: fileMeta.id + '-' + sections.length,
        fileId: fileMeta.id,
        fileName: fileMeta.name,
        fileTitle: fileMeta.title,
        fileIcon: fileMeta.icon,
        fileTags: fileMeta.tags,
        title: m[2].replace(/【([^】]+)】/g, '$1').replace(/「([^」]+)」/g, '$1'),
        level: m[1].length,
        body: line + '\n',
      };
    } else {
      if (current) current.body += line + '\n';
      else preamble.push(line);
    }
  }
  if (current) sections.push(current);
  return sections;
}

  qg1: '② 相手の状況', qg2_wave: '③ リアクション理解', qg2_spot: '③ リアクション理解',
  qg_unknown: '② 相手の状況',
};

function axisStyle(axis) {
  if (!axis) return null;
  if (axis.startsWith('②')) return { color: '#fbbf24', border: '1px solid #92400e' };
  if (axis.startsWith('③')) return { color: '#22d3ee', border: '1px solid #155e75' };
  if (axis.startsWith('④')) return { color: '#c084fc', border: '1px solid #6b21a8' };
  return { color: '#94a3b8', border: '1px solid #334155' };
}

// ─────────────────────────────────────────────
// モード設定
// ─────────────────────────────────────────────
const MODES = {
  of:      { label: 'OF',       color: '#3b82f6', firstQ: 'qof_start', icon: '⚡', desc: 'もらい出し・判断・アクション（②→③→④）' },
  df:      { label: 'DF',       color: '#ef4444', firstQ: 'qd1',       icon: '🛡️', desc: '守備・連動・読み・成功の言語化' },
  skill:   { label: 'スキル',   color: '#a78bfa', firstQ: 'qs1',       icon: '🎯', desc: 'パス・シュート・1対1' },
  context: { label: '試合状況', color: '#f59e0b', firstQ: 'qc1',       icon: '⏱️', desc: '点差×残り時間 → 今取るべき戦術' },
  janken:  { label: 'じゃんけん', color: '#06b6d4', firstQ: 'qj1',    icon: '🔄', desc: '相手DFのタイプ → 有効なOF戦術を逆引き' },
  gk:      { label: 'GK分析',   color: '#f97316', firstQ: 'qg1',       icon: '🥅', desc: '相手GKのタイプを特定 → 有効なシュート戦略' },
};

const EMOTIONS = [
  { id: 'bad',      emoji: '😤', label: '悔しい',   cls: 'bad' },
  { id: 'good',     emoji: '😊', label: 'よかった', cls: 'good' },
  { id: 'confused', emoji: '😕', label: '迷った',   cls: 'confused' },
  { id: 'blank',    emoji: '😶', label: 'わからん', cls: 'blank' },
];

function getProgress(phase, histLen) {
  if (phase === 'hub' || phase === 'start') return 0;
  if (phase === 'dictionary' || phase === 'dictionary-detail' || phase === 'solve' || phase === 'plan') return 0;
  if (phase === 'result') return 100;
  if (phase === 'emotion') return 10;
  return Math.min(20 + histLen * 20, 85);
}

// ─────────────────────────────────────────────
// ハブのモジュール定義
// ─────────────────────────────────────────────
const HUB_MODULES = [
  {
    id: 'reflect', cls: 'reflect', icon: '🤾', target: '選手',
    title: '振り返る',
    desc: '試合・練習のプレーを6モードで自己問答 → 良かった点／課題／改善案',
    enabled: true,
  },
  {
    id: 'dictionary', cls: 'dict', icon: '📖', target: '選手・指導者',
    title: '辞書を読む',
    desc: '20ファイルの戦術辞書を横断検索・タグでフィルタ',
    enabled: true,
  },
  {
    id: 'solve', cls: 'solve', icon: '🎯', target: '選手・指導者',
    title: '課題を解決する',
    desc: '「○○ができない」「わからない」を選ぶ → 辞書から処方箋＋具体アクション',
    enabled: true,
  },
  {
    id: 'plan', cls: 'plan', icon: '📋', target: '指導者・選手',
    title: '練習を組む',
    desc: 'テーマ×レベル×時間 → 時間配分付き練習プランを生成（印刷可）',
    enabled: true,
  },
];

// ─────────────────────────────────────────────
// App
// ─────────────────────────────────────────────
function App() {
  const [phase, setPhase] = useState('hub');
  const [mode, setMode] = useState(null);
  const [emotion, setEmotion] = useState(null);
  const [currentQ, setCurrentQ] = useState(null);
  const [selected, setSelected] = useState(null);
  const [history, setHistory] = useState([]);
  const [resultId, setResultId] = useState(null);
  const [nextStep, setNextStep] = useState('');

  // 辞書ブラウザの状態
  const [dictLoaded, setDictLoaded] = useState(false);
  const [dictSections, setDictSections] = useState([]);
  const [dictError, setDictError] = useState(null);
  const [dictQuery, setDictQuery] = useState('');
  const [dictActiveTag, setDictActiveTag] = useState(null);
  const [dictDetail, setDictDetail] = useState(null); // 選択中のセクション
  const [dictTagsExpanded, setDictTagsExpanded] = useState(false); // タグ展開

  // 課題を解決する（Phase 2A）の状態
  const [solveRole, setSolveRole] = useState(null);       // 'player' | 'coach'
  const [solveCategory, setSolveCategory] = useState(null);
  const [solveSymptom, setSolveSymptom] = useState(null);
  const [solveHistory, setSolveHistory] = useState([]);   // 最近の診断履歴

  // 練習を組む（Phase 2B）の状態
  const [planThemes, setPlanThemes] = useState([]);       // テーマID配列
  const [planLevel, setPlanLevel] = useState('mid');
  const [planDuration, setPlanDuration] = useState(60);
  const [planResult, setPlanResult] = useState(null);     // 生成結果
  const [planSaved, setPlanSaved] = useState([]);         // 保存済みプラン
  const [planCopyMsg, setPlanCopyMsg] = useState('');     // コピー成功表示

  // 起動時に保存済みプランを読み込む
  useEffect(() => {
    try {
      const raw = localStorage.getItem('plan-saved');
      if (raw) setPlanSaved(JSON.parse(raw));
    } catch (e) { /* ignore */ }
  }, []);

  // プランの狙いを自動生成
  const generatePlanAim = (themes, levelId) => {
    const labels = themes.map(tid => DRILL_THEMES.find(t => t.id === tid)?.label).filter(Boolean);
    if (labels.length === 0) return '';
    const lv = LEVELS.find(l => l.id === levelId)?.label || '';
    if (labels.length === 1) return `${labels[0]}の${lv}強化（単一テーマ集中）`;
    if (labels.length === 2) return `${labels[0]}と${labels[1]}の連動強化（${lv}）`;
    return `${labels.slice(0, -1).join('・')}＋${labels[labels.length - 1]}の総合強化（${lv}）`;
  };

  // プラン保存
  const handlePlanSave = () => {
    if (!planResult) return;
    const entry = {
      themes: planThemes,
      level: planLevel,
      duration: planDuration,
      aim: generatePlanAim(planThemes, planLevel),
      ts: Date.now(),
    };
    setPlanSaved(prev => {
      const next = [entry, ...prev].slice(0, 5);
      try { localStorage.setItem('plan-saved', JSON.stringify(next)); } catch (e) {}
      return next;
    });
    setPlanCopyMsg('プランを保存しました');
    setTimeout(() => setPlanCopyMsg(''), 2000);
  };

  // 保存済みプランを復元
  const handlePlanRestore = (saved) => {
    setPlanThemes(saved.themes);
    setPlanLevel(saved.level);
    setPlanDuration(saved.duration);
    setPlanResult(buildPlan(saved.themes, saved.level, saved.duration));
    setTimeout(() => window.scrollTo(0, 0), 0);
  };

  // プランをテキスト形式でクリップボードへコピー
  const handlePlanCopy = () => {
    if (!planResult) return;
    const lv = LEVELS.find(l => l.id === planLevel)?.label || '';
    let txt = `【練習プラン】 ${planResult.totalAllocated}分 / ${lv}\n`;
    txt += `狙い: ${generatePlanAim(planThemes, planLevel)}\n`;
    txt += `テーマ: ${planThemes.map(tid => DRILL_THEMES.find(t => t.id === tid)?.label).filter(Boolean).join('・')}\n`;
    txt += '\n';
    if (planResult.warmup) txt += `■ ウォームアップ (${planResult.warmup.minutes}分)\n  ${planResult.warmup.desc}\n\n`;
    planResult.blocks.forEach(b => {
      txt += `■ ${b.theme.label} (${b.blockMinutes}分)\n`;
      b.items.forEach(it => {
        txt += `  ・[${it.minutes}分] ${it.title}\n    ${it.desc}\n`;
        if (it.constraints && it.constraints.length > 0) {
          txt += `    📌 制約: \n`;
          it.constraints.forEach(c => {
            txt += `      - [${c.type}] ${c.text}\n`;
          });
        }
      });
      txt += '\n';
    });
    if (planResult.cooldown) txt += `■ クールダウン (${planResult.cooldown.minutes}分)\n  ${planResult.cooldown.desc}\n`;
    if (planResult.mismatch > 0) txt += `\n※ 余裕時間 ${planResult.mismatch} 分（休憩・追加練習・質疑応答に活用）\n`;

    if (navigator.clipboard) {
      navigator.clipboard.writeText(txt).then(() => {
        setPlanCopyMsg('クリップボードにコピーしました');
        setTimeout(() => setPlanCopyMsg(''), 2500);
      }).catch(() => {
        setPlanCopyMsg('コピー失敗');
        setTimeout(() => setPlanCopyMsg(''), 2500);
      });
    } else {
      setPlanCopyMsg('クリップボード非対応');
      setTimeout(() => setPlanCopyMsg(''), 2500);
    }
  };

  // 起動時に履歴をlocalStorageから読み込む
  useEffect(() => {
    try {
      const raw = localStorage.getItem('solve-history');
      if (raw) setSolveHistory(JSON.parse(raw));
    } catch (e) { /* ignore */ }
  }, []);

  // 履歴に追加する
  const addSolveHistory = (role, category, symptom) => {
    const entry = { role, category, symptom, ts: Date.now() };
    setSolveHistory(prev => {
      // 同じ症状の重複は古い方を消す
      const filtered = prev.filter(h => !(h.role === role && h.category === category && h.symptom === symptom));
      const next = [entry, ...filtered].slice(0, 5);
      try { localStorage.setItem('solve-history', JSON.stringify(next)); } catch (e) {}
      return next;
    });
  };

  // 辞書ファイルを一度だけfetch
  useEffect(() => {
    if (dictLoaded || dictError) return;
    // 辞書は dictionary 系のほか、solve・plan の関連リンク遷移でも使う
    if (phase !== 'dictionary' && phase !== 'dictionary-detail' && phase !== 'solve' && phase !== 'plan') return;

    (async () => {
      try {
        const allSections = [];
        await Promise.all(DICT_FILES.map(async (f) => {
          try {
            const res = await fetch(`./dictionary/${f.name}`);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const md = await res.text();
            const sections = splitSections(md, f);
            allSections.push(...sections);
          } catch (e) {
            console.warn('Failed to load', f.name, e);
          }
        }));
        // ファイルID順 + セクション順を維持
        allSections.sort((a, b) => {
          if (a.fileId !== b.fileId) return a.fileId.localeCompare(b.fileId);
          return 0;
        });
        setDictSections(allSections);
        setDictLoaded(true);
      } catch (e) {
        setDictError(String(e));
      }
    })();
  }, [phase, dictLoaded, dictError]);

  // 検索＋フィルタ結果
  const filteredSections = useMemo(() => {
    if (!dictLoaded) return [];
    const q = dictQuery.trim().toLowerCase();
    return dictSections.filter(s => {
      if (dictActiveTag && !s.fileTags.includes(dictActiveTag)) return false;
      if (!q) return true;
      return s.title.toLowerCase().includes(q) ||
             s.body.toLowerCase().includes(q) ||
             s.fileTitle.toLowerCase().includes(q);
    });
  }, [dictSections, dictQuery, dictActiveTag, dictLoaded]);

  // マークダウン記法を抜粋用にクリーンアップ（ハイフン・パイプは保持）
  const cleanExcerpt = (raw) => {
    return raw
      .replace(/```[\s\S]*?```/g, ' ')          // コードブロック削除
      .replace(/^#{1,6}\s+/gm, '')               // 見出しマーカー
      .replace(/^[->*]\s+/gm, '')                // 箇条書き・引用マーカー
      .replace(/^\|.*\|\s*$/gm, '')              // 表の行
      .replace(/\*\*([^*]+)\*\*/g, '$1')         // 太字
      .replace(/`([^`]+)`/g, '$1')               // インラインコード
      .replace(/\s+/g, ' ')
      .trim();
  };

  // 検索結果から抜粋ハイライト用テキストを取得
  const getExcerpt = (section, q) => {
    if (!q) return cleanExcerpt(section.body.slice(0, 280));
    const lower = section.body.toLowerCase();
    const idx = lower.indexOf(q.toLowerCase());
    if (idx === -1) return cleanExcerpt(section.body.slice(0, 240));
    const start = Math.max(0, idx - 60);
    const end = Math.min(section.body.length, idx + 160);
    let excerpt = cleanExcerpt(section.body.slice(start, end));
    if (start > 0) excerpt = '… ' + excerpt;
    if (end < section.body.length) excerpt = excerpt + ' …';
    return excerpt;
  };

  // ハイライトHTMLに変換
  const highlightExcerpt = (text, q) => {
    if (!q) return text;
    const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(escaped, 'gi');
    return text.replace(re, m => `<mark>${m}</mark>`);
  };

  const progress = getProgress(phase, history.length);
  const modeInfo = mode ? MODES[mode] : null;

  const handleModeSelect = (m) => {
    setMode(m);
    if (m === 'context' || m === 'janken' || m === 'gk') {
      setCurrentQ(MODES[m].firstQ);
      setPhase('question');
    } else {
      setPhase('emotion');
    }
  };

  const handleEmotion = (e) => {
    setEmotion(e);
    setCurrentQ(MODES[mode].firstQ);
    setPhase('question');
  };

  const handleChoice = (i) => setSelected(i);

  const handleNext = () => {
    const q = QUESTIONS[currentQ];
    const choice = q.choices[selected];
    const newHist = [...history, { label: q.label, text: choice.label.split('　')[0] }];
    setHistory(newHist);
    setSelected(null);
    if (RESULTS[choice.next]) {
      setResultId(choice.next);
      setPhase('result');
    } else if (QUESTIONS[choice.next]) {
      setCurrentQ(choice.next);
    }
  };

  const handleReset = () => {
    setPhase('start'); setMode(null); setEmotion(null);
    setCurrentQ(null); setSelected(null); setHistory([]);
    setResultId(null); setNextStep('');
  };

  const handleBackToHub = () => {
    setPhase('hub'); setMode(null); setEmotion(null);
    setCurrentQ(null); setSelected(null); setHistory([]);
    setResultId(null); setNextStep('');
    setDictDetail(null);
    setSolveRole(null); setSolveCategory(null); setSolveSymptom(null);
    setPlanResult(null);
  };

  // Phase 2B：テーマON/OFF切替
  const handleTogglePlanTheme = (themeId) => {
    setPlanThemes(prev => prev.includes(themeId)
      ? prev.filter(t => t !== themeId)
      : [...prev, themeId]);
  };

  // Phase 2B：練習プラン生成
  const handleGeneratePlan = () => {
    if (!planThemes.length) return;
    const plan = buildPlan(planThemes, planLevel, planDuration);
    setPlanResult(plan);
    setTimeout(() => window.scrollTo(0, 0), 0);
  };

  const handlePlanReset = () => {
    setPlanResult(null);
  };

  // Phase 2B：プラン項目から辞書セクションを開く
  const handlePlanItemOpen = (item) => {
    const target = findRelatedSection({ fileId: item.fileId, match: item.match });
    if (target) {
      setDictDetail(target);
      setPhase('dictionary-detail');
      setTimeout(() => window.scrollTo(0, 0), 0);
    }
  };

  // 関連辞書のマッチ解決：完全一致 → 先頭一致 → 部分一致 の順で精度高く
  const findRelatedSection = (related) => {
    const inFile = dictSections.filter(s => s.fileId === related.fileId);
    // 1. 完全一致
    let hit = inFile.find(s => s.title === related.match);
    if (hit) return hit;
    // 2. 先頭一致
    hit = inFile.find(s => s.title.startsWith(related.match));
    if (hit) return hit;
    // 3. 部分一致（fallback）
    return inFile.find(s => s.title.includes(related.match));
  };

  // 課題を解決する：処方箋の「関連辞書」をタップしたとき
  const handleOpenRelated = (related) => {
    const target = findRelatedSection(related);
    if (target) {
      setDictDetail(target);
      setPhase('dictionary-detail');
      setTimeout(() => window.scrollTo(0, 0), 0);
    }
  };

  const handleSolveReset = () => {
    setSolveRole(null); setSolveCategory(null); setSolveSymptom(null);
  };

  // 履歴から再診断
  const handleSolveFromHistory = (h) => {
    setSolveRole(h.role); setSolveCategory(h.category); setSolveSymptom(h.symptom);
  };

  // 「該当なし」→ 辞書ブラウザへ自由検索
  const handleSolveToDict = (preset) => {
    setDictDetail(null);
    setDictQuery(preset || '');
    setDictActiveTag(null);
    setPhase('dictionary');
  };

  const handleHubSelect = (modId) => {
    const mod = HUB_MODULES.find(m => m.id === modId);
    if (!mod || !mod.enabled) return;
    if (modId === 'reflect') setPhase('start');
    else if (modId === 'dictionary') {
      setDictDetail(null);
      setPhase('dictionary');
    }
    else if (modId === 'solve') {
      handleSolveReset();
      setPhase('solve');
    }
    else if (modId === 'plan') {
      setPlanResult(null);
      setPhase('plan');
    }
  };

  const handleDictSectionOpen = (section) => {
    setDictDetail(section);
    setPhase('dictionary-detail');
    // スクロール位置を一番上にリセット
    setTimeout(() => window.scrollTo(0, 0), 0);
  };

  const handleDictBack = () => {
    setDictDetail(null);
    setPhase('dictionary');
  };

  // 国別深掘り：現在のmodeから「じゃんけん→国別逆引き」へジャンプ
  const handleJumpToCountry = () => {
    setMode('janken');
    setEmotion(null);
    setCurrentQ('qj_school');
    setSelected(null);
    setHistory([]);
    setResultId(null);
    setNextStep('');
    setPhase('question');
  };

  const result = resultId ? RESULTS[resultId] : null;
  const q = currentQ ? QUESTIONS[currentQ] : null;

  return (
    <div className="app">
      <div className="header">
        <div className="header-row">
          <div className="header-brand">
            <div className="header-brand-main">
              {phase === 'hub' && 'ハンドボール 戦術ハブ'}
              {(phase === 'dictionary' || phase === 'dictionary-detail') && '辞書を読む'}
              {phase === 'solve' && '課題を解決する'}
              {phase === 'plan' && '練習を組む'}
              {(phase === 'start' || phase === 'emotion' || phase === 'question' || phase === 'result') && '振り返る'}
            </div>
            <div className="header-brand-sub">
              {phase === 'hub' && 'Handball Tactical Hub'}
              {(phase === 'dictionary' || phase === 'dictionary-detail') && 'Dictionary'}
              {phase === 'solve' && 'Symptom Diagnosis'}
              {phase === 'plan' && 'Practice Planner'}
              {(phase === 'start' || phase === 'emotion' || phase === 'question' || phase === 'result') && 'Self Q&A'}
            </div>
          </div>
          {modeInfo && (
            <div className="header-mode" style={{ color: modeInfo.color, borderColor: modeInfo.color + '66' }}>
              {modeInfo.label}
            </div>
          )}
          {(phase === 'dictionary' || phase === 'dictionary-detail') && (
            <div className="header-mode" style={{ color: 'var(--c-dict)', borderColor: 'color-mix(in oklab, var(--c-dict) 40%, transparent)' }}>
              辞書
            </div>
          )}
          {phase === 'solve' && (
            <div className="header-mode" style={{ color: 'var(--c-solve)', borderColor: 'color-mix(in oklab, var(--c-solve) 40%, transparent)' }}>
              診断
            </div>
          )}
          {phase === 'plan' && (
            <div className="header-mode" style={{ color: 'var(--c-plan)', borderColor: 'color-mix(in oklab, var(--c-plan) 40%, transparent)' }}>
              計画
            </div>
          )}
        </div>
        <div className={`progress-bar ${phase === 'hub' || phase === 'dictionary' || phase === 'dictionary-detail' || phase === 'solve' || phase === 'plan' ? 'hidden' : ''}`}>
          <div className="progress-fill" style={{ width: `${progress}%` }} />
        </div>
      </div>

      {/* ハブ画面（最初の入口） */}
      {phase === 'hub' && (
        <div className="hub-screen">
          <div style={{ fontSize: 44 }}>🤾‍♂️</div>
          <div className="hub-title">高校ハンドボールの<br />「わからない」を解決する</div>
          <div className="hub-sub">選手と指導者のための戦術辞書アプリ。<br />20ファイルの辞書資産を、4つのモジュールで使う。</div>
          <div className="hub-cards">
            {HUB_MODULES.map(mod => (
              <button
                key={mod.id}
                className={`hub-card ${mod.cls} ${mod.enabled ? '' : 'disabled'}`}
                onClick={() => handleHubSelect(mod.id)}
              >
                <div className="hub-card-icon">{mod.icon}</div>
                <div className="hub-card-body">
                  <div className="hub-card-target">{mod.target}</div>
                  <div className="hub-card-title">{mod.title}</div>
                  <div className="hub-card-desc">{mod.desc}</div>
                </div>
                {!mod.enabled && <div className="hub-card-soon">Soon</div>}
              </button>
            ))}
          </div>
          <div className="hub-footer">
            辞書ファイル：20本（約260KB） ／ 普遍原則：10 ／<br />
            国・クラブ別戦術分析を含む包括的ハンドボール戦術辞書
          </div>
        </div>
      )}

      {/* 辞書ブラウザ（一覧・検索） */}
      {phase === 'dictionary' && (
        <div className="dict-screen">
          <div className="dict-bar">
            <button className="dict-back" onClick={handleBackToHub}>← 戻る（ホーム）</button>
            <div className="dict-search-wrap">
              <input
                type="text"
                className="dict-search-input"
                placeholder="キーワードで検索（例: クローズ、5-1、フェイント）"
                value={dictQuery}
                onChange={e => setDictQuery(e.target.value)}
                autoFocus
              />
            </div>
          </div>
          <div className="dict-tags-wrap">
            <div className={`dict-tags ${dictTagsExpanded ? 'expanded' : ''}`}>
              <button
                className={`dict-tag ${dictActiveTag === null ? 'active' : ''}`}
                onClick={() => setDictActiveTag(null)}
              >すべて</button>
              {ALL_TAGS.map(tag => (
                <button
                  key={tag}
                  className={`dict-tag ${dictActiveTag === tag ? 'active' : ''}`}
                  onClick={() => setDictActiveTag(dictActiveTag === tag ? null : tag)}
                >{tag}</button>
              ))}
              <button
                className="dict-tags-toggle"
                onClick={() => setDictTagsExpanded(v => !v)}
              >{dictTagsExpanded ? '× 折りたたむ' : '＋ 全タグ表示'}</button>
            </div>
          </div>
          <div className="dict-results">
            {!dictLoaded && !dictError && (
              <div className="dict-loading">辞書を読み込み中… 📖</div>
            )}
            {dictError && (
              <div className="dict-empty">読み込みエラー：{dictError}<br /><br />ローカルで開いている場合、CORS制限でfetchが失敗することがあります。GitHub Pages 上で動作確認してください。</div>
            )}
            {dictLoaded && (
              <>
                <div className="dict-meta-line">
                  {filteredSections.length} 件のセクション
                  {dictQuery && ` ／ 検索: "${dictQuery}"`}
                  {dictActiveTag && ` ／ タグ: ${dictActiveTag}`}
                </div>
                {filteredSections.length === 0 && (
                  <div className="dict-empty">該当するセクションがありません。<br />キーワードやタグを変えてみてください。</div>
                )}
                {filteredSections.map(s => {
                  const excerpt = getExcerpt(s, dictQuery);
                  const highlighted = highlightExcerpt(excerpt, dictQuery);
                  return (
                    <div key={s.id} className="dict-result-card" onClick={() => handleDictSectionOpen(s)}>
                      <div className="dict-result-filename">{s.fileIcon} {s.fileTitle}（{s.fileId}）</div>
                      <div className="dict-result-section">{s.title}</div>
                      <div className="dict-result-excerpt" dangerouslySetInnerHTML={{__html: highlighted}} />
                    </div>
                  );
                })}
              </>
            )}
          </div>
        </div>
      )}

      {/* 辞書セクションの詳細 */}
      {phase === 'dictionary-detail' && dictDetail && (
        <div className="dict-screen">
          <div className="dict-detail-header">
            <button className="dict-back" onClick={handleDictBack}>← 戻る（辞書一覧）</button>
            <div className="dict-detail-file">{dictDetail.fileIcon} {dictDetail.fileTitle}（{dictDetail.fileId}）</div>
            <div className="dict-detail-title">{dictDetail.title}</div>
            <div className="dict-detail-tags">
              {dictDetail.fileTags.map(t => (
                <span key={t} className="dict-detail-tag">{t}</span>
              ))}
            </div>
          </div>
          <div className="dict-detail-body" dangerouslySetInnerHTML={{__html: renderMarkdown(dictDetail.body)}} />
          {/* 同じファイルの他セクション */}
          {(() => {
            const related = dictSections.filter(s => s.fileId === dictDetail.fileId && s.id !== dictDetail.id).slice(0, 8);
            if (!related.length) return null;
            return (
              <div className="dict-detail-related" style={{padding: '0 18px 24px'}}>
                <div className="dict-detail-related-label">▶ 同じファイルの他セクション</div>
                {related.map(s => (
                  <div key={s.id} className="dict-related-item" onClick={() => handleDictSectionOpen(s)}>
                    {s.title}
                  </div>
                ))}
              </div>
            );
          })()}
        </div>
      )}

      {/* 課題を解決する（Phase 2A） */}
      {phase === 'solve' && (() => {
        const roleData = solveRole ? SOLVE_DATA[solveRole] : null;
        const catData = roleData && solveCategory
          ? roleData.categories.find(c => c.id === solveCategory) : null;
        const symData = catData && solveSymptom
          ? catData.symptoms.find(s => s.id === solveSymptom) : null;

        // ステップ1：役割選択
        if (!solveRole) {
          // 履歴のフォーマット
          const fmtTime = (ts) => {
            const d = new Date(ts); const now = new Date();
            const diff = (now - d) / 1000;
            if (diff < 60) return 'いま';
            if (diff < 3600) return Math.floor(diff/60) + '分前';
            if (diff < 86400) return Math.floor(diff/3600) + '時間前';
            return Math.floor(diff/86400) + '日前';
          };
          return (
            <div className="solve-screen">
              <button className="dict-back" onClick={handleBackToHub}>← 戻る（ホーム）</button>
              <div className="solve-bar">
                <span className="solve-step-pill">STEP 1 / 3</span>
                <span className="solve-step-label">どの立場で相談</span>
              </div>
              <div className="step-dots">
                <span className="step-dot current"></span>
                <span className="step-bar"></span>
                <span className="step-dot"></span>
                <span className="step-bar"></span>
                <span className="step-dot"></span>
              </div>
              <div className="solve-title">あなたは？</div>
              <div className="solve-sub">立場に合わせて症状リストが変わります。</div>
              <div className="solve-role-grid">
                {Object.entries(SOLVE_DATA).map(([role, data]) => (
                  <button key={role} className="solve-role-btn" onClick={() => setSolveRole(role)}>
                    <span className="solve-role-icon">{data.icon}</span>
                    <span className="solve-role-label">{data.label}</span>
                  </button>
                ))}
              </div>

              {/* 最近の診断履歴 */}
              {solveHistory.length > 0 && (
                <div className="solve-history">
                  <div className="solve-history-label">▶ 最近の診断</div>
                  {solveHistory.slice(0, 3).map((h, i) => {
                    const roleData = SOLVE_DATA[h.role];
                    const catData = roleData?.categories.find(c => c.id === h.category);
                    const symData = catData?.symptoms.find(s => s.id === h.symptom);
                    if (!symData) return null;
                    return (
                      <div key={i} className="solve-history-item" onClick={() => handleSolveFromHistory(h)}>
                        <span style={{fontSize: 16}}>{catData.icon}</span>
                        <div className="solve-history-meta">
                          <div>{symData.title}</div>
                          <div className="solve-history-time">{roleData.icon} {fmtTime(h.ts)}</div>
                        </div>
                        <span style={{color: '#475569'}}>›</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        }

        // ステップ2：カテゴリ選択
        if (!solveCategory) {
          return (
            <div className="solve-screen">
              <button className="dict-back" onClick={() => setSolveRole(null)}>← 戻る（立場の選び直し）</button>
              <div className="solve-bar">
                <span className="solve-step-pill">STEP 2 / 3</span>
                <span className="solve-step-label">どんな種類の困りごと</span>
              </div>
              <div className="step-dots">
                <span className="step-dot done"></span>
                <span className="step-bar done"></span>
                <span className="step-dot current"></span>
                <span className="step-bar"></span>
                <span className="step-dot"></span>
              </div>
              <div className="solve-title">どこで困っている？</div>
              <div className="solve-sub">{roleData.label}</div>
              <div className="solve-cat-list">
                {roleData.categories.map(c => (
                  <button key={c.id} className="solve-cat-btn" onClick={() => setSolveCategory(c.id)}>
                    <span className="solve-cat-icon">{c.icon}</span>
                    <span className="solve-cat-title">{c.title}</span>
                  </button>
                ))}
              </div>

              {/* 該当なしフォールバック */}
              <div className="solve-fallback">
                <div className="solve-fallback-label">▶ ここにない／わからない場合</div>
                <button className="solve-fallback-btn" onClick={() => handleSolveToDict('')}>
                  📖 辞書を自由に検索する（キーワード／タグ）
                </button>
              </div>
            </div>
          );
        }

        // ステップ3：症状選択
        if (!solveSymptom) {
          return (
            <div className="solve-screen">
              <button className="dict-back" onClick={() => setSolveCategory(null)}>← 戻る（カテゴリの選び直し）</button>
              <div className="solve-bar">
                <span className="solve-step-pill">STEP 3 / 3</span>
                <span className="solve-step-label">具体的な症状</span>
              </div>
              <div className="step-dots">
                <span className="step-dot done"></span>
                <span className="step-bar done"></span>
                <span className="step-dot done"></span>
                <span className="step-bar done"></span>
                <span className="step-dot current"></span>
              </div>
              <div className="solve-title">どれが一番近い？</div>
              <div className="solve-sub">{catData.icon} {catData.title}</div>
              <div className="solve-sym-list">
                {catData.symptoms.map(s => (
                  <button key={s.id} className="solve-sym-btn" onClick={() => { setSolveSymptom(s.id); addSolveHistory(solveRole, solveCategory, s.id); }}>
                    <div className="solve-sym-title">{s.title}</div>
                    <div className="solve-sym-desc">{s.desc}</div>
                  </button>
                ))}
              </div>

              {/* 該当なしフォールバック */}
              <div className="solve-fallback">
                <div className="solve-fallback-label">▶ どれもピンとこない場合</div>
                <button className="solve-fallback-btn" onClick={() => handleSolveToDict(catData.title.replace(/で困っている$/, ''))}>
                  📖 「{catData.title.replace(/で困っている$/, '')}」で辞書を検索する
                </button>
              </div>
            </div>
          );
        }

        // 処方箋表示
        return (
          <div className="solve-screen">
            <button className="dict-back" onClick={() => setSolveSymptom(null)}>← 戻る（症状を選び直す）</button>
            <div className="solve-bar">
              <span className="solve-step-pill">処方箋</span>
              <span className="solve-step-label">辞書からのアドバイス</span>
            </div>
            <div className="solve-rx">
              {/* 症状サマリー */}
              <div className="solve-rx-card">
                <div className="solve-rx-label">⚠ 症状</div>
                <div className="solve-rx-title">{symData.title}</div>
                <div className="solve-rx-desc">{symData.desc}</div>
              </div>
              {/* 具体的アクション */}
              <div className="solve-rx-card">
                <div className="solve-rx-label">✓ 具体的なアクション</div>
                <div className="solve-rx-actions">
                  {symData.actions.map((a, i) => (
                    <div key={i} className="solve-rx-action">
                      <span className="solve-rx-action-num">{i + 1}</span>
                      <span>{a}</span>
                    </div>
                  ))}
                </div>
              </div>
              {/* 関連辞書 */}
              <div className="solve-rx-card">
                <div className="solve-rx-label">📖 関連する辞書セクション</div>
                {dictLoaded ? (
                  <div className="solve-rx-related-list">
                    {symData.related.map((r, i) => {
                      const fileMeta = DICT_FILES.find(f => f.id === r.fileId);
                      const section = findRelatedSection(r);
                      return (
                        <div
                          key={i}
                          className="solve-rx-related-item"
                          onClick={() => section && handleOpenRelated(r)}
                          style={!section ? {opacity: 0.5, cursor: 'default'} : {}}
                        >
                          <span className="solve-rx-related-icon">{fileMeta?.icon}</span>
                          <div className="solve-rx-related-meta">
                            <div className="solve-rx-related-file">{r.fileId} / {fileMeta?.title}</div>
                            <div className="solve-rx-related-title">{section ? section.title : `「${r.match}」を含むセクション`}</div>
                          </div>
                          <span className="solve-rx-arrow">›</span>
                        </div>
                      );
                    })}
                  </div>
                ) : (
                  <div className="solve-rx-missing">辞書を読み込み中…</div>
                )}
              </div>
            </div>
            {/* 操作ボタン */}
            <button className="reset-btn" style={{borderColor: '#6b21a8', color: '#c084fc', marginTop: 8}} onClick={handleSolveReset}>
              ← もう一度診断する
            </button>
            <button className="reset-btn" style={{marginTop: 6}} onClick={handleBackToHub}>
              ホームに戻る
            </button>
          </div>
        );
      })()}

      {/* 練習を組む（Phase 2B） */}
      {phase === 'plan' && !planResult && (
        <div className="plan-screen">
          <button className="dict-back" onClick={handleBackToHub}>← 戻る（ホーム）</button>

          {/* STEPインジケーター（シンプルに「テーマ選択済みか」で2状態） */}
          <div className="step-dots plan">
            <span className={`step-dot ${planThemes.length > 0 ? 'done' : 'current'}`}></span>
            <span className={`step-bar ${planThemes.length > 0 ? 'done' : ''}`}></span>
            <span className={`step-dot ${planThemes.length > 0 ? 'current' : ''}`}></span>
            <span className={`step-bar ${planThemes.length > 0 ? 'done' : ''}`}></span>
            <span className={`step-dot ${planThemes.length > 0 ? 'current' : ''}`}></span>
          </div>

          {/* テーマ複数選択 */}
          <div className="solve-bar"><span className="plan-step-pill">STEP 1 / 3</span><span className="plan-step-label">テーマ（複数可）</span></div>
          <div className="plan-title">何を強化する？</div>
          <div className="plan-sub">複数選んでOK。練習時間は自動配分されます。</div>
          <div className="plan-themes">
            {DRILL_THEMES.map(t => (
              <button key={t.id} className={`plan-theme-chip ${planThemes.includes(t.id) ? 'active' : ''}`} onClick={() => handleTogglePlanTheme(t.id)}>
                <span className="plan-theme-chip-icon">{t.icon}</span>{t.label}
              </button>
            ))}
          </div>

          {/* レベル選択 */}
          <div className="solve-bar" style={{marginTop: 8}}><span className="plan-step-pill">STEP 2 / 3</span><span className="plan-step-label">レベル</span></div>
          <div className="plan-levels">
            {LEVELS.map(l => (
              <button key={l.id} className={`plan-level-btn ${planLevel === l.id ? 'active' : ''}`} onClick={() => setPlanLevel(l.id)}>
                <span className="plan-level-label">{l.label}</span>
                <span className="plan-level-desc">{l.desc}</span>
              </button>
            ))}
          </div>

          {/* 時間選択 */}
          <div className="solve-bar" style={{marginTop: 8}}><span className="plan-step-pill">STEP 3 / 3</span><span className="plan-step-label">時間</span></div>
          <div className="plan-durations">
            {DURATIONS.map(d => (
              <button key={d} className={`plan-duration-btn ${planDuration === d ? 'active' : ''}`} onClick={() => setPlanDuration(d)}>
                {d}<small>分</small>
              </button>
            ))}
          </div>

          {/* 生成ボタン */}
          <button className="plan-gen-btn" disabled={planThemes.length === 0} onClick={handleGeneratePlan}>
            ▶ 練習プランを生成（{planDuration}分・{LEVELS.find(l => l.id === planLevel)?.label}）
          </button>
          {planThemes.length === 0 && (
            <div style={{fontSize: 11, color: '#64748b', textAlign: 'center'}}>テーマを1つ以上選んでください</div>
          )}

          {/* 保存済みプラン */}
          {planSaved.length > 0 && (
            <div className="plan-saved-section">
              <div className="plan-saved-label">▶ 保存済みプラン</div>
              {planSaved.slice(0, 3).map((sv, i) => (
                <div key={i} className="plan-saved-item" onClick={() => handlePlanRestore(sv)}>
                  <div className="plan-saved-meta">
                    <div className="plan-saved-aim">{sv.aim}</div>
                    <div className="plan-saved-detail">
                      {sv.duration}分 / {LEVELS.find(l => l.id === sv.level)?.label} /
                      {' '}{sv.themes.map(tid => DRILL_THEMES.find(t => t.id === tid)?.icon).filter(Boolean).join(' ')}
                    </div>
                  </div>
                  <span style={{color: '#475569'}}>›</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* 練習プラン表示 */}
      {phase === 'plan' && planResult && (
        <div className="plan-screen">
          <button className="dict-back" onClick={handlePlanReset}>← 戻る（条件を変更）</button>
          <div className="plan-output">
            <div className="plan-header">
              <div className="plan-header-time">⏱ {planResult.totalAllocated} 分プラン</div>
              <div className="plan-header-meta">
                {LEVELS.find(l => l.id === planLevel)?.label} ／
                {' '}テーマ: {planThemes.map(tid => DRILL_THEMES.find(t => t.id === tid)?.label).filter(Boolean).join('・')}
              </div>
            </div>

            {/* 狙い */}
            <div className="plan-aim">🎯 狙い：{generatePlanAim(planThemes, planLevel)}</div>

            {/* エコロジカル制約の説明＋凡例＋辞書リンク */}
            <div className="plan-eco-banner">
              <strong>📌 制約主導アプローチ（エコロジカル）</strong>：各メニューに「制約」が設定してあります。制約を入れると<strong>試合に近い状況</strong>が再現され、選手が自分で考えて動く力が育ちます。
              <div style={{marginTop: 6, display: 'flex', gap: 6, flexWrap: 'wrap'}}>
                <span style={{background: '#155e75', color: '#67e8f9', fontSize: 10, padding: '2px 6px', borderRadius: 4, fontWeight: 700}}>タスク</span>
                <span style={{fontSize: 11}}>=ルール（時間・回数・声出し等）</span>
              </div>
              <div style={{marginTop: 2, display: 'flex', gap: 6, flexWrap: 'wrap'}}>
                <span style={{background: '#155e75', color: '#67e8f9', fontSize: 10, padding: '2px 6px', borderRadius: 4, fontWeight: 700}}>環境</span>
                <span style={{fontSize: 11}}>=道具・配置（コーン・スペース・対戦相手の動き）</span>
              </div>
              <div style={{marginTop: 2, display: 'flex', gap: 6, flexWrap: 'wrap'}}>
                <span style={{background: '#155e75', color: '#67e8f9', fontSize: 10, padding: '2px 6px', borderRadius: 4, fontWeight: 700}}>選手</span>
                <span style={{fontSize: 11}}>=役割（誰がどう振る舞うかの制限）</span>
              </div>
              <div
                style={{marginTop: 8, color: '#67e8f9', fontSize: 11, fontWeight: 700, cursor: 'pointer', textDecoration: 'underline'}}
                onClick={() => handleOpenRelated({ fileId: '04', match: 'エコロジカル' })}
              >
                ▶ エコロジカルアプローチをもっと学ぶ（辞書04）
              </div>
            </div>

            {/* ウォームアップ */}
            {planResult.warmup && (
              <div className="plan-wc">
                <div><span className="plan-wc-label">▶ ウォームアップ</span><span className="plan-wc-time">{planResult.warmup.minutes}分</span></div>
                <div className="plan-wc-desc">{planResult.warmup.desc}</div>
              </div>
            )}

            {/* テーマ別ブロック */}
            {planResult.blocks.map((b, i) => (
              <div key={i} className="plan-block">
                <div className="plan-block-title">
                  <span>{b.theme.icon}</span>
                  <span>{b.theme.label}</span>
                  <span className="plan-block-time">{b.blockMinutes}分</span>
                </div>
                {b.items.map((it, j) => (
                  <div key={j} className="plan-item" onClick={() => handlePlanItemOpen(it)}>
                    <div className="plan-item-row">
                      <span className="plan-item-time">{it.minutes}分</span>
                      <span className="plan-item-title">{it.title}</span>
                      <span className="plan-item-arrow">›</span>
                    </div>
                    <div className="plan-item-desc">{it.desc}</div>
                    {it.constraints && it.constraints.length > 0 && (
                      <div className="plan-constraints">
                        <div className="plan-constraints-label">📌 制約（エコロジカル）</div>
                        {it.constraints.map((c, ci) => (
                          <div key={ci} className="plan-constraint-item">
                            <span className="plan-constraint-tag">{c.type}</span>
                            <span>{c.text}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            ))}

            {/* クールダウン */}
            {planResult.cooldown && (
              <div className="plan-wc">
                <div><span className="plan-wc-label">▶ クールダウン</span><span className="plan-wc-time">{planResult.cooldown.minutes}分</span></div>
                <div className="plan-wc-desc">{planResult.cooldown.desc}</div>
              </div>
            )}

            {planResult.blocks.length === 0 && (
              <div className="dict-empty">選択したテーマ・レベルの組み合わせに練習メニューが定義されていません。<br />別のレベルを試してください。</div>
            )}

            {/* 余裕時間 */}
            {planResult.mismatch > 0 && (
              <div className="plan-extra">
                ＋ 余裕 {planResult.mismatch} 分：休憩・追加練習・質疑応答・ストレッチ等で活用
              </div>
            )}
            {planResult.mismatch < 0 && (
              <div className="plan-extra" style={{borderColor: '#7f1d1d', color: '#fca5a5'}}>
                ⚠ {Math.abs(planResult.mismatch)} 分オーバー：時間調整が必要です（メニュー削減 or 時間延長）
              </div>
            )}
          </div>

          {/* 操作ボタン：印刷を主役に */}
          <div className="plan-actions">
            <button className="plan-action-btn primary" onClick={() => window.print()}>🖨 印刷</button>
            <button className="plan-action-btn" onClick={handlePlanCopy}>📋 コピー</button>
            <button className="plan-action-btn" onClick={handlePlanSave}>★ 保存</button>
          </div>
          <button className="reset-btn" style={{marginTop: 6}} onClick={handlePlanReset}>条件を変更</button>
          <button className="reset-btn" style={{marginTop: 4}} onClick={handleBackToHub}>← ホームに戻る</button>

          {/* トースト */}
          {planCopyMsg && <div className="plan-toast">{planCopyMsg}</div>}
        </div>
      )}

      {/* スタート画面（振り返るモード入口） */}
      {phase === 'start' && (
        <div className="start-screen">
          <button className="dict-back" style={{alignSelf: 'flex-start', padding: '4px 0'}} onClick={handleBackToHub}>← 戻る（ホーム）</button>
          <div className="start-icon">🤾</div>
          <div className="start-title">今日の自分と<br />向き合う</div>
          <div className="start-sub">どのモードで振り返る？</div>
          <div className="mode-select">
            {Object.entries(MODES).map(([key, m]) => (
              <button key={key} className="mode-btn" onClick={() => handleModeSelect(key)}>
                <div className="mode-btn-icon">{m.icon}</div>
                <div className="mode-btn-text">
                  <div className="mode-btn-label" style={{ color: m.color }}>{m.label}</div>
                  <div className="mode-btn-desc">{m.desc}</div>
                </div>
              </button>
            ))}
          </div>
        </div>
      )}

      {/* 感情トリガー */}
      {phase === 'emotion' && (
        <div className="emotion-screen">
          <div className="emotion-title">そのプレーで<br />何を感じた？</div>
          <div className="emotion-grid">
            {EMOTIONS.map(e => (
              <button key={e.id} className={`emotion-btn ${e.cls}`} onClick={() => handleEmotion(e.id)}>
                <div className="emotion-emoji">{e.emoji}</div>
                <div className="emotion-label">{e.label}</div>
              </button>
            ))}
          </div>
          <button className="skip-btn" onClick={() => handleEmotion('none')}>
            感情は関係なく振り返る →
          </button>
        </div>
      )}

      {/* 問い */}
      {phase === 'question' && q && (
        <div className="content">
          {history.length > 0 && (
            <div className="breadcrumb">
              {history.map((h, i) => <span key={i} className="crumb">{h.text}</span>)}
            </div>
          )}
          <div>
            {AXIS_MAP[currentQ] && (() => {
              const s = axisStyle(AXIS_MAP[currentQ]);
              return (
                <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: '0.1em', color: s.color, border: s.border, borderRadius: 6, padding: '2px 8px', display: 'inline-block', marginBottom: 6, background: '#0f172a' }}>
                  {AXIS_MAP[currentQ]}
                </div>
              );
            })()}
            <div className="q-label">{q.label}</div>
            <div className="q-text">{q.text}</div>
            {q.hint && <div className="q-hint">{q.hint}</div>}
          </div>
          <div className="choices">
            {q.choices.map((c, i) => (
              <button key={i}
                className={`choice-btn ${selected === i ? 'selected' : ''}`}
                onClick={() => handleChoice(i)}>
                {c.label}
              </button>
            ))}
          </div>
          <button className="next-btn" disabled={selected === null} onClick={handleNext}>
            次へ →
          </button>
        </div>
      )}

      {/* 結果（3部構成） */}
      {phase === 'result' && result && (
        <div className="content">
          {history.length > 0 && (
            <div className="breadcrumb">
              {history.map((h, i) => <span key={i} className="crumb">{h.text}</span>)}
            </div>
          )}

          <div className="result-sections">
            {/* 良かった */}
            <div className="rs good">
              <div className="rs-label">✓ 良かった点</div>
              <div className="rs-body">{result.good}</div>
            </div>

            {/* 課題 */}
            <div className="rs issue">
              <div className="rs-label">△ 課題</div>
              <div className="rs-title">{result.issue}</div>
              <div className="rs-body">{result.body}</div>
            </div>

            {/* 改善案 */}
            <div className="rs improve">
              <div className="rs-label">▶ 改善案</div>
              <div className="rs-body">{result.improve}</div>
              {result.approaches && result.approaches.length > 0 && (
                <div className="approach-section">
                  {result.approaches.map((a, i) => (
                    <div key={i} className="approach-item">
                      <div className="approach-tag">{a.tag}</div>
                      <div className="approach-text">{a.text}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>

          {/* 次のステップ */}
          {mode !== 'context' && mode !== 'janken' && mode !== 'gk' && (
            <div className="next-step-section">
              <div className="next-step-label">次のプレーで一つだけ試すことを書く</div>
              <div className="next-step-hint">正解はない。「これを試したい」と思うこと。</div>
              <textarea
                className="next-step-input"
                placeholder="例：もらう前に隣のDFを一度見てから動き出す"
                value={nextStep}
                onChange={e => setNextStep(e.target.value)}
              />
            </div>
          )}

          {/* 国別深掘り誘導（OF/DF/スキルモードのみ） */}
          {(mode === 'of' || mode === 'df' || mode === 'skill') && (
            <button
              className="reset-btn"
              style={{ borderColor: '#06b6d4', color: '#06b6d4', marginBottom: 8 }}
              onClick={handleJumpToCountry}
            >
              🌍 相手の戦術DNAで深掘りする →
            </button>
          )}

          <button className="reset-btn" onClick={handleReset}>
            もう一度振り返る
          </button>
          <button className="reset-btn" style={{marginTop: 8}} onClick={handleBackToHub}>
            ← ホームに戻る
          </button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
