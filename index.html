<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a101e">
  <link rel="manifest" href="./manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HANDBALL LAB">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <title>HANDBALL LAB</title>
  <script>
    // Service Worker 登録（ホーム画面追加・体育館オフライン対応）
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW register failed:', e));
      });
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel はメジャー無指定だと unpkg が latest を返す。v8 で JSX が自動ランタイム化し
       `import { jsx } from "react/jsx-runtime"` を出力→インラインscriptでは
       "Cannot use import statement outside a module" となり全体が実行されず白画面化する。
       classicランタイム（React.createElement 出力）の v7 系に固定する。2026-06 対応。 -->
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
  <style>
    /* ─── Glass Athletic Design System ─── */
    :root {
      /* Typography */
      --fs-xs: 11px;
      --fs-sm: 13px;
      --fs-md: 15px;
      --fs-lg: 18px;
      --fs-xl: 24px;

      /* Module accent colors — vivid */
      --c-reflect: #818cf8;
      --c-dict:    #22d3ee;
      --c-solve:   #c084fc;
      --c-plan:    #fbbf24;
      --c-chat:    #34d399;

      /* Text */
      --tx-primary:   #f1f5f9;
      --tx-secondary: #cbd5e1;
      --tx-muted:     #64748b;
      --tx-dim:       #475569;

      /* Surfaces — glass-first */
      --bg:        #060b14;
      --surface-1: rgba(255,255,255,0.05);
      --surface-2: rgba(255,255,255,0.03);
      --border:    rgba(255,255,255,0.09);
      --border-hi: rgba(255,255,255,0.18);

      /* Solid fallbacks for things that need them */
      --solid-1: #111827;
      --solid-2: #0f172a;

      /* Touch target */
      --tap: 48px;

      /* Radius */
      --r-sm:  8px;
      --r-md: 14px;
      --r-lg: 20px;
      --r-xl: 28px;

      /* Transitions */
      --t-fast:   0.15s cubic-bezier(0.2, 0.8, 0.2, 1);
      --t-smooth: 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);

      /* Bottom nav */
      --nav-h: 60px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: var(--bg);
      color: var(--tx-secondary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    /* Aurora background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 15% -5%,  rgba(99,102,241,0.18) 0%, transparent 55%),
        radial-gradient(ellipse 60% 45% at 85% 105%, rgba(6,182,212,0.14)  0%, transparent 55%),
        radial-gradient(ellipse 50% 60% at 55% 45%,  rgba(168,85,247,0.07) 0%, transparent 60%);
    }
    #root { min-height: 100vh; position: relative; z-index: 1; }
    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      /* Bottom nav の高さ + iOS Home Indicator 分の safe-area を確保 */
      padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px));
      /* 左右もノッチ等を回避 */
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
    }

    /* ── Bottom Navigation ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px));
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background: rgba(6,11,20,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: stretch;
      z-index: 100;
    }
    .bn-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      border: none;
      background: none;
      cursor: pointer;
      padding: 6px 4px;
      position: relative;
      font-family: inherit;
      transition: opacity var(--t-fast);
    }
    .bn-item:active { opacity: 0.7; }

    /* キーボード操作時のフォーカス可視化（マウスクリック時は表示しない） */
    button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: 2px solid #67e8f9;
      outline-offset: 2px;
    }
    /* 用語自動装飾（タップで用語集の該当項目へジャンプ） */
    .gl-term {
      border-bottom: 1px dotted rgba(103,232,249,0.5);
      cursor: pointer;
      color: inherit;
    }
    .gl-term:active { background: rgba(34,211,238,0.12); }
    .bn-icon { font-size: 21px; line-height: 1; }
    .bn-label { font-size: 10px; font-weight: 700; color: var(--tx-muted); transition: color var(--t-fast); }
    .bn-item.active-reflect .bn-label { color: var(--c-reflect); }
    .bn-item.active-dict    .bn-label { color: var(--c-dict); }
    .bn-item.active-solve   .bn-label { color: var(--c-solve); }
    .bn-item.active-plan    .bn-label { color: var(--c-plan); }
    .bn-item.active-chat    .bn-label { color: var(--c-chat); }
    .bn-item.active-hub     .bn-label { color: var(--tx-primary); }
    .bn-dot {
      position: absolute;
      bottom: 5px;
      width: 4px; height: 4px;
      border-radius: 50%;
      opacity: 0;
      transition: opacity var(--t-fast);
    }
    .bn-item.active-reflect .bn-dot { background: var(--c-reflect); opacity: 1; }
    .bn-item.active-dict    .bn-dot { background: var(--c-dict);    opacity: 1; }
    .bn-item.active-solve   .bn-dot { background: var(--c-solve);   opacity: 1; }
    .bn-item.active-plan    .bn-dot { background: var(--c-plan);    opacity: 1; }
    .bn-item.active-chat    .bn-dot { background: var(--c-chat);    opacity: 1; }
    .bn-item.active-hub     .bn-dot { background: var(--tx-primary);opacity: 1; }

    /* ── Back button ── */
    .nav-back {
      background: none; border: none; color: var(--tx-muted);
      font-size: var(--fs-sm); cursor: pointer; padding: 8px 0;
      display: inline-flex; align-items: center; gap: 6px;
      min-height: var(--tap); font-family: inherit;
      transition: color var(--t-fast);
    }
    .nav-back:active { color: var(--tx-primary); }

    /* ── Header ── */
    .header {
      background: rgba(6,11,20,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 13px 20px 11px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 50;
    }
    .header-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .header-brand { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
    .header-brand-main {
      font-size: var(--fs-md); font-weight: 800; color: var(--tx-primary);
      letter-spacing: -0.01em; line-height: 1.2;
    }
    .header-brand-sub {
      font-size: 10px; font-weight: 700; color: var(--tx-muted);
      letter-spacing: 0.16em; text-transform: uppercase;
    }
    .header-mode {
      font-size: var(--fs-xs); font-weight: 800; padding: 4px 12px;
      border-radius: 999px; border: 1px solid; letter-spacing: 0.04em;
    }
    .progress-bar { margin-top: 10px; height: 2px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--c-reflect), var(--c-dict)); border-radius: 2px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }
    .progress-bar.hidden { display: none; }

    /* ── Start screen ── */
    .start-screen {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; text-align: center; gap: 24px; padding: 20px 24px 36px;
    }
    .start-icon { font-size: 52px; }
    .start-title { font-size: var(--fs-xl); font-weight: 900; color: var(--tx-primary); line-height: 1.35; letter-spacing: -0.02em; }
    .start-sub { font-size: var(--fs-sm); color: var(--tx-muted); line-height: 1.8; }
    .mode-select { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 360px; }
    .mode-btn {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 14px 18px; text-align: left; color: var(--tx-secondary);
      cursor: pointer; transition: all var(--t-fast); display: flex; align-items: center; gap: 14px;
      min-height: var(--tap);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .mode-btn:active { background: rgba(255,255,255,0.08); border-color: var(--border-hi); transform: scale(0.98); }
    .mode-btn-icon { font-size: 22px; flex-shrink: 0; }
    .mode-btn-text { display: flex; flex-direction: column; gap: 2px; }
    .mode-btn-label { font-size: var(--fs-md); font-weight: 700; color: var(--tx-primary); }
    .mode-btn-desc { font-size: var(--fs-xs); color: var(--tx-muted); }

    /* ── Content ── */
    .content { flex: 1; padding: 20px 20px 36px; display: flex; flex-direction: column; gap: 18px; }

    .skip-btn {
      background: transparent; border: none; color: var(--tx-dim); font-size: 13px;
      cursor: pointer; padding: 10px; text-align: center;
    }

    /* ── Questions ── */
    .q-label { font-size: 10px; font-weight: 800; color: var(--c-reflect); letter-spacing: 0.14em; text-transform: uppercase; }
    .q-text { font-size: var(--fs-lg); font-weight: 800; color: var(--tx-primary); line-height: 1.55; margin-top: 6px; letter-spacing: -0.01em; }
    .q-hint { font-size: 12px; color: var(--tx-muted); line-height: 1.65; margin-top: 10px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 10px 14px; }

    .choices { display: flex; flex-direction: column; gap: 8px; }
    .choice-btn {
      background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--r-md);
      padding: 14px 16px; text-align: left; color: var(--tx-secondary);
      font-size: 14px; font-weight: 500; cursor: pointer; transition: all var(--t-fast); line-height: 1.5;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .choice-btn:active { background: rgba(129,140,248,0.1); border-color: rgba(129,140,248,0.4); transform: scale(0.99); }
    .choice-btn.selected { background: rgba(129,140,248,0.1); border-color: rgba(129,140,248,0.5); color: #c7d2fe; }

    .next-btn {
      background: linear-gradient(135deg, #6366f1, #4f46e5); color: white;
      border: none; border-radius: var(--r-md); padding: 15px; font-size: var(--fs-md);
      font-weight: 800; cursor: pointer; width: 100%; transition: all var(--t-fast);
      box-shadow: 0 4px 20px rgba(99,102,241,0.3);
    }
    .next-btn:disabled { background: rgba(255,255,255,0.06); color: var(--tx-muted); box-shadow: none; cursor: not-allowed; }
    .next-btn:not(:disabled):active { transform: scale(0.98); opacity: 0.9; }

    /* ── 3部構成リザルト ── */
    .result-sections { display: flex; flex-direction: column; gap: 10px; }
    .rs { border-radius: var(--r-md); padding: 16px 18px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
    .rs.good    { background: rgba(34,197,94,0.07);  border: 1px solid rgba(34,197,94,0.28); }
    .rs.issue   { background: rgba(239,68,68,0.07);  border: 1px solid rgba(239,68,68,0.28); }
    .rs.improve { background: rgba(99,102,241,0.07); border: 1px solid rgba(99,102,241,0.28); }
    .rs-label { font-size: 10px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 7px; }
    .rs.good .rs-label    { color: #4ade80; }
    .rs.issue .rs-label   { color: #f87171; }
    .rs.improve .rs-label { color: #a5b4fc; }
    .rs-title { font-size: var(--fs-md); font-weight: 800; color: var(--tx-primary); margin-bottom: 7px; line-height: 1.4; }
    .rs-body  { font-size: 13px; color: var(--tx-secondary); line-height: 1.8; white-space: pre-line; }

    /* タイプ別アプローチ */
    .approach-section { display: flex; flex-direction: column; gap: 7px; margin-top: 6px; }
    .approach-item {
      background: rgba(255,255,255,0.03); border-radius: var(--r-sm); padding: 11px 14px;
      border-left: 2px solid rgba(99,102,241,0.5);
    }
    .approach-tag { font-size: 10px; font-weight: 800; color: #a5b4fc; margin-bottom: 3px; }
    .approach-text { font-size: 13px; color: var(--tx-secondary); line-height: 1.6; }

    /* 次のステップ */
    .next-step-section { display: flex; flex-direction: column; gap: 8px; }
    .next-step-label { font-size: 13px; font-weight: 700; color: var(--tx-primary); }
    .next-step-hint { font-size: 12px; color: var(--tx-muted); }
    .next-step-input {
      width: 100%; background: var(--surface-1); border: 1px solid rgba(99,102,241,0.4);
      border-radius: var(--r-md); padding: 14px; color: var(--tx-primary);
      font-size: 14px; font-family: inherit; resize: none; min-height: 88px; outline: none;
      transition: border-color var(--t-fast);
    }
    .next-step-input:focus { border-color: var(--c-reflect); }
    .next-step-input::placeholder { color: var(--tx-muted); }

    .reset-btn {
      background: transparent; border: 1px solid var(--border); border-radius: var(--r-md);
      padding: 14px; font-size: 14px; font-weight: 600; color: var(--tx-muted);
      cursor: pointer; width: 100%; transition: all var(--t-fast);
    }
    .reset-btn:active { background: var(--surface-1); color: var(--tx-secondary); }

    /* Breadcrumb */
    .breadcrumb { display: flex; gap: 4px; flex-wrap: wrap; }
    .crumb { font-size: 11px; color: var(--tx-muted); background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 6px; padding: 2px 8px; }

    /* 試合状況モード */
    .ctx-intro { font-size: 13px; color: var(--tx-muted); line-height: 1.8; background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 12px 14px; }

    /* ── Hub screen — Bento Grid ── */
    .hub-screen {
      flex: 1; display: flex; flex-direction: column;
      gap: 14px; padding: 14px 16px 12px;
    }
    .hub-hero { display: flex; flex-direction: column; gap: 6px; padding: 0 2px; }
    .hub-hero-eyebrow {
      font-size: 11px; font-weight: 800; color: var(--c-reflect);
      letter-spacing: 0.18em; text-transform: uppercase;
    }
    .hub-title {
      font-size: var(--fs-lg); font-weight: 900; line-height: 1.3; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff 50%, #a5b4fc 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hub-sub { display: none; }

    /* Bento grid container */
    .hub-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
    }
    /* Card base */
    .hub-card {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 16px;
      text-align: left;
      color: var(--tx-secondary);
      cursor: pointer;
      transition: all var(--t-smooth);
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      min-height: 120px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      font-family: inherit;
    }
    /* reflect, plan, resume: full-width horizontal */
    .hub-card.reflect,
    .hub-card.plan,
    .hub-card.chat,
    .hub-card.resume {
      grid-column: 1 / -1;
      flex-direction: row;
      align-items: center;
      min-height: 80px;
      gap: 14px;
    }
    .hub-card:active { transform: scale(0.97); }
    .hub-card.disabled { opacity: 0.4; cursor: not-allowed; }
    .hub-card.disabled:active { transform: none; }

    /* Icon */
    .hub-card-icon { font-size: 30px; line-height: 1; flex-shrink: 0; }
    .hub-card.reflect .hub-card-icon,
    .hub-card.chat    .hub-card-icon,
    .hub-card.resume  .hub-card-icon { font-size: 36px; }

    /* Body */
    .hub-card-body { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .hub-card-target { display: none; }
    .hub-card-title { font-size: var(--fs-lg); font-weight: 800; line-height: 1.2; }
    .hub-card-desc { font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.55; }
    .hub-card-arrow { font-size: 13px; color: var(--tx-dim); margin-left: auto; flex-shrink: 0; }

    .hub-card-soon {
      position: absolute; top: 10px; right: 10px;
      background: rgba(255,255,255,0.08); border: 1px solid var(--border);
      color: var(--tx-muted); font-size: 8px; font-weight: 800;
      padding: 2px 7px; border-radius: 999px; letter-spacing: 0.08em; text-transform: uppercase;
    }

    /* Per-card accent */
    .hub-card.reflect {
      border-color: rgba(129,140,248,0.28);
      background: linear-gradient(135deg, rgba(99,102,241,0.12), rgba(99,102,241,0.04));
    }
    .hub-card.reflect .hub-card-title { color: #a5b4fc; }
    .hub-card.reflect:active { border-color: rgba(129,140,248,0.55); box-shadow: 0 0 24px rgba(99,102,241,0.2); }

    .hub-card.dict {
      border-color: rgba(34,211,238,0.22);
      background: linear-gradient(135deg, rgba(6,182,212,0.1), rgba(6,182,212,0.03));
    }
    .hub-card.dict .hub-card-title { color: #67e8f9; }
    .hub-card.dict:active { border-color: rgba(34,211,238,0.45); box-shadow: 0 0 20px rgba(6,182,212,0.15); }

    .hub-card.solve {
      border-color: rgba(192,132,252,0.22);
      background: linear-gradient(135deg, rgba(168,85,247,0.1), rgba(168,85,247,0.03));
    }
    .hub-card.solve .hub-card-title { color: #d8b4fe; }
    .hub-card.solve:active { border-color: rgba(192,132,252,0.45); box-shadow: 0 0 20px rgba(168,85,247,0.15); }

    .hub-card.plan {
      border-color: rgba(251,191,36,0.22);
      background: linear-gradient(135deg, rgba(245,158,11,0.1), rgba(245,158,11,0.03));
    }
    .hub-card.plan .hub-card-title { color: #fde68a; }
    .hub-card.plan:active { border-color: rgba(251,191,36,0.45); box-shadow: 0 0 20px rgba(245,158,11,0.15); }

    .hub-card.chat {
      border-color: rgba(52,211,153,0.28);
      background: linear-gradient(135deg, rgba(16,185,129,0.12), rgba(16,185,129,0.04));
    }
    .hub-card.chat .hub-card-title { color: #6ee7b7; }
    .hub-card.chat:active { border-color: rgba(52,211,153,0.55); box-shadow: 0 0 24px rgba(16,185,129,0.2); }

    .hub-card.resume {
      border-color: rgba(251,191,36,0.28);
      background: linear-gradient(135deg, rgba(251,191,36,0.1), rgba(251,191,36,0.03));
    }
    .hub-card.resume .hub-card-title { color: #fde68a; }
    .hub-card.resume:active { border-color: rgba(251,191,36,0.55); }

    .hub-footer { font-size: var(--fs-xs); color: var(--tx-dim); text-align: center; padding: 0 16px 4px; line-height: 1.7; }

    /* ── 辞書ブラウザ ── */
    .dict-screen { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .dict-bar {
      padding: 10px 16px 8px;
      background: rgba(6,11,20,0.88);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 5;
    }
    .dict-back {
      background: none; border: none; color: var(--tx-muted); font-size: var(--fs-sm);
      cursor: pointer; padding: 6px 0; display: flex; align-items: center; gap: 6px;
      min-height: var(--tap); font-family: inherit; transition: color var(--t-fast);
    }
    .dict-back:active { color: var(--tx-primary); }
    .dict-search-wrap { position: relative; }
    .dict-search-wrap::before {
      content: '🔍'; position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); font-size: 14px; opacity: 0.5; pointer-events: none;
    }
    .dict-search-input {
      width: 100%; background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--r-md);
      padding: 12px 14px 12px 40px; color: var(--tx-primary); font-size: var(--fs-md);
      font-family: inherit; outline: none; min-height: var(--tap);
      transition: border-color var(--t-fast);
    }
    .dict-search-input:focus { border-color: var(--c-dict); }
    .dict-search-input::placeholder { color: var(--tx-dim); }

    .dict-tags-wrap { background: var(--bg); padding: 8px 16px 10px; position: relative; }
    .dict-tags {
      display: flex; gap: 6px; overflow-x: auto;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .dict-tags::-webkit-scrollbar { display: none; }
    .dict-tags.expanded {
      flex-wrap: wrap; overflow-y: auto; max-height: 36vh;
      padding-bottom: 4px;
    }
    .dict-tag {
      flex-shrink: 0; background: var(--surface-1); border: 1px solid var(--border); border-radius: 999px;
      padding: 8px 14px; font-size: var(--fs-xs); font-weight: 700; color: var(--tx-muted);
      cursor: pointer; transition: all var(--t-fast); white-space: nowrap;
      min-height: 40px; display: inline-flex; align-items: center;
    }
    .dict-tag.active {
      background: color-mix(in oklab, var(--c-dict) 20%, var(--surface-1));
      border-color: var(--c-dict); color: #67e8f9;
    }
    .dict-tag:active { transform: scale(0.96); }
    .dict-tags-toggle {
      flex-shrink: 0; background: transparent; border: 1px dashed var(--border);
      border-radius: 999px; padding: 8px 14px; font-size: var(--fs-xs); color: var(--tx-muted);
      cursor: pointer; font-weight: 700; min-height: 40px; font-family: inherit;
    }
    .dict-tags-toggle:active { color: var(--tx-secondary); }

    .dict-results { flex: 1; overflow-y: auto; padding: 4px 16px 36px; -webkit-overflow-scrolling: touch; }
    .dict-meta-line { font-size: var(--fs-xs); color: var(--tx-muted); padding: 8px 0 6px; }
    .dict-result-card {
      background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--r-md);
      padding: 14px 16px; margin-bottom: 8px; cursor: pointer; transition: all var(--t-fast);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .dict-result-card:active { background: rgba(6,182,212,0.07); border-color: rgba(34,211,238,0.4); transform: scale(0.99); }
    .dict-result-filename {
      font-size: 10px; color: var(--c-dict); font-weight: 700; letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .dict-result-section {
      font-size: var(--fs-md); font-weight: 700; color: var(--tx-primary); line-height: 1.4; margin-bottom: 4px;
    }
    .dict-result-excerpt {
      font-size: var(--fs-xs); color: var(--tx-muted); line-height: 1.65;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .dict-result-excerpt mark, .dict-detail-body mark.search-hit {
      background: rgba(251, 191, 36, 0.18); color: #fbbf24; padding: 0 2px; border-radius: 2px;
    }
    .dict-detail-body mark.search-hit.current {
      background: rgba(251, 191, 36, 0.45); outline: 1px solid #fbbf24;
    }
    .search-jump-bar {
      position: sticky; top: 0; z-index: 5;
      background: rgba(10,16,30,0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(251,191,36,0.4); border-radius: 999px;
      padding: 6px 12px; margin: 0 0 8px;
      display: flex; align-items: center; gap: 8px; justify-content: center;
      font-size: 12px; color: #fbbf24;
    }
    .search-jump-btn {
      background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4);
      color: #fbbf24; border-radius: 6px; padding: 4px 10px; min-height: 28px;
      font-size: 12px; font-family: inherit; cursor: pointer;
    }
    .search-jump-btn:active { background: rgba(251,191,36,0.3); }
    .dict-empty { text-align: center; color: var(--tx-muted); font-size: var(--fs-sm); padding: 40px 20px; line-height: 1.7; }
    .dict-loading { text-align: center; color: var(--tx-muted); font-size: var(--fs-sm); padding: 60px 20px; }

    /* ── 辞書ファイルカードグリッド（デフォルトビュー） ── */
    .dict-file-grid { display: flex; flex-direction: column; gap: 8px; padding: 4px 0; }
    .dict-file-card {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--r-md);
      padding: 14px 16px; cursor: pointer; transition: all var(--t-fast);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .dict-file-card:active { background: rgba(6,182,212,0.07); border-color: rgba(34,211,238,0.4); transform: scale(0.99); }
    .dict-file-card-icon { font-size: 26px; flex-shrink: 0; width: 36px; text-align: center; }
    .dict-file-card-body { flex: 1; min-width: 0; }
    .dict-file-card-title { font-size: var(--fs-sm); font-weight: 700; color: var(--tx-primary); line-height: 1.4; }
    .dict-file-card-meta { font-size: 10px; color: var(--c-dict); font-weight: 700; margin-top: 3px; letter-spacing: 0.04em; }
    .dict-file-card-arrow { font-size: 22px; color: var(--tx-dim); flex-shrink: 0; }
    .dict-file-header-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0 8px; border-bottom: 1px solid var(--border); margin-bottom: 8px;
    }
    .dict-file-header-icon { font-size: 22px; }
    .dict-file-header-title { font-size: var(--fs-sm); font-weight: 700; color: var(--c-dict); flex: 1; min-width: 0; }
    .dict-file-back-btn {
      background: rgba(34,211,238,0.10); border: 1px solid rgba(34,211,238,0.3);
      color: #67e8f9; border-radius: 6px; padding: 5px 10px; font-size: 11px;
      font-family: inherit; cursor: pointer; flex-shrink: 0; white-space: nowrap;
    }
    .dict-file-back-btn:active { background: rgba(34,211,238,0.22); }

    /* ── 辞書詳細ビュー ── */
    .dict-detail-header {
      padding: 12px 16px 8px;
      background: rgba(6,11,20,0.88); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 5;
    }
    .dict-detail-file { font-size: 10px; font-weight: 700; color: var(--c-dict); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
    .dict-detail-title { font-size: 18px; font-weight: 800; color: var(--tx-primary); line-height: 1.4; margin-bottom: 8px; letter-spacing: -0.01em; }
    .dict-detail-tags { display: flex; gap: 4px; flex-wrap: wrap; padding-bottom: 8px; }
    .dict-detail-tag { font-size: 10px; color: var(--tx-muted); background: var(--surface-1); border: 1px solid var(--border); border-radius: 999px; padding: 2px 8px; }
    .dict-detail-body {
      flex: 1; overflow-y: auto; padding: 16px 18px 40px;
      font-size: 14px; color: var(--tx-secondary); line-height: 1.8;
      -webkit-overflow-scrolling: touch;
    }
    .dict-detail-body h1, .dict-detail-body h2, .dict-detail-body h3, .dict-detail-body h4 {
      color: var(--tx-primary); font-weight: 800; margin: 18px 0 10px; line-height: 1.4;
    }
    .dict-detail-body h1 { font-size: 18px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .dict-detail-body h2 { font-size: 16px; color: #67e8f9; }
    .dict-detail-body h3 { font-size: 14px; color: #a5b4fc; }
    .dict-detail-body h4 { font-size: 13px; color: var(--tx-secondary); }
    .dict-detail-body p { margin: 8px 0; }
    .dict-detail-body ul, .dict-detail-body ol { margin: 8px 0 8px 20px; }
    .dict-detail-body li { margin: 3px 0; }
    .dict-detail-body strong { color: var(--tx-primary); font-weight: 700; }
    .dict-detail-body em { color: #fbbf24; font-style: normal; }
    .dict-detail-body code {
      background: rgba(0,0,0,0.4); color: #67e8f9; padding: 1px 6px; border-radius: 4px;
      font-family: 'SF Mono', Consolas, monospace; font-size: 12px;
      border: 1px solid var(--border);
    }
    .dict-inline-link {
      color: var(--c-dict); text-decoration: underline;
      text-decoration-style: dotted; text-underline-offset: 3px; cursor: pointer;
    }
    .dict-inline-link:active { color: #a5f3fc; }
    .dict-detail-body pre {
      background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: var(--r-sm);
      padding: 12px 14px; overflow-x: auto; margin: 10px 0;
      font-family: 'SF Mono', Consolas, monospace; font-size: 12px;
      color: var(--tx-secondary); line-height: 1.6;
    }
    .dict-detail-body pre code { background: none; padding: 0; color: inherit; border: none; }
    .dict-detail-body blockquote {
      border-left: 3px solid var(--c-dict); padding: 6px 14px; margin: 10px 0;
      background: rgba(6,182,212,0.06); color: var(--tx-muted); font-size: 13px; border-radius: 0 6px 6px 0;
    }
    .dict-detail-body table {
      width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 12px;
      border: 1px solid var(--border);
    }
    .dict-detail-body th, .dict-detail-body td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
    .dict-detail-body th { background: var(--surface-1); color: var(--tx-primary); font-weight: 700; }
    .dict-detail-body td { color: var(--tx-secondary); }
    .dict-detail-body hr { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
    .dict-detail-related { margin: 24px 0 8px; padding-top: 16px; border-top: 1px solid var(--border); }
    .dict-detail-related-label { font-size: 11px; color: var(--c-dict); font-weight: 700; letter-spacing: 0.06em; margin-bottom: 8px; text-transform: uppercase; }
    .dict-related-item {
      background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--r-sm);
      padding: 8px 12px; font-size: 13px; color: var(--tx-secondary); cursor: pointer; margin-bottom: 4px;
      transition: all var(--t-fast);
    }
    .dict-related-item:active { background: rgba(34,211,238,0.08); border-color: rgba(34,211,238,0.4); }

    /* ──────────────── 課題を解決する（Phase 2A） ──────────────── */
    .solve-screen { flex: 1; display: flex; flex-direction: column; padding: 14px 16px 40px; gap: 12px; }
    .solve-bar { display: flex; align-items: center; gap: 10px; padding-bottom: 2px; }
    .solve-step-label { font-size: var(--fs-xs); font-weight: 800; color: var(--c-solve); letter-spacing: 0.08em; }
    .solve-step-pill {
      background: #1e1530; border: 1px solid #6b21a8; color: #d8b4fe;
      font-size: var(--fs-xs); padding: 4px 12px; border-radius: 999px; font-weight: 800;
    }

    /* STEPインジケーター（ドット＋線） */
    .step-dots { display: flex; align-items: center; gap: 4px; margin: 2px 0 10px; }
    .step-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--border); transition: all var(--t-fast);
    }
    .step-dot.done { background: var(--c-solve); }
    .step-dot.current { background: var(--c-solve); box-shadow: 0 0 0 4px color-mix(in oklab, var(--c-solve) 25%, transparent); }
    .step-bar {
      flex: 1; height: 2px; background: var(--border); border-radius: 2px;
    }
    .step-bar.done { background: var(--c-solve); }
    /* planバリアント */
    .step-dots.plan .step-dot.done,
    .step-dots.plan .step-dot.current { background: var(--c-plan); }
    .step-dots.plan .step-bar.done { background: var(--c-plan); }
    .step-dots.plan .step-dot.current { box-shadow: 0 0 0 4px color-mix(in oklab, var(--c-plan) 25%, transparent); }

    .solve-title { font-size: var(--fs-lg); font-weight: 800; color: var(--tx-primary); line-height: 1.4; }
    .solve-sub { font-size: var(--fs-sm); color: var(--tx-muted); line-height: 1.7; }

    .solve-role-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .solve-role-btn {
      background: var(--surface-1); border: 1px solid rgba(192,132,252,0.3); border-radius: var(--r-md);
      padding: 18px 18px; text-align: left; color: var(--tx-secondary); cursor: pointer;
      display: flex; align-items: center; gap: 14px; transition: all var(--t-fast);
      min-height: var(--tap); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .solve-role-btn:active { transform: scale(0.98); background: rgba(168,85,247,0.1); border-color: var(--c-solve); }
    .solve-role-icon { font-size: 30px; flex-shrink: 0; }
    .solve-role-label { font-size: var(--fs-md); font-weight: 800; color: #d8b4fe; }

    .solve-cat-list { display: flex; flex-direction: column; gap: 10px; }
    .solve-cat-btn {
      background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--r-md);
      padding: 14px 16px; text-align: left; color: var(--tx-secondary); cursor: pointer;
      display: flex; align-items: center; gap: 12px; transition: all var(--t-fast);
      min-height: var(--tap); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .solve-cat-btn:active { transform: scale(0.98); background: rgba(168,85,247,0.08); border-color: rgba(192,132,252,0.35); }
    .solve-cat-icon { font-size: 22px; flex-shrink: 0; }
    .solve-cat-title { font-size: var(--fs-md); font-weight: 700; }

    .solve-sym-list { display: flex; flex-direction: column; gap: 10px; }
    .solve-sym-btn {
      background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--r-md);
      padding: 14px 16px; text-align: left; color: var(--tx-secondary); cursor: pointer;
      transition: all var(--t-fast); display: flex; flex-direction: column; gap: 4px;
      min-height: var(--tap); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .solve-sym-btn:active { transform: scale(0.98); background: rgba(168,85,247,0.08); border-color: rgba(192,132,252,0.35); }
    .solve-sym-title { font-size: var(--fs-md); font-weight: 700; color: var(--tx-primary); line-height: 1.4; }
    .solve-sym-desc { font-size: var(--fs-xs); color: var(--tx-muted); line-height: 1.6; }

    /* 処方箋 */
    .solve-rx { display: flex; flex-direction: column; gap: 14px; padding-top: 4px; }
    .solve-rx-card {
      background: rgba(168,85,247,0.07); border-radius: var(--r-md); padding: 14px 16px;
      border-left: 3px solid rgba(192,132,252,0.6); border-top: 1px solid rgba(192,132,252,0.2);
      border-right: 1px solid rgba(192,132,252,0.1); border-bottom: 1px solid rgba(192,132,252,0.1);
    }
    .solve-rx-label { font-size: 10px; font-weight: 800; color: var(--c-solve); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
    .solve-rx-title { font-size: 16px; font-weight: 800; color: var(--tx-primary); line-height: 1.4; margin-bottom: 6px; letter-spacing: -0.01em; }
    .solve-rx-desc { font-size: 13px; color: var(--tx-secondary); line-height: 1.7; }

    .solve-rx-actions { display: flex; flex-direction: column; gap: 8px; }
    .solve-rx-action {
      background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--r-sm);
      padding: 10px 12px; font-size: 13px; color: var(--tx-secondary); line-height: 1.6;
      display: flex; gap: 10px; align-items: flex-start;
    }
    .solve-rx-action-num {
      flex-shrink: 0; background: rgba(168,85,247,0.25); color: #f0abfc; font-size: 11px; font-weight: 800;
      width: 22px; height: 22px; border-radius: 50%; display: inline-flex;
      align-items: center; justify-content: center;
    }

    .solve-rx-related-list { display: flex; flex-direction: column; gap: 6px; }
    .solve-rx-related-item {
      background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--r-sm);
      padding: 10px 12px; cursor: pointer; transition: all var(--t-fast);
      display: flex; align-items: center; gap: 10px;
    }
    .solve-rx-related-item:active { background: rgba(168,85,247,0.08); border-color: rgba(192,132,252,0.4); }
    .solve-rx-related-icon { font-size: 16px; }
    .solve-rx-related-meta { flex: 1; min-width: 0; }
    .solve-rx-related-file { font-size: 10px; color: var(--c-solve); font-weight: 700; letter-spacing: 0.06em; }
    .solve-rx-related-title { font-size: 13px; color: var(--tx-primary); line-height: 1.4; margin-top: 2px; }
    .solve-rx-arrow { color: var(--tx-dim); flex-shrink: 0; }

    .solve-rx-missing { font-size: 11px; color: var(--tx-muted); padding: 6px 0; }

    /* Fallback */
    .solve-fallback {
      margin-top: 16px; padding: 12px 14px; border-radius: var(--r-sm);
      background: var(--surface-1); border: 1px dashed var(--border);
      color: var(--tx-muted); font-size: 12px; line-height: 1.7;
      display: flex; flex-direction: column; gap: 8px;
    }
    .solve-fallback-label { font-size: 11px; font-weight: 700; color: var(--tx-muted); letter-spacing: 0.05em; }
    .solve-fallback-btn {
      background: var(--surface-2); border: 1px solid rgba(34,211,238,0.25); border-radius: var(--r-sm);
      padding: 10px 12px; color: #67e8f9; font-size: 13px; font-weight: 700;
      cursor: pointer; text-align: left; transition: all var(--t-fast);
    }
    .solve-fallback-btn:active { background: rgba(6,182,212,0.1); border-color: var(--c-dict); }

    /* 履歴 */
    .solve-history {
      background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--r-sm);
      padding: 10px 12px; margin-top: 18px;
    }
    .solve-history-label { font-size: 10px; font-weight: 800; color: var(--c-solve); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
    .solve-history-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--r-sm); cursor: pointer; margin-top: 4px; transition: all var(--t-fast);
    }
    .solve-history-item:active { background: rgba(168,85,247,0.08); border-color: rgba(192,132,252,0.35); }
    .solve-history-meta { flex: 1; min-width: 0; font-size: 12px; color: var(--tx-secondary); }
    .solve-history-time { font-size: 10px; color: var(--tx-muted); }

    /* ── 練習を組む ── */
    .plan-screen { flex: 1; display: flex; flex-direction: column; padding: 14px 16px 40px; gap: 12px; }
    .plan-step-pill {
      background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.3); color: #fde68a;
      font-size: var(--fs-xs); padding: 4px 12px; border-radius: 999px; font-weight: 800;
    }
    .plan-step-label { font-size: var(--fs-xs); font-weight: 800; color: var(--c-plan); letter-spacing: 0.08em; }
    .plan-title { font-size: var(--fs-lg); font-weight: 800; color: var(--tx-primary); line-height: 1.4; }
    .plan-sub { font-size: var(--fs-sm); color: var(--tx-muted); line-height: 1.7; }

    /* テーマ複数選択チップ */
    .plan-themes { display: flex; flex-wrap: wrap; gap: 8px; }
    .plan-theme-chip {
      background: var(--surface-1); border: 1px solid var(--border); border-radius: 999px;
      padding: 10px 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
      color: var(--tx-secondary); font-size: var(--fs-sm); font-weight: 700;
      transition: all var(--t-fast); min-height: 40px; font-family: inherit;
    }
    .plan-theme-chip:active { transform: scale(0.96); }
    .plan-theme-chip.active {
      background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.5); color: #fde68a;
    }
    .plan-theme-chip-icon { font-size: 16px; }
    .plan-theme-chip .rec-star { font-size: 11px; color: #fcd34d; margin-left: 3px; line-height: 1; }
    .plan-theme-chip .pos-badge { font-size: 9px; opacity: 0.55; margin-left: 3px; letter-spacing: 0; }
    /* 推奨テーマ一括選択ボタン */
    .plan-rec-select-btn {
      display: inline-flex; align-items: center; gap: 5px; padding: 7px 13px;
      background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.4); color: #fde68a;
      border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: all var(--t-fast); margin-top: 4px;
    }
    .plan-rec-select-btn:active { transform: scale(0.97); opacity: 0.85; }

    /* ポジション選択チップ */
    .plan-pos-chips { display: flex; flex-wrap: wrap; gap: 7px; margin: 8px 0 10px; }
    .plan-pos-chip {
      display: inline-flex; align-items: center; gap: 5px; padding: 8px 13px;
      border-radius: 999px; border: 1.5px solid var(--border); background: var(--surface-1);
      font-size: 12px; font-weight: 700; color: var(--tx-secondary); cursor: pointer;
      transition: all var(--t-fast); min-height: var(--tap); font-family: inherit;
    }
    .plan-pos-chip:active { transform: scale(0.96); }
    .plan-pos-chip.active { border-color: #22d3ee; background: rgba(34,211,238,0.13); color: #67e8f9; }
    .plan-pos-chip-icon { font-size: 17px; }

    /* ドリルタイプバッジ（スキル練習 vs エコロジカル） */
    .plan-drill-type { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 4px; }
    .plan-drill-type.skill { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
    .plan-drill-type.eco { background: rgba(251,146,60,0.15); color: #fb923c; border: 1px solid rgba(251,146,60,0.3); }

    /* 表裏一体ノート（OF/DF共に練習になる説明） */
    .plan-training-note { margin-top: 7px; padding: 7px 10px 7px 12px; background: rgba(99,102,241,0.09); border-left: 3px solid #6366f1; border-radius: 0 5px 5px 0; font-size: 11px; color: #c7d2fe; line-height: 1.7; }
    .plan-training-note-label { font-size: 10px; font-weight: 800; color: #818cf8; margin-bottom: 2px; }
    .plan-pos-banner { display: flex; align-items: center; gap: 10px; margin: 10px 0 6px; padding: 9px 13px; background: rgba(34,211,238,0.09); border: 1px solid rgba(34,211,238,0.3); border-radius: 9px; }
    .plan-pos-banner-icon { font-size: 20px; line-height: 1; }
    .plan-pos-banner-text { font-size: 12px; color: #a5f3fc; line-height: 1.5; }

    /* レベル選択（セグメント） */
    .plan-levels { display: flex; gap: 8px; }
    .plan-level-btn {
      flex: 1; background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--r-md);
      padding: 12px 6px; text-align: center; color: var(--tx-secondary); cursor: pointer;
      transition: all var(--t-fast); display: flex; flex-direction: column; gap: 4px;
      min-height: var(--tap);
    }
    .plan-level-btn.active { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.45); }
    .plan-level-label { font-size: var(--fs-sm); font-weight: 800; color: #fde68a; }
    .plan-level-desc { font-size: 10px; color: var(--tx-muted); line-height: 1.4; }

    .plan-durations { display: flex; gap: 8px; }
    .plan-duration-btn {
      flex: 1; background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--r-md);
      padding: 14px 8px; text-align: center; color: var(--tx-secondary); cursor: pointer;
      font-size: var(--fs-md); font-weight: 800; transition: all var(--t-fast); min-height: var(--tap);
    }
    .plan-duration-btn.active { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.45); color: #fde68a; }
    .plan-duration-btn small { display: block; font-size: 10px; font-weight: 500; color: var(--tx-muted); margin-top: 2px; }

    .plan-gen-btn {
      background: linear-gradient(135deg, var(--c-plan), #d97706); color: white;
      border: none; border-radius: var(--r-md); padding: 16px; font-size: var(--fs-md);
      font-weight: 800; cursor: pointer; width: 100%; margin-top: 8px;
      transition: all var(--t-fast); min-height: var(--tap);
    }
    .plan-gen-btn:disabled { background: var(--border); color: var(--tx-dim); cursor: not-allowed; }
    .plan-gen-btn:not(:disabled):active { transform: scale(0.98); opacity: 0.92; }

    /* ── 練習プラン表示 ── */
    .plan-output { display: flex; flex-direction: column; gap: 10px; }
    .plan-header {
      background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.25);
      border-radius: var(--r-md); padding: 14px 16px;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .plan-header-time { font-size: 22px; font-weight: 900; color: #fde68a; letter-spacing: -0.02em; }
    .plan-header-meta { font-size: 12px; color: var(--tx-muted); margin-top: 4px; line-height: 1.6; }

    .plan-block {
      background: var(--surface-1); border-radius: var(--r-md); padding: 12px 14px;
      border-left: 3px solid rgba(245,158,11,0.6); border-top: 1px solid var(--border);
      border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .plan-block-title { font-size: 14px; font-weight: 800; color: #fde68a; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .plan-block-time {
      font-size: 11px; font-weight: 800; color: var(--c-plan);
      background: rgba(245,158,11,0.1); padding: 2px 8px; border-radius: 999px; margin-left: auto;
    }
    .plan-item {
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: var(--r-sm);
      padding: 10px 12px; margin-top: 6px; cursor: pointer; transition: all var(--t-fast);
    }
    .plan-item:active { background: rgba(245,158,11,0.07); border-color: rgba(245,158,11,0.3); }
    .plan-item-row { display: flex; align-items: center; gap: 8px; }
    .plan-item-time {
      background: rgba(245,158,11,0.2); color: #fde68a; font-size: 11px; font-weight: 800;
      padding: 2px 8px; border-radius: 999px; flex-shrink: 0; min-width: 36px; text-align: center;
    }
    .plan-item-title { font-size: 13px; font-weight: 700; color: var(--tx-primary); flex: 1; line-height: 1.4; }
    .plan-item-arrow { color: var(--tx-dim); flex-shrink: 0; }
    .plan-item-desc { font-size: 12px; color: var(--tx-muted); line-height: 1.5; margin-top: 6px; padding-left: 4px; }

    .plan-constraints {
      margin-top: 8px; padding: 8px 10px;
      background: rgba(6,182,212,0.04); border: 1px dashed rgba(34,211,238,0.2); border-radius: var(--r-sm);
    }
    .plan-constraints-label {
      font-size: 10px; font-weight: 800; color: #67e8f9; letter-spacing: 0.06em; margin-bottom: 4px;
    }
    .plan-constraint-item {
      display: flex; gap: 6px; align-items: flex-start;
      font-size: 11px; color: #cbd5e1; line-height: 1.6; margin-top: 2px;
    }
    .plan-constraint-tag {
      flex-shrink: 0; background: #155e75; color: #67e8f9; font-size: 9px;
      padding: 1px 6px; border-radius: 4px; font-weight: 700; min-width: 30px; text-align: center;
    }

    /* エコロジカル説明バナー */
    .plan-eco-banner {
      background: #0c1620; border: 1px solid #22d3ee44; border-radius: 8px;
      padding: 8px 12px; font-size: 11px; color: #94a3b8; line-height: 1.6;
    }
    .plan-eco-banner strong { color: #67e8f9; }

    .plan-wc {
      background: #131f33; border: 1px dashed #475569; border-radius: 10px;
      padding: 10px 14px;
    }
    .plan-wc-label { font-size: 11px; color: #64748b; font-weight: 700; }
    .plan-wc-time { font-size: 12px; color: #cbd5e1; font-weight: 800; margin-left: 6px; }
    .plan-wc-desc { font-size: 12px; color: #94a3b8; margin-top: 4px; line-height: 1.6; }

    .plan-actions { display: flex; gap: 8px; margin-top: 8px; }
    .plan-action-btn {
      flex: 1; background: #0f172a; border: 1px solid #f59e0b44; border-radius: 10px;
      padding: 12px; font-size: 13px; font-weight: 700; color: #fcd34d;
      cursor: pointer; transition: all 0.15s;
    }
    .plan-action-btn:active { background: #1f1610; border-color: #f59e0b; }
    .plan-action-btn.primary {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white; border-color: transparent;
    }
    .plan-action-btn.primary:active { opacity: 0.85; }

    .plan-aim {
      background: #131f33; border-left: 3px solid #f59e0b; border-radius: 0 8px 8px 0;
      padding: 8px 12px; font-size: 13px; color: #fcd34d; font-weight: 700; line-height: 1.5;
    }
    .plan-extra {
      background: #131f33; border: 1px dashed #92400e; border-radius: 8px;
      padding: 8px 12px; font-size: 12px; color: #fcd34d; line-height: 1.6;
    }
    .plan-toast {
      position: fixed; bottom: calc(var(--nav-h) + 12px); left: 50%; transform: translateX(-50%);
      background: rgba(20,28,50,0.96); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(245,158,11,0.4); color: #fde68a;
      padding: 10px 20px; border-radius: 999px; font-size: 13px; font-weight: 800;
      z-index: 200; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      animation: toastIn 0.2s cubic-bezier(0.2,0.8,0.2,1);
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translate(-50%, 8px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }

    .plan-saved-section {
      background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--r-sm);
      padding: 10px 12px; margin-top: 12px;
    }
    .plan-saved-label { font-size: 10px; font-weight: 800; color: var(--c-plan); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 7px; }
    .plan-saved-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--r-sm); cursor: pointer; margin-top: 4px; transition: all var(--t-fast);
    }
    .plan-saved-item:active { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.3); }
    .plan-saved-meta { flex: 1; min-width: 0; }
    .plan-saved-aim { font-size: 13px; color: #fde68a; font-weight: 700; }
    .plan-saved-detail { font-size: 10px; color: var(--tx-muted); margin-top: 2px; }

    @media print {
      body { background: white !important; color: black !important; }
      .header, .dict-back, .plan-actions, .reset-btn, .bottom-nav, .help-fab, .glossary-overlay, .onboarding-overlay { display: none !important; }
      .plan-screen { padding: 0 !important; }
      .plan-header, .plan-block, .plan-item, .plan-wc, .plan-constraints, .plan-eco-banner, .plan-aim, .plan-extra {
        background: white !important; border-color: #888 !important; color: black !important; break-inside: avoid;
      }
      .plan-header-time, .plan-block-title, .plan-item-title, .plan-wc-time, .plan-aim { color: black !important; }
      .plan-item-time { background: #444 !important; color: white !important; }
      .plan-training-note { background: #f0f0f8 !important; border-color: #6366f1 !important; color: #222 !important; }
      .plan-training-note-label { color: #444 !important; }
      .plan-drill-type { border-color: #888 !important; color: #222 !important; background: #eee !important; }
      .plan-constraint-tag { background: #555 !important; color: white !important; }
    }

    /* ── 用語集モーダル ── */
    .help-btn {
      background: var(--surface-1); border: 1px solid var(--border); border-radius: 999px;
      padding: 6px 13px; font-size: var(--fs-xs); font-weight: 800; color: var(--tx-secondary);
      cursor: pointer; font-family: inherit; min-height: 32px;
      display: inline-flex; align-items: center; gap: 5px; transition: all var(--t-fast);
    }
    .help-btn:active { background: rgba(255,255,255,0.08); }
    .glossary-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.72);
      z-index: 150; display: flex; align-items: flex-end; justify-content: center;
      animation: fadeIn 0.2s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .glossary-modal {
      background: rgba(10,16,30,0.97); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      width: 100%; max-width: 480px; max-height: 88vh; border-radius: 22px 22px 0 0;
      overflow: hidden; display: flex; flex-direction: column;
      box-shadow: 0 -12px 48px rgba(0,0,0,0.5); border-top: 1px solid var(--border-hi);
      animation: slideUp 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .glossary-head {
      padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .glossary-title { font-size: var(--fs-lg); font-weight: 800; color: var(--tx-primary); letter-spacing: -0.01em; }
    .glossary-close {
      background: rgba(255,255,255,0.06); border: none; color: var(--tx-muted); font-size: 20px;
      cursor: pointer; width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: inherit; transition: background var(--t-fast);
    }
    .glossary-close:active { background: rgba(255,255,255,0.12); }
    .glossary-body { flex: 1; overflow-y: auto; padding: 12px 20px 40px; }
    .glossary-search { padding: 12px 20px 0; }
    .glossary-search input {
      width: 100%; background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--r-md);
      color: var(--tx-primary); font-size: var(--fs-md); font-family: inherit; padding: 11px 14px; line-height: 1.4;
    }
    .glossary-search input::placeholder { color: var(--tx-muted); }
    .glossary-empty { text-align: center; color: var(--tx-muted); font-size: var(--fs-sm); padding: 28px 0; }
    .glossary-group {
      font-size: var(--fs-xs); font-weight: 800; color: var(--c-dict);
      letter-spacing: 0.1em; margin: 16px 0 7px; text-transform: uppercase;
    }
    .glossary-group:first-child { margin-top: 0; }
    .glossary-item {
      padding: 10px 13px; border-radius: var(--r-sm);
      background: var(--surface-1); border: 1px solid var(--border); margin-bottom: 5px;
    }
    .glossary-term { font-size: var(--fs-sm); font-weight: 800; color: var(--tx-primary); margin-bottom: 3px; }
    .glossary-desc { font-size: var(--fs-xs); color: var(--tx-muted); line-height: 1.6; }

    /* フェイント凡例（処方箋・プランで使う） */
    .feint-legend {
      background: var(--surface-2); border: 1px dashed color-mix(in oklab, var(--c-solve) 30%, transparent);
      border-radius: var(--r-sm); padding: 10px 12px; margin-top: 8px;
    }
    .feint-legend-label {
      font-size: 10px; font-weight: 800; color: var(--c-solve);
      letter-spacing: 0.06em; margin-bottom: 6px;
    }
    .feint-legend-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px;
    }
    .feint-legend-row { display: flex; align-items: baseline; gap: 4px; font-size: 11px; line-height: 1.5; }
    .feint-legend-num { color: var(--c-solve); font-weight: 800; }
    .feint-legend-name { color: var(--tx-primary); font-weight: 700; }
    .feint-legend-desc { color: var(--tx-muted); font-size: 10px; margin-left: 2px; }

    /* FAB */
    .help-fab {
      position: fixed; right: calc(16px + env(safe-area-inset-right, 0px));
      bottom: calc(var(--nav-h) + 12px + env(safe-area-inset-bottom, 0px)); z-index: 20;
      background: rgba(10,16,30,0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1.5px solid var(--c-dict); color: #67e8f9; border-radius: 999px; padding: 10px 16px;
      font-size: var(--fs-sm); font-weight: 800; cursor: pointer; font-family: inherit;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4), 0 0 16px rgba(6,182,212,0.15);
      display: inline-flex; align-items: center; gap: 6px; transition: all var(--t-fast);
    }
    .help-fab:active { transform: scale(0.96); }

    /* ── Onboarding ── */
    .onboard-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.82);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      padding: 24px; animation: fadeIn 0.25s ease-out;
    }
    .onboard-card {
      background: rgba(10,16,30,0.97); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-radius: var(--r-xl); padding: 28px 24px; max-width: 420px; width: 100%;
      display: flex; flex-direction: column; gap: 14px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6); border: 1px solid var(--border-hi);
    }
    .onboard-step-dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 4px; }
    .onboard-step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: all var(--t-smooth); }
    .onboard-step-dot.active { background: var(--c-dict); width: 24px; border-radius: 4px; }
    .onboard-icon { font-size: 52px; text-align: center; line-height: 1; }
    .onboard-title { font-size: var(--fs-lg); font-weight: 900; color: var(--tx-primary); text-align: center; letter-spacing: -0.01em; }
    .onboard-desc { font-size: var(--fs-sm); color: var(--tx-muted); line-height: 1.8; text-align: center; }
    .onboard-actions { display: flex; gap: 10px; margin-top: 8px; }
    .onboard-btn {
      flex: 1; border: 1px solid var(--border); background: var(--surface-1);
      color: var(--tx-secondary); border-radius: var(--r-md); padding: 13px;
      font-size: var(--fs-sm); font-weight: 700; cursor: pointer; font-family: inherit;
      min-height: var(--tap); transition: all var(--t-fast);
    }
    .onboard-btn.primary {
      background: linear-gradient(135deg, var(--c-dict), #0891b2);
      color: white; border-color: transparent;
      box-shadow: 0 4px 16px rgba(6,182,212,0.25);
    }
    .onboard-btn:active { transform: scale(0.98); }
    .onboard-skip {
      background: none; border: none; color: var(--tx-dim);
      font-size: var(--fs-xs); cursor: pointer; font-family: inherit;
      padding: 6px; text-align: center; margin-top: -6px;
    }

    /* Resume pill */
    .hub-resume-pill {
      font-size: 10px; color: #fde68a; background: rgba(251,191,36,0.12);
      border: 1px solid rgba(251,191,36,0.25); padding: 2px 8px; border-radius: 4px;
      font-weight: 700; letter-spacing: 0.05em;
    }

    /* Favorites */
    .fav-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 999px; padding: 5px 13px; font-size: var(--fs-xs);
      font-weight: 700; color: var(--tx-muted); cursor: pointer;
      font-family: inherit; display: inline-flex; align-items: center; gap: 4px;
      transition: all var(--t-fast); min-height: 32px;
    }
    .fav-btn.active { color: #fbbf24; border-color: rgba(251,191,36,0.5); background: rgba(251,191,36,0.08); }
    .fav-btn:active { transform: scale(0.96); }

    /* Soon */
    .soon-screen {
      flex: 1; display: flex; flex-direction: column; justify-content: center;
      align-items: center; padding: 60px 24px; gap: 20px; text-align: center;
    }
    .soon-icon { font-size: 60px; opacity: 0.5; }
    .soon-title { font-size: 18px; font-weight: 800; color: var(--tx-primary); letter-spacing: -0.01em; }
    .soon-desc { font-size: 13px; color: var(--tx-muted); line-height: 1.8; max-width: 320px; }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: fadeInUp 0.3s cubic-bezier(0.2,0.8,0.2,1); }

    /* ── 質問チャット（辞書ボット） ── */
    .chat-screen { display: flex; flex-direction: column; gap: 10px; padding-bottom: 86px; }
    .chat-topbar { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .chat-clear {
      background: none; border: 1px solid var(--border); color: var(--tx-dim);
      border-radius: 999px; padding: 6px 12px; font-size: var(--fs-xs); font-weight: 700;
      cursor: pointer; font-family: inherit; flex-shrink: 0; transition: all var(--t-fast);
    }
    .chat-clear:active { border-color: var(--border-hi); color: var(--tx-muted); }
    .chat-note { font-size: var(--fs-xs); color: var(--tx-dim); text-align: center; line-height: 1.6; }
    .chat-messages { display: flex; flex-direction: column; gap: 12px; }
    .chat-msg { display: flex; gap: 8px; align-items: flex-end; }
    .chat-msg.user { justify-content: flex-end; }
    .chat-avatar {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      background: color-mix(in oklab, var(--c-chat) 16%, var(--surface-1));
      border: 1px solid color-mix(in oklab, var(--c-chat) 40%, transparent);
      display: flex; align-items: center; justify-content: center; font-size: 14px;
    }
    .chat-bubble {
      max-width: 86%; min-width: 0; border-radius: 16px; padding: 11px 13px;
      font-size: var(--fs-sm); line-height: 1.75;
    }
    .chat-bubble.user {
      background: linear-gradient(135deg, color-mix(in oklab, var(--c-chat) 28%, var(--surface-1)), color-mix(in oklab, var(--c-chat) 12%, var(--surface-1)));
      border: 1px solid color-mix(in oklab, var(--c-chat) 45%, transparent);
      color: var(--tx-primary); border-bottom-right-radius: 6px;
    }
    .chat-bubble.bot {
      background: var(--surface-1); border: 1px solid var(--border);
      color: var(--tx-secondary); border-bottom-left-radius: 6px;
      display: flex; flex-direction: column; gap: 9px;
    }
    .chat-text { white-space: pre-line; word-break: break-word; }
    .chat-src-head {
      display: flex; flex-direction: column; gap: 2px; align-items: flex-start; text-align: left;
      background: color-mix(in oklab, var(--c-chat) 10%, transparent);
      border: 1px solid color-mix(in oklab, var(--c-chat) 32%, transparent);
      border-radius: 10px; padding: 8px 11px; cursor: pointer; font-family: inherit; width: 100%;
      transition: border-color var(--t-fast);
    }
    .chat-src-head:active { border-color: var(--c-chat); }
    .chat-src-head-file { font-size: 10px; font-weight: 700; color: var(--c-chat); letter-spacing: 0.04em; }

(function autoAnnotateDrillTypes() {
  // スキル判定：相手役の動きが固定・コール式・先読み強制 など
  const skillSignals = /GK役は必ず|DF役は必ず|コーチのコール|GK役のコール|DF役のコール|コールしてタイプ変更|タイプを変える|コール（.+）で即|コーチが意図的/;
  DRILL_THEMES.forEach(theme => {
    ['basic', 'mid', 'adv'].forEach(lv => {
      (theme.drills[lv] || []).forEach(drill => {
        if (drill.drillType) return; // 明示指定があれば上書きしない
        const txt = (drill.constraints || []).map(c => c.text).join(' ');
        drill.drillType = skillSignals.test(txt) ? 'skill' : 'eco';
      });
    });
  });
})();

// ウォームアップ／クールダウンのテンプレ
const DRILL_WARMUP = { title: 'ウォームアップ（ダイナミックストレッチ＋パス）', minutes: 0, desc: '関節可動域→軽いランニング→ペアパスでテンポを上げる。' };
const DRILL_COOLDOWN = { title: 'クールダウン（ストレッチ＋振り返り）', minutes: 0, desc: '主要筋群のストレッチ＋今日の3秒振り返り（良かった点・課題・次回試すこと）。' };

const LEVELS = [
  { id: 'basic', label: '初級', desc: '基本動作の習得が目的（中学〜高1）' },
  { id: 'mid',   label: '中級', desc: '応用と判断が目的（高1〜高2）' },
  { id: 'adv',   label: '上級', desc: '試合実戦が目的（高2〜高3、全国レベル）' },
];

const DURATIONS = [30, 45, 60, 90, 120]; // 分

// 練習計画ビルダー：選択された テーマ × レベル × 時間 × ポジション から計画を作る
function buildPlan(themeIds, levelId, totalMinutes, positionId = 'all') {
  // ウォームアップとクールダウンの時間を確保
  // 30分：W=5/C=3、45分：W=6/C=4、60分：W=8/C=5、90分：W=12/C=7、120分：W=15/C=10
  const warmupTime = Math.min(15, Math.max(5, Math.round(totalMinutes * 0.13)));
  const cooldownTime = Math.min(10, Math.max(3, Math.round(totalMinutes * 0.08)));
  const remaining = totalMinutes - warmupTime - cooldownTime;

  // 選択されたテーマからレベルに合う drills を集める
  // ポジション別バリアントがあれば優先使用
  const themeDrills = themeIds.map(tid => {
    const theme = DRILL_THEMES.find(t => t.id === tid);
    if (!theme) return null;
    const posDrills = positionId !== 'all'
      ? (POSITION_DRILL_VARIANTS[positionId]?.[tid]?.[levelId] || null)
      : null;
    return { theme, drills: posDrills || theme.drills[levelId] || [] };
  }).filter(Boolean);

  if (!themeDrills.length) {
    return { warmup: null, blocks: [], cooldown: null, totalAllocated: 0, mismatch: 0 };
  }

  // 各テーマの合計時間を計算 → 比率で残時間を分配 → 各テーマ内で順に詰める
  const perThemeBaseSum = themeDrills.reduce((sum, td) =>
    sum + td.drills.reduce((s, d) => s + d.minutes, 0), 0);

  let totalAllocated = warmupTime + cooldownTime;
  const blocks = [];

  themeDrills.forEach((td, idx) => {
    const baseSum = td.drills.reduce((s, d) => s + d.minutes, 0);
    let share = perThemeBaseSum > 0 ? Math.round(remaining * (baseSum / perThemeBaseSum)) : 0;
    // 1テーマ時の極端な縮小を防ぐ：そのテーマのフルベース時間が share より大きく、
    // 残時間に余裕があれば share を増やす（最大 remaining まで）
    if (themeDrills.length === 1) share = remaining;
    let used = 0;
    const items = [];
    for (const d of td.drills) {
      if (used >= share) break;
      // share に対する drill ベース時間の比率で配分 → ベース合計を超えるなら倍率かける
      const ratio = baseSum > 0 ? share / baseSum : 1;
      const scaled = Math.max(5, Math.round(d.minutes * Math.max(1, ratio)));
      const allotted = Math.min(scaled, share - used);
      if (allotted >= 5) {
        items.push({ ...d, minutes: allotted });
        used += allotted;
      }
    }
    if (items.length) {
      blocks.push({ theme: td.theme, items, blockMinutes: used });
      totalAllocated += used;
    }
  });

  return {
    warmup: { ...DRILL_WARMUP, minutes: warmupTime },
    blocks,
    cooldown: { ...DRILL_COOLDOWN, minutes: cooldownTime },
    totalAllocated,
    mismatch: totalMinutes - totalAllocated,
  };
}

// ─────────────────────────────────────────────
// 簡易Markdownレンダラ（必要最小限）
// ─────────────────────────────────────────────
function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// HTMLタグ外のテキスト部分のみ検索ワードを <mark> でハイライト
function highlightInHtml(html, q) {
  if (!q || !q.trim()) return html;
  const escaped = q.trim().replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(escaped, 'gi');
  return html.replace(/(<[^>]+>)|([^<]+)/g, (m, tag, text) => {
    if (tag) return tag;
    return text.replace(re, mt => `<mark class="search-hit">${mt}</mark>`);
  });
}

// GLOSSARY の用語自動装飾（lazy init: GLOSSARY const 定義の後で動的構築）
let __glossaryRegex = null;
let __glossaryMap = null;
function getGlossaryDecorator() {
  if (__glossaryRegex !== null) return { regex: __glossaryRegex, map: __glossaryMap };
  if (typeof GLOSSARY === 'undefined') return null;
  const terms = [];
  __glossaryMap = {};
  for (const grp of GLOSSARY) {
    for (const item of grp.items) {
      // term は時々「ABC（原語）」のような形式 → メインの ABC 部分だけ key にする
      // ただし全文も含めてマッチ候補に
      const main = item.term.replace(/[（(].*$/, '').trim();
      if (main && main.length >= 2 && !__glossaryMap[main]) {
        terms.push(main);
        __glossaryMap[main] = item.desc;
      }
    }
  }
  // 長い順にソート（"フェイント7種" を "フェイント" より先にマッチ）
  terms.sort((a, b) => b.length - a.length);
  // 正規表現エスケープ
  const esc = terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  __glossaryRegex = new RegExp('(' + esc.join('|') + ')', 'g');
  return { regex: __glossaryRegex, map: __glossaryMap };
}
// 既存HTML文字列の中で、タグ外のテキストだけに用語装飾を適用
function decorateGlossary(html) {
  const dec = getGlossaryDecorator();
  if (!dec) return html;
  // <tag>...</tag> を保持しつつテキスト部分のみ置換
  // 一度しか装飾しないように Set で追跡（同セクション内で同じ用語が繰り返される場合は初回のみ）
  const used = new Set();
  return html.replace(/(<[^>]+>)|([^<]+)/g, (m, tag, text) => {
    if (tag) return tag;
    return text.replace(dec.regex, (_, term) => {
      if (used.has(term)) return term;
      used.add(term);
      return `<span class="gl-term" data-term="${term.replace(/"/g, '&quot;')}">${term}</span>`;
    });
  });
}

function renderMarkdown(md, query) {
  if (!md) return '';
  // CRLF / CR を正規化（Windows改行対応）
  md = md.replace(/\r\n?/g, '\n');
  const lines = md.split('\n');
  let html = '';
  let i = 0;
  let inCode = false, inTable = false, tableHeader = false;
  let codeLang = '';

  const flushPara = (buf) => {
    if (!buf.length) return '';
    const text = buf.join(' ').trim();
    if (!text) return '';
    return '<p>' + inlineMd(text) + '</p>';
  };

  function inlineMd(t) {
    t = escapeHtml(t);
    // コードインライン
    t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
    // 太字
    t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    // 斜体
    t = t.replace(/(^|[^*])\*([^*]+)\*/g, '$1<em>$2</em>');
    // [text](url) → そのまま装飾だけ
    t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<span style="color:#67e8f9">$1</span>');
    // [[ref]] 内部参照
    t = t.replace(/\[\[([^\]]+)\]\]/g, '<span style="color:#fbbf24">[[$1]]</span>');
    // 辞書ファイル名（XX_name.md 形式）→ クリック可能リンクに
    t = t.replace(/(\d{2})_([a-z_]+)\.md/g, '<a class="dict-inline-link" data-file-id="$1" href="#" onclick="event.preventDefault(); window.dispatchEvent(new CustomEvent(\'dict-jump\', {detail: \'$1\'}));">$1_$2.md</a>');
    return t;
  }

  let paraBuf = [];
  while (i < lines.length) {
    const line = lines[i];

    // コードブロック
    if (line.startsWith('```')) {
      html += flushPara(paraBuf); paraBuf = [];
      if (!inCode) {
        inCode = true; codeLang = line.slice(3).trim();
        html += '<pre><code>';
      } else {
        inCode = false; codeLang = '';
        html += '</code></pre>';
      }
      i++; continue;
    }
    if (inCode) {
      html += escapeHtml(line) + '\n';
      i++; continue;
    }

    // テーブル
    if (line.includes('|') && line.trim().startsWith('|')) {
      html += flushPara(paraBuf); paraBuf = [];
      if (!inTable) {
        inTable = true; tableHeader = true;
        html += '<table>';
      }
      // ヘッダ区切り行（---）をスキップ
      if (/^\|\s*[-:|\s]+\|/.test(line)) {
        tableHeader = false; i++; continue;
      }
      const cells = line.split('|').slice(1, -1).map(c => inlineMd(c.trim()));
      if (tableHeader) {
        html += '<tr>' + cells.map(c => `<th>${c}</th>`).join('') + '</tr>';
      } else {
        html += '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
      }
      i++; continue;
    }
    if (inTable && !line.includes('|')) {
      inTable = false;
      html += '</table>';
    }

    // 見出し
    const h = line.match(/^(#{1,6})\s+(.*)$/);
    if (h) {
      html += flushPara(paraBuf); paraBuf = [];
      const level = h[1].length;
      html += `<h${level}>${inlineMd(h[2])}</h${level}>`;
      i++; continue;
    }

    // 区切り
    if (/^---+\s*$/.test(line)) {
      html += flushPara(paraBuf); paraBuf = [];
      html += '<hr/>';
      i++; continue;
    }

    // 引用
    if (line.startsWith('> ')) {
      html += flushPara(paraBuf); paraBuf = [];
      html += '<blockquote>' + inlineMd(line.slice(2)) + '</blockquote>';
      i++; continue;
    }

    // リスト
    if (/^[-*]\s+/.test(line)) {
      html += flushPara(paraBuf); paraBuf = [];
      let listHtml = '<ul>';
      while (i < lines.length && /^[-*]\s+/.test(lines[i])) {
        listHtml += '<li>' + inlineMd(lines[i].replace(/^[-*]\s+/, '')) + '</li>';
        i++;
      }
      listHtml += '</ul>';
      html += listHtml; continue;
    }
    if (/^\d+\.\s+/.test(line)) {
      html += flushPara(paraBuf); paraBuf = [];
      let listHtml = '<ol>';
      while (i < lines.length && /^\d+\.\s+/.test(lines[i])) {
        listHtml += '<li>' + inlineMd(lines[i].replace(/^\d+\.\s+/, '')) + '</li>';
        i++;
      }
      listHtml += '</ol>';
      html += listHtml; continue;
    }

    // 空行
    if (!line.trim()) {
      html += flushPara(paraBuf); paraBuf = [];
      i++; continue;
    }

    paraBuf.push(line);
    i++;
  }
  if (inTable) html += '</table>';
  html += flushPara(paraBuf);
  let out = decorateGlossary(html);
  if (query) out = highlightInHtml(out, query);
  return out;
}

// ─────────────────────────────────────────────
// 辞書テキストをセクションに分割（## 見出しで区切る）
// ─────────────────────────────────────────────
function splitSections(md, fileMeta) {
  // CRLF / CR を正規化（Windows改行対応）
  md = md.replace(/\r\n?/g, '\n');
  const lines = md.split('\n');
  const sections = [];
  let current = null;
  let preamble = [];

  for (const line of lines) {
    const m = line.match(/^(#{1,3})\s+(.*)$/);
    if (m && m[1].length <= 2) {
      if (current) sections.push(current);
      else if (preamble.length) {
        sections.push({
          id: fileMeta.id + '-pre',
          fileId: fileMeta.id,
          fileName: fileMeta.name,
          fileTitle: fileMeta.title,
          fileIcon: fileMeta.icon,
          fileTags: fileMeta.tags,
          title: '冒頭',
          level: m[1].length,
          body: preamble.join('\n').trim(),
        });
      }
      current = {
        id: fileMeta.id + '-' + sections.length,
        fileId: fileMeta.id,
        fileName: fileMeta.name,
        fileTitle: fileMeta.title,
        fileIcon: fileMeta.icon,
        fileTags: fileMeta.tags,
        // 【A】→ A の連結バグ防止：単一英数字括弧は「A. 」形式、複数文字は中身のみ＋スペース
        title: m[2]
          .replace(/【([A-Za-z0-9]{1,2})】/g, '$1. ')
          .replace(/【([^】]+)】/g, '$1 ')
          .replace(/「([^」]+)」/g, '$1 ')
          .replace(/\s+/g, ' ')
          .trim(),
        level: m[1].length,
        body: line + '\n',
      };
    } else {
      if (current) current.body += line + '\n';
      else preamble.push(line);
    }
  }
  if (current) sections.push(current);
  return sections;
}

// 質問チャット（辞書検索ボット）
// LLM・外部API不使用：質問からキーワードを抽出し、読み込み済みの
// 辞書の全セクションを採点して最良の箇所から回答を合成する。
// 辞書はSWがキャッシュするためオフラインでも動作する。
// ─────────────────────────────────────────────

// 全角英数→半角・ダッシュ統一・小文字化
function chatNormalize(s) {
  return String(s || '')
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0))
    .replace(/　/g, ' ')
    .replace(/[‐－―−–—]/g, '-')
    .toLowerCase();
}

// 短い英数キーワード（of/gk/5-1等）は前後が英数だと誤ヒット（offense等）するため境界チェック
function chatIsAsciiKey(k) { return /^[a-z0-9-]+$/.test(k); }
function chatHasTerm(text, k) {
  if (!k) return false;
  if (!chatIsAsciiKey(k)) return text.includes(k);
  let idx = 0;
  while ((idx = text.indexOf(k, idx)) !== -1) {
    const before = idx > 0 ? text[idx - 1] : '';
    const after = idx + k.length < text.length ? text[idx + k.length] : '';
    if (!/[a-z0-9]/.test(before) && !/[a-z0-9]/.test(after)) return true;
    idx += 1;
  }
  return false;
}
function chatCountTerm(text, k, cap) {
  if (!k) return 0;
  let cnt = 0, idx = 0;
  const ascii = chatIsAsciiKey(k);
  while (cnt < cap && (idx = text.indexOf(k, idx)) !== -1) {
    const before = idx > 0 ? text[idx - 1] : '';
    const after = idx + k.length < text.length ? text[idx + k.length] : '';
    if (!ascii || (!/[a-z0-9]/.test(before) && !/[a-z0-9]/.test(after))) cnt++;
    idx += k.length;
  }
  return cnt;
}

// レキシコン（タグ・用語集・補助語彙から構築、長い順）
let CHAT_LEXICON_CACHE = null;
function chatLexicon() {
  if (CHAT_LEXICON_CACHE) return CHAT_LEXICON_CACHE;
  const set = new Set();
  const addTerm = (raw) => {
    if (!raw) return;
    const base = raw.split('（')[0].trim();
    if (base.length >= 2) set.add(base);
    const m = raw.match(/（([^）]+)）/);
    if (m) m[1].split(/[／/・,、]/).forEach(x => { x = x.trim(); if (x.length >= 2) set.add(x); });
  };
  ALL_TAGS.forEach(addTerm);
  GLOSSARY.forEach(g => g.items.forEach(it => addTerm(it.term)));
  [
    'ピボット', 'ポスト', 'スクリーン', 'カットイン', 'ドライブ', 'ステップシュート',

    'パッシブ', '退場', '警告', 'イエローカード', 'レッドカード', '2分',
    'ウォームアップ', 'クールダウン', 'ストレッチ', 'V字', 'フラッシュ', '回転プレー',
  ].forEach(addTerm);
  CHAT_LEXICON_CACHE = [...set]
    .map(raw => ({ raw, n: chatNormalize(raw) }))
    .filter(t => t.n.length >= 2)
    .sort((a, b) => b.n.length - a.n.length);
  return CHAT_LEXICON_CACHE;
}

// 質問 → キーワード抽出（シノニム w=2 / レキシコン w=2 / 自由トークン w=1）
function chatExtractKeywords(question) {
  const qn = chatNormalize(question);
  const kws = new Map();
  const fileBoosts = new Set();
  const addKw = (raw, w) => {
    const n = chatNormalize(raw);
    if (n.length < 2) return;
    const cur = kws.get(n);
    if (!cur || cur.w < w) kws.set(n, { raw, w });
  };
  for (const syn of CHAT_SYNONYMS) {
    if (syn.m.some(m => chatHasTerm(qn, chatNormalize(m)))) {
      syn.kw.forEach(k => addKw(k, 2));
      if (syn.file) fileBoosts.add(syn.file);
    }
  }
  for (const t of chatLexicon()) {
    if (chatHasTerm(qn, t.n)) addKw(t.raw, 2);
  }
  // 自由トークン：飾り表現を区切り化 → 記号で分割 → ひらがな助詞で分割
  qn.replace(CHAT_NOISE_RE, '|')
    .split(/[|、。．，,.!?！？\s・:：;；()（）「」『』〜~*％%]+/)
    .flatMap(chunk => chunk.split(/(?:の|は|が|を|に|で|や|も|へ)/))
    .map(tok => tok.trim())
    .filter(tok => tok.length >= 2 && !CHAT_STOPWORDS.has(tok))
    .forEach(tok => addKw(tok, 1));
  const sorted = [...kws.values()]
    .sort((a, b) => b.w - a.w || b.raw.length - a.raw.length)
    .slice(0, 10);
  return { kws: sorted, fileBoosts };
}

// セクション本文の正規化キャッシュ
const CHAT_NBODY = new WeakMap();
function chatNBody(s) {
  let v = CHAT_NBODY.get(s);
  if (v == null) { v = chatNormalize(s.body); CHAT_NBODY.set(s, v); }
  return v;
}
function chatIsStub(s) {
  const txt = s.body.replace(/^#.*$/gm, '').replace(/^[-=*]+$/gm, '').replace(/\s+/g, '');
  return txt.length < 30;
}

// 全セクション採点 → 上位4件
function chatSearch(question, sections) {
  const { kws, fileBoosts } = chatExtractKeywords(question);
  if (!kws.length) return { kws, hits: [] };
  const scored = [];
  for (const s of sections) {
    // 冒頭/ファイル見出し(H1=ファイル名)/スタブは回答にしない
    // （H1タイトルはファイル名で広いKWを含み、具体的な節より誤って上位化するため除外）
    if (s.title === '冒頭' || s.level === 1 || chatIsStub(s)) continue;
    const nTitle = chatNormalize(s.title);
    const nMeta = chatNormalize(s.fileTitle + ' ' + s.fileTags.join(' '));
    const nBody = chatNBody(s);
    let score = 0, cover = 0;
    for (const { raw, w } of kws) {
      const k = chatNormalize(raw);
      let pts = 0;
      if (chatHasTerm(nTitle, k)) pts += 8;
      if (chatHasTerm(nMeta, k)) pts += 2;
      pts += chatCountTerm(nBody, k, 5);
      if (pts > 0) { cover++; score += pts * w; }
    }
    if (score <= 0) continue;
    if (cover > 1) score *= 1 + 0.5 * (cover - 1);  // 複数キーワード網羅ボーナス
    if (fileBoosts.has(s.fileId)) score *= 1.6;      // 意図ファイルブースト
    scored.push({ s, score });
  }
  scored.sort((a, b) => b.score - a.score);
  return { kws, hits: scored.slice(0, 4).map(x => x.s) };
}

// 最良セクションからキーワード密度の高いブロックを抜粋（表は行単位で安全に切る）
function chatBestExcerpt(section, kws) {
  const body = section.body.replace(/\r\n?/g, '\n');
  let blocks = body.split(/\n{2,}/).map(b => b.trim()).filter(b => {
    if (!b) return false;
    const lines = b.split('\n');
    if (lines.length === 1 && /^#{1,6}\s/.test(b)) return false; // 見出しのみ
    if (/^[-=*]{3,}$/.test(b)) return false;                      // 区切り線のみ
    return true;
  });
  // ASCII図（罫線アート）はチャット内で崩れるため、散文ブロックを優先
  const isArtBlock = (b) => (b.match(/[━─│┃┌┐└┘├┤┬┴╋]/g) || []).length >= 6;
  const proseBlocks = blocks.filter(b => !isArtBlock(b));
  if (proseBlocks.length) blocks = proseBlocks;
  if (!blocks.length) return '';
  const scoreBlock = (b) => {
    const nb = chatNormalize(b);
    let sc = 0;
    for (const { raw, w } of kws) sc += chatCountTerm(nb, chatNormalize(raw), 5) * w;
    return sc;
  };
  const ranked = blocks.map((b, i) => ({ b, i, sc: scoreBlock(b) }))
    .sort((x, y) => y.sc - x.sc || x.i - y.i);
  const picked = [ranked[0]];
  if (ranked[0].b.length < 220 && ranked[1] && ranked[1].sc > 0) picked.push(ranked[1]);
  picked.sort((x, y) => x.i - y.i);
  let out = picked.map(p => p.b).join('\n\n');
  const LIMIT = 900;
  if (out.length > LIMIT) {
    if (/^\s*\|/m.test(out)) {
      const cutAt = out.lastIndexOf('\n', LIMIT);
      out = out.slice(0, cutAt > 100 ? cutAt : LIMIT);
    } else {
      let cut = out.lastIndexOf('。', LIMIT);
      if (cut < 100) cut = LIMIT;
      out = out.slice(0, cut + 1);
    }
    out += '\n\n…（続きは「全文を読む」へ）';
  }
  return out;
}
